version: 1
updated_at: "2026-03-30"

notes:
  - "이 파일은 source registry(sources.yaml)를 대체하지 않는다."
  - "목적은 원문 리포트/상세 본문/PDF를 어디서 어떻게 확보하는지 운영 관점에서 정리하는 것이다."
  - "fetcher 구현 변경 시 이 파일도 같이 업데이트한다."
  - "status는 active / verified_partial / blocked 로 운영한다."

routes:
  - source_id: naver_research
    status: active
    coverage: "상세 HTML 본문 수집 동작 중, PDF 링크 노출 시 다운로드 시도"
    discovery:
      type: html_list
      urls:
        - "https://finance.naver.com/research/market_info_list.naver"
        - "https://finance.naver.com/research/invest_list.naver"
        - "https://finance.naver.com/research/company_list.naver"
        - "https://finance.naver.com/research/industry_list.naver"
        - "https://finance.naver.com/research/economy_list.naver"
        - "https://finance.naver.com/research/debenture_list.naver"
    detail:
      type: html_detail
      url_pattern: "https://finance.naver.com/research/{category}_read.naver?nid={nid}&page={page}"
      primary_selector: "td.view_cnt"
    download:
      mode: detail_then_pdf
      pdf_selector: "a[href*='.pdf']"
      fallback: "상세 HTML 본문만 저장"
    save_targets:
      raw_json: "data/raw/{date}/naver_research/{doc_id}.json"
      detail_html: "data/raw/{date}/naver_research/{doc_id}_detail.html"
      detail_text: "data/raw/{date}/naver_research/{doc_id}_detail.txt"
      pdf_file: "data/raw/{date}/naver_research/{doc_id}.pdf"
      pdf_text: "data/raw/{date}/naver_research/{doc_id}.txt"
    metadata_keys:
      - broker
      - category
      - naver_link
      - detail_page_url
      - detail_text_length
      - download_url
      - pdf_text_length
      - detail_html_path
      - detail_text_path
      - pdf_path
      - pdf_text_path

  - source_id: kr_brokerage_kb
    status: active
    coverage: "공개 Today 카드 요약 수집 동작, detailView 본문/PDF는 로그인 제약으로 요약 카드 기반 수집 우선"
    discovery:
      type: html_site
      urls:
        - "https://rc.kbsec.com/main.able"
        - "https://rc.kbsec.com/today/index.able"
        - "https://rc.kbsec.com/report/reportList.able"
    detail:
      type: js_driven_site
      url_pattern: "today/index.able + hidden seq + JS-driven detail flow"
      primary_selector: "input#seq, a[href*='.able']"
    download:
      mode: today_summary_cards_then_detail_link
      fallback: "Today 카드의 제목/날짜/핵심 bullet을 저장하고 detailView는 metadata만 보존"
    save_targets:
      raw_json: "data/raw/{date}/kr_brokerage_kb/{doc_id}.json"
      pdf_file: "data/raw/{date}/kr_brokerage_kb/{doc_id}.pdf"
      pdf_text: "data/raw/{date}/kr_brokerage_kb/{doc_id}.txt"
      detail_html: "data/raw/{date}/kr_brokerage_kb/{doc_id}_detail.html"
      detail_text: "data/raw/{date}/kr_brokerage_kb/{doc_id}_detail.txt"
    verified_signals:
      - "https://rc.kbsec.com/main.able 200"
      - "https://rc.kbsec.com/today/index.able 200"
      - "메인에서 /report/reportList.able 링크 확인"
      - "today/index.able 에서 detailView.able?documentid=... 공개 노출 확인"
      - "today/index.able 의 공개 카드에서 제목/날짜/핵심 bullet 추출 가능"
    todo:
      - "detailView 로그인 필요 페이지를 우회할 수 있는 공개 PDF 엔드포인트 여부 재검증"
      - "Today 외 reportList 공개 카드도 추가 수집할지 검토"

  - source_id: kr_brokerage_shinhan
    status: verified_partial
    coverage: "리서치 탐색기 list API 기반 메타 수집 구현 완료, bbs2 상세 popup 경로 확정, PDF popup은 로그인 게이트 확인"
    discovery:
      type: html_list_plus_json
      urls:
        - "https://finance.shinhansec.com/siw/insights/research/list/view-popup.do"
        - "https://finance.shinhansec.com/siw/etc/browse/search05/data.do"
    detail:
      type: popup_detail
      url_pattern: "https://bbs2.shinhansec.com/siw/board/message/view.file.pop.do?boardName={board_name}&messageId={doc_id}"
      primary_selector: "ul.reseBoardList > li"
      api_notes:
        - "search05/data.do POST body: startCount, listCount, query, searchType, boardCode"
        - "공개 확인 board_name 예시: gicomment, gieconomy, gibond, gifuture, issuebroker"
    download:
      mode: list_api_then_bbs2_popup
      fallback: "list API 메타 + bbs2 detail HTML 저장, PDF popup은 로그인 게이트 시 metadata만 보존"
      host_hints:
        - "bbs2.shinhansec.com"
        - "file.shinhansec.com"
      pdf_popup_pattern: "https://bbs2.shinhansec.com/siw/board/message/view.pdf.file.pop.do?boardName={board_name}&messageId={doc_id}&messageNumber={message_number}&attachmentId={attachment_id}"
    save_targets:
      raw_json: "data/raw/{date}/kr_brokerage_shinhan/{doc_id}.json"
      detail_html: "data/raw/{date}/kr_brokerage_shinhan/{doc_id}_detail.html"
      detail_text: "data/raw/{date}/kr_brokerage_shinhan/{doc_id}_detail.txt"
      pdf_file: "data/raw/{date}/kr_brokerage_shinhan/{doc_id}.pdf"
      pdf_text: "data/raw/{date}/kr_brokerage_shinhan/{doc_id}.txt"
    verified_signals:
      - "https://finance.shinhansec.com/siw/insights/research/list/view-popup.do 200"
      - "https://finance.shinhansec.com/siw/etc/browse/search05/data.do POST 200"
      - "view-popup JS에서 page.bbs.path(url) 사용 확인"
      - "https://bbs2.shinhansec.com/siw/board/message/view.file.pop.do?... 200"
      - "https://bbs2.shinhansec.com/siw/board/message/view.pdf.file.pop.do?...&boardName=... 200 (로그인 게이트 페이지)"
    todo:
      - "로그인 없이 접근 가능한 board_name 범위 재검증"
      - "로그인 게이트가 없는 direct PDF path 존재 여부 추가 탐색"

  - source_id: kr_brokerage_mirae
    status: active
    coverage: "투자전략 리스트 HTML과 direct PDF download endpoint를 조합한 수집 구현 완료"
    discovery:
      type: html_site_plus_direct_pdf
      urls:
        - "https://securities.miraeasset.com"
        - "https://securities.miraeasset.com/bbs/board/message/list.do?categoryId=1527&curPage=1&direction=1&listType=1&searchType=2"
        - "https://securities.miraeasset.com/bbs/maildownload/{timestamp}_{attachment_id}"
        - "https://securities.miraeasset.com/bbs/download/{attachment_id}.pdf?attachmentId={attachment_id}"
    detail:
      type: attachment_download
      url_pattern: "attachment_id 기반 direct download"
    download:
      mode: direct_pdf_by_attachment_id
      fallback: "홈페이지/검색엔진에서 attachment_id 확보 후 바로 PDF 저장"
    save_targets:
      raw_json: "data/raw/{date}/kr_brokerage_mirae/{doc_id}.json"
      pdf_file: "data/raw/{date}/kr_brokerage_mirae/{doc_id}.pdf"
      pdf_text: "data/raw/{date}/kr_brokerage_mirae/{doc_id}.txt"
    verified_signals:
      - "리스트 HTML에서 javascript:view(...), downConfirm(...pdf...) 추출 가능"
      - "https://securities.miraeasset.com/bbs/maildownload/20240702180415557_3694 200 application/pdf"
      - "https://securities.miraeasset.com/bbs/download/2119054.pdf?attachmentId=2119054 공개 노출 확인"
    todo:
      - "투자전략 외 추가 categoryId 범위 확장"
      - "상세 view URL 패턴까지 확정"

  - source_id: kr_brokerage_hana
    status: verified_partial
    coverage: "직접 PDF file server 패턴은 확인됨, 리스트/게시판 URL은 추가 탐색 필요"
    discovery:
      type: direct_pdf_file_server
      urls:
        - "https://www.hanaw.com/download/research/FileServer/WEB/info/daily/{yyyy}/{mm}/{dd}/{file}.pdf"
    detail:
      type: file_server
      url_pattern: "날짜 경로 + 파일명 조합"
    download:
      mode: direct_pdf_when_filename_known
      fallback: "파일명 확보 전에는 리스트 수집 불가"
    save_targets:
      raw_json: "data/raw/{date}/kr_brokerage_hana/{doc_id}.json"
      pdf_file: "data/raw/{date}/kr_brokerage_hana/{doc_id}.pdf"
      pdf_text: "data/raw/{date}/kr_brokerage_hana/{doc_id}.txt"
    verified_signals:
      - "https://www.hanaw.com/download/research/FileServer/WEB/info/daily/2025/12/01/HGE1201%5BW%5D.pdf 200 application/pdf"
    todo:
      - "공개 리서치 리스트/검색 페이지 경로 확인"
      - "daily 외 카테고리 경로 규칙 확인"

  - source_id: kr_brokerage_samsung
    status: verified_partial
    coverage: "querystring 기반 직접 PDF download endpoint 확인, 실제 리스트/리서치 허브 추출은 로그인 또는 추가 제약 가능성 있음"
    discovery:
      type: direct_pdf_querystring
      urls:
        - "https://www.samsungpop.com/common.do?cmd=down&contentType=application%2Fpdf&fileName={encoded_path}&inlineYn=Y&saveKey=research.pdf"
    detail:
      type: querystring_download
      url_pattern: "common.do?cmd=down&fileName={encoded_path}"
    download:
      mode: direct_pdf_when_file_path_known
      fallback: "리서치 본문/리스트에서 fileName 확보 필요"
    save_targets:
      raw_json: "data/raw/{date}/kr_brokerage_samsung/{doc_id}.json"
      pdf_file: "data/raw/{date}/kr_brokerage_samsung/{doc_id}.pdf"
      pdf_text: "data/raw/{date}/kr_brokerage_samsung/{doc_id}.txt"
    verified_signals:
      - "https://www.samsungpop.com/common.do?cmd=down&contentType=application%2Fpdf&fileName=3010%2F2022102008475316K_02_04.pdf&inlineYn=Y&saveKey=research.pdf 200 application/pdf"
    todo:
      - "리서치센터 본문/검색 페이지에서 fileName 파라미터를 추출하는 흐름 확인"
      - "fnguide.samsungpop.com 연계 여부 확인"
      - "로그인 필요 여부와 비로그인 노출 범위 재확인"

  - source_id: ecb_economic_bulletin
    status: active
    coverage: "최신 이슈 페이지와 직접 PDF 링크 모두 공개"
    discovery:
      type: html_index
      urls:
        - "https://www.ecb.europa.eu/press/economic-bulletin/html/index.en.html"
    detail:
      type: html_detail
      url_pattern: "economic bulletin index page"
      primary_selector: "a[href*='/pub/pdf/ecbu/']"
    download:
      mode: html_then_pdf
      fallback: "HTML 본문만 저장"
      pdf_examples:
        - "https://www.ecb.europa.eu/pub/pdf/ecbu/eb202601.en.pdf"
    save_targets:
      raw_json: "data/raw/{date}/ecb_economic_bulletin/{doc_id}.json"
      detail_html: "data/raw/{date}/ecb_economic_bulletin/{doc_id}_detail.html"
      detail_text: "data/raw/{date}/ecb_economic_bulletin/{doc_id}_detail.txt"
      pdf_file: "data/raw/{date}/ecb_economic_bulletin/{doc_id}.pdf"
      pdf_text: "data/raw/{date}/ecb_economic_bulletin/{doc_id}.txt"
    verified_signals:
      - "index.en.html 200"
      - "eb202601.en.pdf 200 application/pdf"

  - source_id: bis_working_papers
    status: active
    coverage: "working papers index와 direct PDF pattern 공개"
    discovery:
      type: html_index
      urls:
        - "https://www.bis.org/wpapers/index.htm"
    detail:
      type: html_index
      url_pattern: "https://www.bis.org/wpapers/index.htm"
      primary_selector: "a[href*='/publ/work']"
    download:
      mode: direct_pdf_pattern
      pdf_pattern: "https://www.bis.org/publ/work{number}.pdf"
    save_targets:
      raw_json: "data/raw/{date}/bis_working_papers/{doc_id}.json"
      pdf_file: "data/raw/{date}/bis_working_papers/{doc_id}.pdf"
      pdf_text: "data/raw/{date}/bis_working_papers/{doc_id}.txt"
    verified_signals:
      - "https://www.bis.org/wpapers/index.htm 200"
      - "https://www.bis.org/publ/work1297.pdf 200 application/pdf"

  - source_id: boj_outlook_report
    status: active
    coverage: "Outlook Report index와 개별 PDF 링크 공개"
    discovery:
      type: html_index
      urls:
        - "https://www.boj.or.jp/en/mopo/outlook/index.htm"
    detail:
      type: html_index
      url_pattern: "outlook index page"
      primary_selector: "a[href$='.pdf']"
    download:
      mode: html_then_pdf
      fallback: "HTML index 본문만 저장"
      pdf_examples:
        - "https://www.boj.or.jp/en/mopo/outlook/box/2304box3a.pdf"
    save_targets:
      raw_json: "data/raw/{date}/boj_outlook_report/{doc_id}.json"
      pdf_file: "data/raw/{date}/boj_outlook_report/{doc_id}.pdf"
      pdf_text: "data/raw/{date}/boj_outlook_report/{doc_id}.txt"
    verified_signals:
      - "https://www.boj.or.jp/en/mopo/outlook/index.htm 200"
      - "https://www.boj.or.jp/en/mopo/outlook/box/2304box3a.pdf 200 application/pdf"

  - source_id: imf_weo
    status: verified_partial
    coverage: "publication landing은 공개되지만 direct media PDF는 일부 403이 발생"
    discovery:
      type: publication_page
      urls:
        - "https://www.imf.org/en/Publications/WEO"
    detail:
      type: publication_landing
      url_pattern: "WEO publication landing page"
    download:
      mode: publication_page_then_pdf
      fallback: "landing page 메타와 링크만 저장"
      blockers:
        - "직접 media PDF 접근 시 403 가능"
        - "브라우저 헤더/쿠키 또는 publication page parsing이 필요"
    todo:
      - "landing page에서 실제 pdf href를 파싱하는 로직 추가"
      - "403을 피할 수 있는 합법적 요청 헤더 조합 검토"

  - source_id: opendart
    status: active
    coverage: "공시 메타와 본문 링크 확보"
    discovery:
      type: api
      urls:
        - "https://opendart.fss.or.kr"
    detail:
      type: filing_page
      url_pattern: "https://dart.fss.or.kr/dsaf001/main.do?rcpNo={rcp_no}"
    download:
      mode: filing_html_only
      fallback: "PDF 직접 다운로드 없음"
    save_targets:
      raw_json: "data/raw/{date}/opendart/{doc_id}.json"

  - source_id: sec_edgar
    status: active
    coverage: "공시 메타와 상세 링크 확보"
    discovery:
      type: api
      urls:
        - "https://www.sec.gov/cgi-bin/browse-edgar"
    detail:
      type: filing_page
      url_pattern: "SEC filing detail page"
    download:
      mode: filing_html_only
      fallback: "첨부문서 필요 시 후속 확장"
    save_targets:
      raw_json: "data/raw/{date}/sec_edgar/{doc_id}.json"

  - source_id: fed_speeches_rss
    status: active
    coverage: "RSS 링크 본문 수집 가능"
    discovery:
      type: rss
      urls:
        - "https://www.federalreserve.gov/feeds/speeches.xml"
    detail:
      type: html_detail
      url_pattern: "feed entry link"
    download:
      mode: html_body_only
      fallback: "RSS summary 유지"

  - source_id: fed_press_rss
    status: active
    coverage: "RSS 링크 본문 수집 가능"
    discovery:
      type: rss
      urls:
        - "https://www.federalreserve.gov/feeds/press_all.xml"
    detail:
      type: html_detail
      url_pattern: "feed entry link"
    download:
      mode: html_body_only
      fallback: "RSS summary 유지"
