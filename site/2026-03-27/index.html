<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>글로벌 매크로·ETF 리포트</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Pretendard', -apple-system, sans-serif; background: #eef2f7; color: #1f2937; }
    .app { max-width: 560px; margin: 0 auto; min-height: 100vh; background: #f6f8fb; }
    .top { position: sticky; top: 0; z-index: 10; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #e5e7eb; padding: 20px 18px 14px; }
    .title { font-size: 22px; font-weight: 800; color: #111827; margin: 0 0 6px; }
    .sub { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; color: #6b7280; font-size: 13px; margin-bottom: 16px; }
    .status-badge { display: inline-flex; align-items: center; padding: 4px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; }
    .status-full { background: #e8f7ed; color: #137333; }
    .status-partial { background: #fff4e5; color: #b06000; }
    .status-sparse { background: #e8f3ff; color: #1b64da; }
    .status-empty { background: #f3f4f6; color: #6b7280; }
    .selector-block { margin-bottom: 14px; }
    .selector-title { font-size: 12px; font-weight: 700; color: #6b7280; margin-bottom: 8px; }
    .selector-row { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; }
    .selector-row::-webkit-scrollbar { display: none; }
    .summary-strip { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; margin-bottom: 14px; }
    .summary-strip::-webkit-scrollbar { display: none; }
    .summary-pill { display: inline-flex; align-items: center; padding: 6px 10px; border-radius: 999px; background: #f3f4f6; color: #374151; font-size: 12px; font-weight: 700; white-space: nowrap; }
    .chip { border: none; background: #e5e7eb; color: #4b5563; border-radius: 999px; padding: 8px 12px; font-size: 13px; font-weight: 700; white-space: nowrap; cursor: pointer; }
    .chip.active { background: #111827; color: #ffffff; }
    .chip.soft { background: #f3f4f6; }
    .chip.soft.active { background: #2563eb; color: #ffffff; }
    .tab-row { display: flex; gap: 14px; overflow-x: auto; scrollbar-width: none; }
    .tab-row::-webkit-scrollbar { display: none; }
    .tab { border: none; background: transparent; color: #9ca3af; font-size: 15px; font-weight: 700; padding: 0 0 8px; cursor: pointer; position: relative; white-space: nowrap; }
    .tab.active { color: #111827; }
    .tab.active::after { content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 3px; background: #111827; border-radius: 999px; }
    .content { padding: 18px 0 40px; }
    .pane { display: none; }
    .pane.active { display: block; }
    .card { background: #ffffff; border-radius: 20px; box-shadow: 0 2px 12px rgba(15, 23, 42, 0.04); margin: 0 18px 16px; padding: 20px; }
    .card-title { font-size: 18px; font-weight: 800; color: #111827; margin: 0 0 14px; }
    .muted { font-size: 13px; color: #6b7280; }
    .score-wrap { margin-bottom: 18px; }
    .score-head { display: flex; justify-content: space-between; align-items: end; margin-bottom: 8px; }
    .score-num { font-size: 28px; font-weight: 800; color: #111827; }
    .score-status { font-size: 14px; font-weight: 800; }
    .score-track { height: 8px; background: #e5e7eb; border-radius: 999px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 999px; }
    .forecast-box { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 16px; padding: 16px; }
    .forecast-label { display: inline-flex; align-items: center; gap: 6px; background: #111827; color: #ffffff; padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 800; margin-bottom: 10px; }
    .forecast-text { font-size: 14px; line-height: 1.65; color: #4b5563; }
    .list { list-style: none; margin: 0; padding: 0; }
    .list-item { display: flex; gap: 10px; padding: 14px 0; border-bottom: 1px dashed #e5e7eb; }
    .list-item:last-child { border-bottom: none; padding-bottom: 0; }
    .badge { display: inline-flex; align-items: center; padding: 4px 8px; border-radius: 8px; background: #e8f3ff; color: #1b64da; font-size: 12px; font-weight: 800; flex-shrink: 0; }
    .body-text { font-size: 14.5px; line-height: 1.6; color: #4b5563; }
    .index-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eef2f7; }
    .index-row:last-child { border-bottom: none; }
    .index-name { font-size: 14px; font-weight: 700; color: #111827; }
    .index-value { text-align: right; }
    .index-price { font-size: 15px; font-weight: 800; color: #111827; }
    .text-up { color: #e11d48; font-size: 13px; font-weight: 700; }
    .text-down { color: #2563eb; font-size: 13px; font-weight: 700; }
    .chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .tag { display: inline-flex; padding: 6px 10px; border-radius: 999px; background: #f3f4f6; color: #4b5563; font-size: 12px; font-weight: 700; }
    .impact-title { font-size: 13px; font-weight: 800; color: #6b7280; margin: 18px 0 10px; }
    .impact-item { padding: 10px 0; border-bottom: 1px dashed #e5e7eb; }
    .impact-item:last-child { border-bottom: none; }
    .impact-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .impact-dot { width: 10px; height: 10px; border-radius: 50%; }
    .impact-dot.pos { background: #e11d48; }
    .impact-dot.neg { background: #2563eb; }
    .impact-name { font-size: 14px; font-weight: 800; color: #111827; }
    .impact-desc { font-size: 13.5px; line-height: 1.55; color: #6b7280; }
    .hero { background: linear-gradient(135deg, #111827 0%, #334155 100%); color: #ffffff; border-radius: 20px; margin: 0 18px 16px; padding: 20px; }
    .hero-title { font-size: 18px; font-weight: 800; margin: 0 0 10px; }
    .hero-text { font-size: 14px; line-height: 1.6; opacity: 0.92; }
    .alloc-bar { display: flex; height: 12px; border-radius: 999px; overflow: hidden; margin: 14px 0 16px; }
    .alloc-item { display: flex; align-items: start; gap: 10px; margin-bottom: 12px; }
    .alloc-dot { width: 12px; height: 12px; border-radius: 50%; margin-top: 4px; }
    .alloc-name { font-size: 14px; font-weight: 800; color: #111827; }
    .alloc-desc { font-size: 13px; line-height: 1.5; color: #6b7280; }
    .idea { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 18px; margin: 0 18px 16px; overflow: hidden; }
    .idea-top { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: #f8fafc; }
    .idea-left { display: flex; gap: 12px; align-items: center; }
    .idea-logo { font-size: 24px; }
    .idea-name { font-size: 15px; font-weight: 800; color: #111827; }
    .idea-ticker { font-size: 12px; color: #6b7280; }
    .idea-action { background: #eff6ff; color: #1d4ed8; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 800; }
    .idea-body { padding: 14px 16px 16px; }
    .issue-badge { display: inline-flex; padding: 5px 8px; border-radius: 999px; background: #f3f4f6; color: #4b5563; font-size: 12px; font-weight: 700; margin-bottom: 10px; }
    .rank-item { display: flex; gap: 12px; align-items: center; padding: 12px 0; border-bottom: 1px dashed #e5e7eb; }
    .rank-item:last-child { border-bottom: none; }
    .rank-num { width: 24px; font-size: 16px; font-weight: 800; color: #9ca3af; }
    .rank-info { flex: 1; }
    .rank-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 8px; }
    .rank-name { font-size: 14px; font-weight: 800; color: #111827; }
    .rank-ticker { font-size: 11px; color: #6b7280; background: #f3f4f6; border-radius: 999px; padding: 2px 8px; margin-left: 6px; }
    .rank-score { font-size: 13px; font-weight: 800; color: #2563eb; }
    .rank-track { height: 6px; background: #e5e7eb; border-radius: 999px; overflow: hidden; }
    .rank-fill { height: 100%; background: #2563eb; border-radius: 999px; }
    .source-toggle { margin-top: 12px; border: none; background: #f3f4f6; color: #4b5563; padding: 8px 10px; border-radius: 10px; font-size: 12px; font-weight: 800; cursor: pointer; }
    .source-box { display: none; margin-top: 10px; background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 14px; padding: 12px; }
    .source-item { font-size: 12px; color: #6b7280; line-height: 1.6; margin-bottom: 8px; }
    .source-item:last-child { margin-bottom: 0; }
    .empty { text-align: center; padding: 48px 20px; color: #9ca3af; font-size: 15px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1 class="title">글로벌 매크로·ETF 리포트</h1>
      <div class="sub">
        <span id="contextText">데이터 로딩 중...</span>
        <span id="statusBadge"></span>
      </div>
      <div id="summaryStrip" class="summary-strip"></div>
      <div class="selector-block">
        <div class="selector-title">기간 유형</div>
        <div id="horizonSelector" class="selector-row"></div>
      </div>
      <div class="selector-block">
        <div class="selector-title">기간 선택</div>
        <div id="bucketSelector" class="selector-row"></div>
      </div>
      <div class="tab-row" id="sectionTabs">
        <button class="tab active" data-tab="briefing" onclick="switchSection('briefing')">시장 브리핑</button>
        <button class="tab" data-tab="news" onclick="switchSection('news')">핵심 이슈</button>
        <button class="tab" data-tab="portfolio" onclick="switchSection('portfolio')">포트폴리오</button>
        <button class="tab" data-tab="recommendations" onclick="switchSection('recommendations')">ETF 아이디어</button>
      </div>
    </div>
    <div class="content">
      <div id="pane-briefing" class="pane active"></div>
      <div id="pane-news" class="pane"></div>
      <div id="pane-portfolio" class="pane"></div>
      <div id="pane-recommendations" class="pane"></div>
    </div>
  </div>

  <script>
    const REPO_PREFIX = window.location.pathname.includes('/igzun-daily-report/') ? '/igzun-daily-report' : '';
    const SITE_BASE = `${REPO_PREFIX}/site`;
    const state = {
      index: null,
      currentHorizon: '1일',
      currentBucketId: '',
      currentView: null,
      currentSection: 'briefing',
    };

    function statusClass(status) {
      return {
        full: 'status-badge status-full',
        partial: 'status-badge status-partial',
        sparse: 'status-badge status-sparse',
        empty: 'status-badge status-empty',
      }[status] || 'status-badge status-empty';
    }

    function statusText(status) {
      return {
        full: '데이터 충분',
        partial: '데이터 부분',
        sparse: '데이터 제한',
        empty: '데이터 없음',
      }[status] || status;
    }

    function currentBucket() {
      const buckets = (state.index?.horizons?.[state.currentHorizon]) || [];
      return buckets.find(item => item.id === state.currentBucketId) || null;
    }

    function defaultBucketForHorizon(horizon) {
      const buckets = (state.index?.horizons?.[horizon]) || [];
      return buckets.length ? buckets[0].id : '';
    }

    function formatContext(view, bucket) {
      if (!view || !bucket) return '표시할 데이터가 없습니다.';
      return `${bucket.label} · ${state.currentHorizon} 관점 · ${view.fromDate} ~ ${view.toDate}`;
    }

    function renderStatus(status) {
      const el = document.getElementById('statusBadge');
      el.className = statusClass(status);
      el.textContent = statusText(status);
    }

    function renderHorizonSelector() {
      const container = document.getElementById('horizonSelector');
      const horizons = Object.keys(state.index?.horizons || {});
      container.innerHTML = horizons.map(horizon => {
        const active = horizon === state.currentHorizon ? 'active' : '';
        return `<button class="chip ${active}" onclick="changeHorizon('${horizon}')">${horizon}</button>`;
      }).join('');
    }

    function renderBucketSelector() {
      const container = document.getElementById('bucketSelector');
      const buckets = (state.index?.horizons?.[state.currentHorizon]) || [];
      container.innerHTML = buckets.map(bucket => {
        const active = bucket.id === state.currentBucketId ? 'active' : '';
        return `<button class="chip soft ${active}" onclick="changeBucket('${bucket.id}')">${bucket.label}</button>`;
      }).join('');
    }

    async function loadIndex() {
      const res = await fetch(`${SITE_BASE}/horizon_index.json?t=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) throw new Error('index load failed');
      state.index = await res.json();
    }

    function resolveInitialSelection() {
      const parts = window.location.pathname.split('/').filter(Boolean);
      const datePart = parts.find(part => /^\d{4}-\d{2}-\d{2}$/.test(part));
      if (datePart && (state.index?.horizons?.['1일'] || []).some(item => item.id === datePart)) {
        state.currentHorizon = '1일';
        state.currentBucketId = datePart;
        return;
      }
      state.currentHorizon = '1일';
      state.currentBucketId = defaultBucketForHorizon('1일');
    }

    async function changeHorizon(horizon) {
      state.currentHorizon = horizon;
      state.currentBucketId = defaultBucketForHorizon(horizon);
      renderHorizonSelector();
      renderBucketSelector();
      await loadCurrentView();
    }

    async function changeBucket(bucketId) {
      state.currentBucketId = bucketId;
      renderBucketSelector();
      await loadCurrentView();
    }

    async function loadCurrentView() {
      const bucket = currentBucket();
      if (!bucket) {
        state.currentView = null;
        updateHeader();
        renderAll();
        return;
      }
      const res = await fetch(`${SITE_BASE}/${bucket.source}?t=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) throw new Error('view load failed');
      state.currentView = await res.json();
      updateHeader();
      renderAll();
    }

    function updateHeader() {
      const bucket = currentBucket();
      document.getElementById('contextText').textContent = formatContext(state.currentView, bucket);
      renderStatus(state.currentView?.dataStatus || 'empty');
      renderSummaryStrip();
      document.title = bucket ? `${bucket.label} · 글로벌 매크로·ETF 리포트` : '글로벌 매크로·ETF 리포트';
    }

    function renderSummaryStrip() {
      const strip = document.getElementById('summaryStrip');
      const view = state.currentView;
      if (!view) {
        strip.innerHTML = '';
        return;
      }
      const pills = [];
      if (view.updateCount) pills.push(`누적 업데이트 ${view.updateCount}회`);
      if (view.meta?.docsTotal) pills.push(`누적 문서 ${view.meta.docsTotal}건`);
      if (Number.isFinite(Number(view.avgScore))) pills.push(`평균 점수 ${view.avgScore}`);
      (view.meta?.sourceLabels || []).slice(0, 2).forEach(label => pills.push(label));
      strip.innerHTML = pills.map(text => `<span class="summary-pill">${text}</span>`).join('');
    }

    function switchSection(section) {
      state.currentSection = section;
      document.querySelectorAll('.tab').forEach(tab => tab.classList.toggle('active', tab.dataset.tab === section));
      document.querySelectorAll('.pane').forEach(pane => pane.classList.toggle('active', pane.id === `pane-${section}`));
    }

    function renderSources(sources, id) {
      if (!sources || !sources.length) return '';
      const items = sources.map(item => {
        const label = item.label || item.source || '출처';
        const title = item.title ? ` — ${item.title}` : '';
        const date = item.published_at ? ` (${item.published_at})` : '';
        const meta = [item.region, item.sector].filter(Boolean).join(' · ');
        return `<div class="source-item"><b>${label}</b>${title}${date}${meta ? ` · ${meta}` : ''}</div>`;
      }).join('');
      return `<button class="source-toggle" onclick="toggleSource('${id}')">출처·메타데이터</button><div class="source-box" id="${id}">${items}</div>`;
    }

    function toggleSource(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function renderBriefing() {
      const pane = document.getElementById('pane-briefing');
      const data = state.currentView?.briefing;
      const bucket = currentBucket();
      if (!data) {
        pane.innerHTML = '<div class="empty">시장 브리핑 데이터가 없습니다.</div>';
        return;
      }
      const score = data.sentiment?.score ?? 50;
      const scoreColor = score >= 65 ? '#0f9f6e' : (score >= 50 ? '#2563eb' : '#f59e0b');
      const insights = (data.insights || []).map((item, idx) => `
        <li class="list-item">
          <span class="badge">${item.category || '인사이트'}</span>
          <div class="body-text">${item.text || ''}${renderSources(item.sources, `briefing-src-${idx}`)}</div>
        </li>
      `).join('');
      const indices = (data.indices || []).map(item => `
        <div class="index-row">
          <div class="index-name">${item.name || '-'}</div>
          <div class="index-value">
            <div class="index-price">${item.price || '-'}</div>
            <div class="${item.isUp ? 'text-up' : 'text-down'}">${item.change || '-'}</div>
          </div>
        </div>
      `).join('');

      pane.innerHTML = `
        <div class="card">
          <div class="card-title">${bucket?.label || ''} 시장 브리핑</div>
          <div class="score-wrap">
            <div class="score-head">
              <div class="score-num">${score}<span class="muted"> / 100</span></div>
              <div class="score-status" style="color:${scoreColor};">${data.sentiment?.status || '중립'}</div>
            </div>
            <div class="score-track"><div class="score-fill" style="width:${score}%; background:${scoreColor};"></div></div>
            <div class="muted" style="margin-top:8px;">${data.sentiment?.desc || ''}</div>
          </div>
          ${data.forecast ? `
            <div class="forecast-box">
              <div class="forecast-label">${state.currentHorizon}</div>
              <div class="card-title" style="font-size:16px; margin-bottom:10px;">${data.forecast.title || ''}</div>
              <div class="forecast-text">${data.forecast.text || ''}</div>
              ${renderSources(data.forecast.sources, 'forecast-src')}
            </div>
          ` : ''}
        </div>
        <div class="card">
          <div class="card-title">${bucket?.label || ''} 핵심 인사이트</div>
          <ul class="list">${insights}</ul>
        </div>
        <div class="card">
          <div class="card-title">${bucket?.label || ''} 주요 자산 흐름</div>
          ${indices || '<div class="empty">자산 흐름 데이터가 없습니다.</div>'}
        </div>
      `;
    }

    function renderNews() {
      const pane = document.getElementById('pane-news');
      const list = state.currentView?.newsList || [];
      if (!list.length) {
        pane.innerHTML = '<div class="empty">핵심 이슈 데이터가 없습니다.</div>';
        return;
      }
      pane.innerHTML = list.map((item, idx) => `
        <div class="card">
          <div class="card-title">${item.title || '이슈'}</div>
          <div class="chip-group">${(item.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
          <div class="body-text">${item.summary || ''}</div>
          ${renderSources(item.sources, `news-src-${idx}`)}
          <div class="impact-title">섹터·자산 영향</div>
          ${(item.impacts || []).map(impact => `
            <div class="impact-item">
              <div class="impact-head">
                <span class="impact-dot ${impact.isPositive ? 'pos' : 'neg'}"></span>
                <span class="impact-name">${impact.sector || '-'}</span>
              </div>
              <div class="impact-desc">${impact.desc || ''}</div>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function renderPortfolio() {
      const pane = document.getElementById('pane-portfolio');
      const data = state.currentView?.portfolio;
      if (!data) {
        pane.innerHTML = '<div class="empty">포트폴리오 데이터가 없습니다.</div>';
        return;
      }
      const score = data.portfolioScore || null;
      const scoreColor = !score ? '#2563eb' : (score.score >= 65 ? '#0f9f6e' : (score.score >= 50 ? '#2563eb' : '#f59e0b'));
      const compareRows = score ? Object.keys(score.currentPct || {}).map(key => `
        <div class="index-row">
          <div class="index-name">${key}</div>
          <div class="index-value">
            <div class="index-price">현재 ${score.currentPct[key]}%</div>
            <div class="text-down" style="color:#6b7280;">목표 ${score.targetPct[key]}%</div>
          </div>
        </div>
      `).join('') : '';
      const allocBar = (data.allocations || []).map(item => `<div style="width:${item.percent}%; background:${item.color};"></div>`).join('');
      const allocList = (data.allocations || []).map(item => `
        <div class="alloc-item">
          <span class="alloc-dot" style="background:${item.color};"></span>
          <div>
            <div class="alloc-name">${item.name} (${item.percent}%)</div>
            <div class="alloc-desc">${item.desc}</div>
          </div>
        </div>
      `).join('');
      const reasons = (score?.reasons || []).map(item => `
        <li class="list-item">
          <span class="badge">점수</span>
          <div class="body-text">${item}</div>
        </li>
      `).join('');

      pane.innerHTML = `
        <div class="hero">
          <div class="hero-title">${data.accountAlert || '포트폴리오 요약'}</div>
          <div class="hero-text">${data.accountDetail || ''}</div>
        </div>
        ${score ? `
          <div class="card">
            <div class="card-title">포트폴리오 레짐 적합도</div>
            <div class="score-wrap">
              <div class="score-head">
                <div class="score-num">${score.score}<span class="muted"> / 100</span></div>
                <div class="score-status" style="color:${scoreColor};">${score.grade}</div>
              </div>
              <div class="score-track"><div class="score-fill" style="width:${score.score}%; background:${scoreColor};"></div></div>
              <div class="muted" style="margin-top:8px;">${score.summary || ''}</div>
            </div>
            <div class="card-title" style="font-size:16px;">현재 배분 vs 목표 배분</div>
            ${compareRows}
            <ul class="list" style="margin-top:14px;">${reasons}</ul>
          </div>
        ` : ''}
        <div class="card">
          <div class="card-title">${state.currentView.bucketLabel || ''} 포트폴리오 판단</div>
          <div class="muted" style="margin-bottom:8px;">현재 포지션과 진입 여력 해석</div>
          <div class="body-text" style="font-weight:800; color:#2563eb; margin-bottom:10px;">${data.weeklyReview?.returnRate || ''}</div>
          <div class="body-text">${data.weeklyReview?.desc || ''}</div>
        </div>
        <div class="card">
          <div class="card-title">${state.currentHorizon} 권장 자산배분</div>
          <div class="body-text">${data.planDesc || ''}</div>
          <div class="alloc-bar">${allocBar}</div>
          ${allocList}
        </div>
      `;
    }

    function renderRecommendations() {
      const pane = document.getElementById('pane-recommendations');
      const data = state.currentView?.recommendations;
      if (!data) {
        pane.innerHTML = '<div class="empty">ETF 아이디어 데이터가 없습니다.</div>';
        return;
      }
      const ideas = (data.ideas || []).map(item => `
        <div class="idea">
          <div class="idea-top">
            <div class="idea-left">
              <div class="idea-logo">${item.logo || '📌'}</div>
              <div>
                <div class="idea-name">${item.name || '-'}</div>
                <div class="idea-ticker">${item.ticker || '-'}</div>
              </div>
            </div>
            <div class="idea-action">${item.action || '관찰'}</div>
          </div>
          <div class="idea-body">
            <div class="issue-badge">연결 이슈: ${item.linkedIssue || '-'}</div>
            <div class="body-text">${item.reason || ''}</div>
          </div>
        </div>
      `).join('');
      const ranking = (data.etfRanking || []).map(item => `
        <div class="rank-item">
          <div class="rank-num">${item.rank || '-'}</div>
          <div class="rank-info">
            <div class="rank-head">
              <div class="rank-name">${item.name || '-'}<span class="rank-ticker">${item.ticker || '-'}</span></div>
              <div class="rank-score">${item.score || 0}점</div>
            </div>
            <div class="rank-track"><div class="rank-fill" style="width:${item.score || 0}%;"></div></div>
          </div>
        </div>
      `).join('');

      pane.innerHTML = `
        <div class="card">
          <div class="card-title">${state.currentView.bucketLabel || ''} ETF·테마 아이디어</div>
          <div class="muted">기간별 누적 흐름과 현재 레짐을 함께 반영한 아이디어입니다.</div>
        </div>
        ${ideas}
        <div class="card">
          <div class="card-title">ETF 우선순위 랭킹</div>
          <div class="muted" style="margin-bottom:12px;">현재 기간의 모멘텀, 리스크, 레짐 적합도를 함께 반영했습니다.</div>
          ${ranking || '<div class="empty">랭킹 데이터가 없습니다.</div>'}
        </div>
      `;
    }

    function renderAll() {
      renderBriefing();
      renderNews();
      renderPortfolio();
      renderRecommendations();
      switchSection(state.currentSection);
    }

    async function init() {
      try {
        await loadIndex();
        resolveInitialSelection();
        renderHorizonSelector();
        renderBucketSelector();
        await loadCurrentView();
      } catch (error) {
        document.querySelector('.content').innerHTML = '<div class="empty">기간별 리포트를 불러오지 못했습니다.</div>';
        renderStatus('empty');
      }
    }

    window.onload = init;
  </script>
</body>
</html>
