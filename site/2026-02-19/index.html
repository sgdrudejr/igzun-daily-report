let currentYear, currentMonth; let selectedDateInfo = null; let currentPeriod = "";
function toggleCalendar(){document.getElementById('calendarPopup').classList.toggle('active');}
function closeCalendarOnOutsideClick(event){if(event.target.id==='calendarPopup') toggleCalendar();}
function initCalendar(){const today=new Date();currentYear=today.getFullYear();currentMonth=today.getMonth();selectedDateInfo={year:today.getFullYear(),month:today.getMonth(),date:today.getDate()};renderCalendar(currentYear,currentMonth);}
function renderCalendar(year,month){const grid=document.getElementById('calendar-grid');const monthYearLabel=document.getElementById('calendar-month-year');grid.innerHTML='';monthYearLabel.innerText=`${year} ${String(month+1).padStart(2,'0')}`;const firstDay=new Date(year,month,1).getDay();const daysInMonth=new Date(year,month+1,0).getDate();for(let i=0;i<firstDay;i++){const emptyDiv=document.createElement('div');emptyDiv.className='calendar-date empty';grid.appendChild(emptyDiv);}const today=new Date();const isCurrentMonth=today.getFullYear()===year&&today.getMonth()===month;for(let i=1;i<=daysInMonth;i++){const dateDiv=document.createElement('div');dateDiv.className='calendar-date';dateDiv.innerText=i;const dayOfWeek=(firstDay+i-1)%7;if(dayOfWeek===0) dateDiv.style.color='#F04452'; if(dayOfWeek===6) dateDiv.style.color='#3182F6'; if(selectedDateInfo&&selectedDateInfo.year===year&&selectedDateInfo.month===month&&selectedDateInfo.date===i){dateDiv.classList.add('active');dateDiv.style.color='#FFFFFF';} else if(isCurrentMonth&&i===today.getDate()&&!selectedDateInfo){dateDiv.classList.add('active');dateDiv.style.color='#FFFFFF';} dateDiv.onclick=(e)=>loadReportForDate(year,month,i,e); grid.appendChild(dateDiv);} }
function changeMonth(offset){currentMonth+=offset;if(currentMonth<0){currentMonth=11;currentYear--;} else if(currentMonth>11){currentMonth=0;currentYear++;}renderCalendar(currentYear,currentMonth);}
function goToToday(){initCalendar();updateReportTitle();}
async function loadReportForDate(year,month,day,event){document.querySelectorAll('.calendar-date').forEach(el=>{el.classList.remove('active');const dayNum=parseInt(el.innerText);if(dayNum){const dayOfWeek=new Date(year,month,dayNum).getDay();if(dayOfWeek===0) el.style.color='#F04452'; else if(dayOfWeek===6) el.style.color='#3182F6'; else el.style.color='#333D4B';}}); if(event){event.target.classList.add('active');event.target.style.color='#FFFFFF';} selectedDateInfo={year:year,month:month,date:day}; updateReportTitle(); const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`; try { const r=await fetch(`/igzun-daily-report/site/${ds}/result.json`, {cache:'no-store'}); if(r.ok){ const incoming=await r.json(); if(incoming && incoming.dataByPeriod){ reportData.date = incoming.date || reportData.date; reportData.dataByPeriod = incoming.dataByPeriod; const periods=Object.keys(reportData.dataByPeriod); currentPeriod = periods.includes('1일') ? '1일' : periods[0]; renderPeriodSelector(periods); updateAllViews(); } else { alert(`${ds} 데이터 구조가 올바르지 않습니다.`); } } else { alert(`${ds} 데이터가 없습니다.`); } } catch(e){ alert(`${ds} 데이터를 불러오지 못했습니다.`); } toggleCalendar();}

function updateAllViews(){renderBriefing();renderNews();renderPortfolio();renderRecommend();}
function getCurrentData(){return reportData.dataByPeriod[currentPeriod]||{};} function isMacroPeriod(){return currentPeriod.includes('월')||currentPeriod.includes('년');}
function getSignalData(score){if(score<=-60)return{text:"🧊 풀매도",cls:"sig-ss",color:"#1B64DA"};if(score<=-20)return{text:"📉 매도",cls:"sig-s",color:"#3182F6"};if(score<=19)return{text:"⏸️ 보유",cls:"sig-h",color:"#6B7684"};if(score<=59)return{text:"📈 매수",cls:"sig-b",color:"#F04452"};return{text:"🔥 풀매수",cls:"sig-sb",color:"#D9042B"};}
function renderSources(sources, id){ if(!sources || !sources.length) return ''; const sourceNameMap={kb_research:'KB증권', mirae_research:'미래에셋증권', nh_research:'NH투자증권', samsung_research:'삼성증권', jpm_insights:'JPMorgan', jpm_public:'JPMorgan', nomura_connects:'노무라', ubs_cio:'UBS', federal_reserve_press:'연준', merged_story:'병합이슈', financial_news_multi:'금융뉴스', yahoo_finance:'Yahoo Finance', state:'퀀트수식'}; const items=sources.map(s=>{const broker=sourceNameMap[s.source]||s.source||s.label||'출처'; const title=s.title||s.label||''; const dt=s.published_at||''; return `<div class="source-item"><b>${broker}</b>${title?` — ${title}`:''}${dt?` (${dt})`:''}</div>`;}).join(''); return `<button class="source-toggle" onclick="toggleSourceBox('${id}')">출처 보기</button><div class="source-box" id="${id}" style="display:none;">${items}</div>`; }
function toggleSourceBox(id){ const el=document.getElementById(id); if(!el) return; el.style.display = el.style.display==='none' ? 'block' : 'none'; }
function renderBriefing(){const container=document.getElementById('tab-briefing');const data=getCurrentData().briefing;if(!data){container.innerHTML=`<div class="empty-state">해당 기간의 브리핑 데이터가 없습니다.</div>`;return;}let html='';const macro=isMacroPeriod();if(data.sentiment){const s=data.sentiment;let barColor=s.score>50?'#F04452':'#3182F6';let statusColor=s.score>50?'#F04452':'#3182F6';const titleText=macro?`${currentPeriod} 시장 과열/침체 온도 🌡️`:'오늘의 단기 시장 온도 🌡️';html+=`<div class="card"><div class="card-title">${titleText}</div><div class="sentiment-container"><div class="sentiment-header"><div class="sentiment-score">${s.score}<span style="font-size:14px; color:#8B95A1;"> / 100</span></div><div class="sentiment-status" style="color:${statusColor};">${s.status}</div></div><div class="sentiment-bar-bg"><div class="sentiment-bar-fill" style="width: ${s.score}%; background-color: ${barColor};"></div></div><div class="sentiment-desc">${s.desc}</div></div></div>`;}if(data.forecast){const f=data.forecast;html+=`<div class="card" style="padding:0; box-shadow:none; background:transparent;"><div class="forecast-box"><div class="forecast-title"><span>${currentPeriod} 전망</span>${f.title}</div><div class="forecast-text">${f.text}</div>${renderSources(f.sources,'src-forecast')}</div></div>`;}if(data.insights&&data.insights.length>0){const titleText=macro?`${currentPeriod} 거시경제 핵심 인사이트 💡`:`${currentPeriod} 단기 시황 브리핑 💡`;html+=`<div class="card"><div class="card-title">${titleText}</div><ul class="insight-list">`;data.insights.forEach((insight,i)=>{html+=`<li class="insight-item"><span class="badge-category">${insight.category}</span><div class="insight-text">${insight.text}${renderSources(insight.sources, 'src-ins-'+i)}</div></li>`;});html+=`</ul></div>`;}if(data.indices&&data.indices.length>0){html+=`<div class="card"><div class="card-title">${currentPeriod} 누적 지수 성과</div>`;data.indices.forEach(idx=>{const colorClass=idx.isUp?'text-up':'text-down';html+=`<div class="index-row"><div class="index-name">${idx.name}</div><div class="index-value"><div class="index-price">${idx.price}</div><div class="${colorClass}">${idx.change}</div></div></div>`;});html+=`</div>`;}container.innerHTML=html;}
function renderNews(){const container=document.getElementById('tab-news');const data=getCurrentData().newsList;if(!data||data.length===0){container.innerHTML=`<div class="empty-state">해당 기간의 이슈 데이터가 없습니다.</div>`;return;}let html='';const macro=isMacroPeriod();data.forEach((news,i)=>{let tagsHtml=(news.tags||[]).map(tag=>`<div class="chip">${tag}</div>`).join('');let impactsHtml='';if(news.impacts&&news.impacts.length>0){const impactTitle=macro?`${currentPeriod} 누적 펀더멘털 영향도`:`단기 섹터 투심 영향도`;impactsHtml+=`<div class="impact-tree"><div class="impact-tree-title">${impactTitle}</div>`;news.impacts.forEach(impact=>{const dotClass=impact.isPositive?'dot-red':'dot-blue';const badgeClass=impact.isPositive?'badge-positive':'badge-negative';const badgeText=impact.isPositive?'긍정':'부정';impactsHtml+=`<div class="impact-node"><div class="node-header"><div class="node-dot ${dotClass}">●</div><div class="node-title">${impact.sector} <span class="badge ${badgeClass}">${badgeText}</span></div></div><div class="node-desc">${impact.desc}</div></div>`;});impactsHtml+=`</div>`;}html+=`<div class="card"><div class="card-title" style="font-size: 20px;">${news.title}</div><div class="chip-group">${tagsHtml}</div><p style="font-size: 15px; color: #4E5968; margin-bottom: 24px;">${news.summary}</p>${renderSources(news.sources,'src-news-'+i)}${impactsHtml}</div>`;});container.innerHTML=html;}
function renderPortfolio(){const container=document.getElementById('tab-portfolio');const p=getCurrentData().portfolio;if(!p){container.innerHTML=`<div class="empty-state">포트폴리오 분석 데이터가 없습니다.</div>`;return;}const macro=isMacroPeriod();let html=`<div class="account-card"><div class="account-alert">${p.accountAlert}</div><div class="account-detail">${p.accountDetail}</div></div>`;if(p.holdings&&p.holdings.length>0){const signalDesc=macro?"장기 이평선 및 기업 펀더멘털 알고리즘 기반 중장기 시그널입니다.":"RSI, 볼린저밴드 등 단기 수급 및 기술적 지표 기반 시그널입니다.";html+=`<div class="card"><div class="card-title">🎯 내 보유 종목 AI 시그널</div><div style="font-size: 13px; color: #8B95A1; margin-bottom: 16px;">${signalDesc}</div>`;p.holdings.forEach(item=>{const sig=getSignalData(item.score);const returnColor=item.returnRate.includes('+')?'#F04452':'#3182F6';const markerPos=(item.score+100)/2;const indHtml=item.indicators.map(ind=>`<span class="sig-ind">${ind}</span>`).join('');html+=`<div class="signal-box"><div class="signal-header"><div class="signal-stock-info"><span class="signal-stock-name">${item.name}</span><span class="signal-stock-ticker">${item.ticker} <span style="font-weight:700; color:${returnColor}; margin-left:6px;">${item.returnRate}</span></span></div><div class="signal-badge ${sig.cls}">${sig.text}</div></div><div class="signal-bar-wrap"><div class="signal-bar-label">-100</div><div class="signal-bar-track"><div class="signal-bar-marker" style="left: ${markerPos}%; border-color: ${sig.color};"></div></div><div class="signal-bar-label">+100</div></div><div class="signal-indicators">${indHtml}</div><div class="signal-reason">${item.reason}</div></div>`;});html+=`</div>`;}html+=`<div class="card"><div class="card-title">📊 ${currentPeriod} 포트폴리오 성과</div><div style="font-size: 13px; color: #8B95A1; margin-bottom: 4px;">해당 기간 누적 수익률</div><div style="font-size: 16px; font-weight: 700; color: #191F28; margin-bottom: 16px; color: #3182F6;">${p.weeklyReview.returnRate}</div><p style="font-size: 14px; color: #4E5968;">${p.weeklyReview.desc}</p></div>`;if(p.allocations&&p.allocations.length>0){let barHtml='';let listHtml='';p.allocations.forEach(alloc=>{barHtml+=`<div style="width: ${alloc.percent}%; background-color: ${alloc.color};"></div>`;listHtml+=`<div class="alloc-item"><div class="alloc-dot" style="background-color: ${alloc.color};"></div><div><div class="alloc-name">${alloc.name} (${alloc.percent}%)</div><div class="alloc-desc">${alloc.desc}</div></div></div>`;});const allocTitle=macro?"장기 전략적 자산 배분 (SAA)":"단기 전술적 자산 배분 (TAA)";html+=`<div class="card"><div class="card-title">📅 ${allocTitle}</div><p style="font-size: 14px; color: #4E5968; margin-bottom: 16px;">${p.planDesc}</p><div class="allocation-bar">${barHtml}</div>${listHtml}</div>`;}container.innerHTML=html;}
function renderRecommend(){const container=document.getElementById('tab-recommend');const r=getCurrentData().recommendations;if(!r){container.innerHTML=`<div class="empty-state">해당 기간의 추천 종목 데이터가 없습니다.</div>`;return;}let html='';const macro=isMacroPeriod();if(r.ideas&&r.ideas.length>0){const ideaTitle=macro?"장기 메가 트렌드 투자 아이디어":"단기 모멘텀 투자 아이디어";html+=`<div class="card" style="background-color: transparent; box-shadow: none; padding: 0; margin: 0 20px 24px 20px;"><div class="card-title" style="padding-left: 4px;">💡 ${ideaTitle}</div>`;r.ideas.forEach(rec=>{html+=`<div style="margin-bottom: 20px;"><div class="stock-item" style="margin-bottom: 0; border-bottom-left-radius: 0; border-bottom-right-radius: 0;"><div class="stock-info"><div class="stock-logo">${rec.logo}</div><div><div class="stock-name">${rec.name}</div><div class="stock-ticker">${rec.ticker}</div></div></div><div class="stock-action">${rec.action}</div></div><div class="stock-reason-box"><div class="badge-issue">🔗 연관 테마: ${rec.linkedIssue}</div><div style="font-size: 14px; color: #4E5968; line-height: 1.5;">${rec.reason}</div></div></div>`;});html+=`</div>`;}if(r.etfRanking&&r.etfRanking.length>0){const rankDesc=macro?"EPS 성장, 장기 거래량, 200일선 지표를 종합한 장기 펀더멘털 점수입니다.":"일일 변동성, RSI, 단기 수급을 종합한 단기 트레이딩 점수입니다.";html+=`<div class="card"><div class="card-title">🔥 AI 모멘텀 ETF 랭킹</div><div style="font-size: 13px; color: #8B95A1; margin-bottom: 16px;">${rankDesc}</div><div class="ranking-list">`;r.etfRanking.forEach(etf=>{const rankClass=etf.rank<=3?'top-rank':'';const barColor=etf.score>=80?'#F04452':(etf.score>=50?'#3182F6':'#8B95A1');html+=`<div class="rank-item"><div class="rank-num ${rankClass}">${etf.rank}</div><div class="rank-info"><div class="rank-title-box"><div><span class="rank-name">${etf.name}</span><span class="rank-ticker">${etf.ticker}</span></div><div class="rank-score-text">${etf.score}점</div></div><div class="rank-bar-bg"><div class="rank-bar-fill" style="width: ${etf.score}%; background-color: ${barColor};"></div></div></div></div>`;});html+=`</div></div>`;}container.innerHTML=html===''?`<div class="empty-state">해당 기간의 추천 종목 데이터가 없습니다.</div>`:html;}
function switchTab(tabId){document.querySelectorAll('.tab-item').forEach(item=>item.classList.remove('active'));const clickedTab=Array.from(document.querySelectorAll('.tab-item')).find(item=>item.getAttribute('onclick').includes(tabId));if(clickedTab) clickedTab.classList.add('active');document.querySelectorAll('.tab-pane').forEach(pane=>pane.classList.remove('active'));const activePane=document.getElementById('tab-'+tabId);if(activePane) activePane.classList.add('active');if(clickedTab) clickedTab.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });}
window.onload=renderApp;
</script>
