<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>글로벌 매크로·ETF 리포트</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #eef2f7;
      color: #1f2937;
      overflow: hidden;
    }
    .app {
      max-width: 560px;
      margin: 0 auto;
      height: 100dvh;
      background: #f6f8fb;
      display: flex;
      flex-direction: column;
    }
    .top {
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 12px 10px;
    }
    .title {
      font-size: 21px;
      font-weight: 800;
      color: #111827;
      margin: 0 0 6px;
      letter-spacing: -0.02em;
      display: none;
    }
    .sub {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      justify-content: space-between;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 12px;
    }
    #contextText {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 800;
      color: #111827;
    }
    .status-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      white-space: nowrap;
    }
    .status-full { background: #e8f7ed; color: #137333; }
    .status-partial { background: #fff4e5; color: #b06000; }
    .status-sparse { background: #e8f3ff; color: #1b64da; }
    .status-empty { background: #f3f4f6; color: #6b7280; }
    .summary-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      margin-bottom: 10px;
    }
    .summary-strip::-webkit-scrollbar { display: none; }
    .summary-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .control-line {
      display: grid;
      grid-template-columns: 1fr 138px;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .selector-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .selector-row::-webkit-scrollbar { display: none; }
    .chip {
      border: none;
      background: #e5e7eb;
      color: #4b5563;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      cursor: pointer;
      flex-shrink: 0;
    }
    .chip.active { background: #111827; color: #ffffff; }
    .bucket-select {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: #f3f4f6;
      color: #111827;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 800;
      outline: none;
    }
    .tab-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .tab-row::-webkit-scrollbar { display: none; }
    .tab {
      border: none;
      background: #f3f4f6;
      color: #6b7280;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      padding: 10px 12px;
      cursor: pointer;
      position: relative;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tab.active { color: #111827; background: #e8eefc; }
    .tab.active::after {
      display: none;
    }
    .content {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .pane {
      display: none;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 0 28px;
    }
    .pane.active { display: block; }
    .card, .idea, .action-card, .hero {
      margin: 0 12px 12px;
    }
    .card, .action-card, .idea {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(15, 23, 42, 0.04);
    }
    .card, .action-card { padding: 16px; }
    .hero {
      background: linear-gradient(135deg, #f8fbff 0%, #eef4ff 100%);
      color: #111827;
      border-radius: 20px;
      padding: 18px;
      border: 1px solid #e6eefc;
    }
    .card-title, .hero-title {
      font-size: 17px;
      font-weight: 800;
      color: #111827;
      margin: 0 0 12px;
      line-height: 1.4;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    .hero-title { color: #111827; margin-bottom: 8px; }
    .muted, .body-text, .forecast-text, .hero-text, .detail-item, .impact-desc, .source-item, .alloc-desc {
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    .muted {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.55;
    }
    .body-text, .forecast-text, .hero-text {
      font-size: 14px;
      line-height: 1.7;
    }
    .body-text, .forecast-text { color: #4b5563; }
    .hero-text { color: #4b5563; }
    .score-wrap { margin-bottom: 16px; }
    .score-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 10px;
      margin-bottom: 8px;
    }
    .score-num {
      font-size: 26px;
      font-weight: 800;
      color: #111827;
      white-space: nowrap;
    }
    .score-status { font-size: 13px; font-weight: 800; }
    .score-track {
      height: 8px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }
    .score-fill { height: 100%; border-radius: 999px; }
    .forecast-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px;
    }
    .forecast-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #111827;
      color: #ffffff;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .stat-chip-group, .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .stat-chip .label { opacity: 0.75; }
    .tone-score { background: #eef2ff; color: #1d4ed8; }
    .tone-market { background: #eff6ff; color: #2563eb; }
    .tone-risk { background: #fff7ed; color: #c2410c; }
    .tone-signal { background: #f0fdf4; color: #15803d; }
    .tone-macro { background: #f5f3ff; color: #6d28d9; }
    .tone-default { background: #f3f4f6; color: #374151; }
    .list, .detail-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .list-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px 0;
      border-bottom: 1px dashed #e5e7eb;
    }
    .list-item:last-child { border-bottom: none; padding-bottom: 0; }
    .detail-item {
      font-size: 13px;
      color: #4b5563;
      padding: 10px 0;
      border-top: 1px dashed #e5e7eb;
      line-height: 1.68;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      align-self: flex-start;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #1d4ed8;
      font-size: 11px;
      font-weight: 800;
    }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .metric-card {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #ffffff;
      padding: 12px;
    }
    .metric-name {
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .metric-price {
      font-size: 15px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 4px;
    }
    .text-up { color: #e11d48; font-size: 12px; font-weight: 800; }
    .text-down { color: #2563eb; font-size: 12px; font-weight: 800; }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #4b5563;
      font-size: 11px;
      font-weight: 800;
    }
    .impact-title {
      font-size: 12px;
      font-weight: 800;
      color: #6b7280;
      margin: 14px 0 8px;
    }
    .impact-item {
      padding: 10px 0;
      border-bottom: 1px dashed #e5e7eb;
    }
    .impact-item:last-child { border-bottom: none; }
    .impact-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .impact-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .impact-dot.pos { background: #e11d48; }
    .impact-dot.neg { background: #2563eb; }
    .impact-name {
      font-size: 13px;
      font-weight: 800;
      color: #111827;
    }
    .impact-desc {
      font-size: 13px;
      line-height: 1.6;
      color: #6b7280;
    }
    .alloc-bar {
      display: flex;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      margin: 14px 0 16px;
    }
    .alloc-item {
      display: flex;
      align-items: start;
      gap: 10px;
      margin-bottom: 12px;
    }
    .alloc-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-top: 4px;
    }
    .alloc-name {
      font-size: 13px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 4px;
    }
    .alloc-desc {
      font-size: 12px;
      line-height: 1.55;
      color: #6b7280;
    }
    .idea {
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }
    .idea-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
      padding: 14px;
      background: #f8fafc;
    }
    .idea-left {
      display: flex;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }
    .idea-logo { font-size: 22px; }
    .idea-name {
      font-size: 14px;
      font-weight: 800;
      color: #111827;
      line-height: 1.4;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    .idea-ticker {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.4;
      word-break: break-all;
    }
    .idea-action {
      background: #eff6ff;
      color: #1d4ed8;
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .idea-body { padding: 14px; }
    .issue-badge {
      display: inline-flex;
      padding: 5px 8px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #4b5563;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .rank-item {
      display: flex;
      gap: 10px;
      align-items: start;
      padding: 12px 0;
      border-bottom: 1px dashed #e5e7eb;
    }
    .rank-item:last-child { border-bottom: none; }
    .rank-num {
      width: 24px;
      font-size: 15px;
      font-weight: 800;
      color: #9ca3af;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .rank-info { flex: 1; min-width: 0; }
    .rank-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: start;
      margin-bottom: 6px;
    }
    .rank-name {
      font-size: 13px;
      font-weight: 800;
      color: #111827;
      line-height: 1.5;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    .rank-ticker {
      display: inline-flex;
      font-size: 10px;
      color: #6b7280;
      background: #f3f4f6;
      border-radius: 999px;
      padding: 2px 8px;
      margin-left: 6px;
      word-break: break-all;
    }
    .rank-score {
      font-size: 12px;
      font-weight: 800;
      color: #2563eb;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .rank-track {
      height: 6px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }
    .rank-fill {
      height: 100%;
      background: #2563eb;
      border-radius: 999px;
    }
    .source-slot { margin-top: 12px; }
    .source-toggle {
      border: none;
      background: transparent;
      color: #64748b;
      padding: 0;
      border-radius: 0;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }
    .source-box {
      display: none;
      margin-top: 10px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px;
    }
    .source-item {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .source-item:last-child { margin-bottom: 0; }
    .action-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .action-badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      background: #111827;
      color: #ffffff;
      font-size: 11px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: #9ca3af;
      font-size: 15px;
    }
    @media (max-width: 430px) {
      .title { font-size: 19px; }
      .control-line { grid-template-columns: 1fr 126px; }
      .tab { font-size: 13px; }
      .card, .idea, .action-card, .hero { margin: 0 10px 10px; }
      .card, .action-card, .hero { padding: 15px; }
      .body-text, .forecast-text, .hero-text { font-size: 13.5px; line-height: 1.74; }
      .metric-grid { grid-template-columns: 1fr 1fr; }
      .key-stat-grid { grid-template-columns: 1fr; margin: 0 10px 10px; }
      .priority-card, .narrative-card, .selector-strip { margin-left: 10px; margin-right: 10px; }
      .priority-metrics, .detail-grid, .account-split { grid-template-columns: 1fr; }
      .selector-chip { min-width: 84%; }
      .top { padding-left: 10px; padding-right: 10px; }
      .tab-row { gap: 6px; }
      .tab { padding: 9px 11px; }
      .card-title, .hero-title, .narrative-title { line-height: 1.35; }
      .sub { gap: 6px; }
      #contextText { font-size: 12px; }
    }
    /* Sub-tabs */
    .sub-tab-bar {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 12px 12px 0;
      background: #f6f8fb;
      flex-shrink: 0;
    }
    .sub-tab-bar::-webkit-scrollbar { display: none; }
    .sub-tab-btn {
      border: none;
      background: #e5e7eb;
      color: #4b5563;
      border-radius: 8px 8px 0 0;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .sub-tab-btn.active { background: #fff; color: #111827; box-shadow: 0 -2px 8px rgba(0,0,0,0.06); }
    .sub-tab-score { font-size: 10px; font-weight: 700; padding: 1px 4px; background: rgba(0,0,0,0.06); border-radius: 4px; }
    /* Direction score */
    .dir-score-wrap { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .dir-score-num { font-size: 36px; font-weight: 900; letter-spacing: -0.03em; }
    .dir-regime-badge { padding: 6px 12px; border-radius: 8px; background: #f3f4f6; font-size: 12px; font-weight: 700; color: #374151; }
    /* Signal rows */
    .signal-row { padding: 10px 0; border-bottom: 1px solid #f3f4f6; }
    .signal-row:last-child { border-bottom: none; }
    .signal-row-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .signal-name { font-size: 14px; font-weight: 700; color: #111827; }
    .signal-ticker { font-size: 11px; color: #9ca3af; margin-left: 5px; font-weight: 400; }
    .signal-grade { font-size: 12px; font-weight: 800; }
    .signal-label { font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 999px; color: #fff; }
    .signal-meta { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
    .signal-reason { font-size: 12px; color: #374151; margin-bottom: 3px; }
    .signal-cond { font-size: 11px; color: #6b7280; }
    /* Valuation */
    .val-table { display: flex; flex-direction: column; gap: 6px; }
    .val-row { display: flex; gap: 8px; align-items: center; font-size: 12px; flex-wrap: wrap; }
    .val-name { font-weight: 800; min-width: 60px; }
    .val-grade { font-weight: 700; min-width: 70px; }
    .val-detail { flex: 1; font-size: 11px; }
    /* Sector calls */
    .sector-call { padding: 6px 0; border-bottom: 1px solid #f3f4f6; font-size: 12px; }
    .sector-call:last-child { border-bottom: none; }
    .sector-view { font-weight: 800; margin-right: 4px; }
    /* Insight badge */
    .insight-badge { padding: 4px 10px; border-radius: 999px; background: #dbeafe; color: #1d4ed8; font-size: 12px; font-weight: 800; }

    .key-stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 0 12px 12px;
    }
    .key-stat {
      background: #ffffff;
      border-radius: 18px;
      padding: 16px 14px;
      box-shadow: 0 2px 12px rgba(15, 23, 42, 0.04);
    }
    .key-stat-label {
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .key-stat-value {
      font-size: 18px;
      font-weight: 900;
      color: #111827;
      line-height: 1.28;
      letter-spacing: -0.03em;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    .key-stat-sub {
      margin-top: 6px;
      font-size: 11px;
      line-height: 1.5;
      color: #64748b;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }
    .info-button {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 50%;
      background: #eef2ff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      flex-shrink: 0;
    }
    .coach-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: none;
      background: #f3f6fb;
      color: #334155;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }
    .account-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .account-card {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 15px 14px;
    }
    .account-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .account-name {
      font-size: 15px;
      font-weight: 900;
      color: #111827;
      line-height: 1.35;
    }
    .account-cash {
      font-size: 17px;
      font-weight: 900;
      color: #111827;
      white-space: nowrap;
      letter-spacing: -0.03em;
    }
    .account-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .mini-metric {
      background: #ffffff;
      border-radius: 14px;
      padding: 11px 12px;
      border: 1px solid #eef2f7;
    }
    .mini-metric-label {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .mini-metric-value {
      font-size: 14px;
      font-weight: 800;
      color: #111827;
    }
    .account-comment {
      font-size: 13px;
      line-height: 1.68;
      color: #475569;
    }
    .toggle-bar {
      display: inline-flex;
      gap: 6px;
      padding: 4px;
      background: #f3f4f6;
      border-radius: 999px;
      margin-bottom: 14px;
    }
    .toggle-btn {

</head>
<body>
  <div class="app">
    <div class="top">
      <div class="sub">
        <span id="contextText">데이터 로딩 중...</span>
        <span id="statusBadge"></span>
      </div>
      <div class="tab-row">
        <button class="tab active" data-tab="portfolio" onclick="switchSection('portfolio')">포트폴리오</button>
        <button class="tab" data-tab="rebalancing" onclick="switchSection('rebalancing')">실행 가이드</button>
        <button class="tab" data-tab="direction" onclick="switchSection('direction')">기간별 투자 방향성</button>
        <button class="tab" data-tab="briefing" onclick="switchSection('briefing')">시장 브리핑</button>
        <button class="tab" data-tab="news" onclick="switchSection('news')">핵심 이슈</button>
        <button class="tab" data-tab="recommendations" onclick="switchSection('recommendations')">ETF 아이디어</button>
      </div>
    </div>

    <div class="content">
      <div id="pane-portfolio" class="pane active"></div>
      <div id="pane-rebalancing" class="pane"></div>
      <div id="pane-direction" class="pane"></div>
      <div id="pane-briefing" class="pane"></div>
      <div id="pane-news" class="pane"></div>
      <div id="pane-recommendations" class="pane"></div>
    </div>
  </div>
  <div id="sheetOverlay" class="sheet-overlay" onclick="closeSheet(event)">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <div id="sheetTitle" class="sheet-title">안내</div>
        <button class="sheet-close" onclick="closeSheet()" aria-label="닫기">×</button>
      </div>
      <div id="sheetBody" class="sheet-body"></div>
    </div>
  </div>

  <script>
    const REPO_PREFIX = window.location.pathname.includes('/igzun-daily-report/') ? '/igzun-daily-report' : '';
    const SITE_BASE = `${REPO_PREFIX}/site`;
    const HORIZON_ORDER = ['1일', '1주', '1개월', '3개월', '6개월'];
    const HORIZON_LABELS = {
      '1일': '일간',
      '1주': '주간',
      '1개월': '월간',
      '3개월': '분기',
      '6개월': '반기',
    };
    const state = {
      index: null,
      currentHorizon: '1일',
      currentBucketId: '',
      currentView: null,
      horizonViews: {},
      currentSection: 'portfolio',
      currentActionIndex: 0,
      portfolioTargetMode: 'total',
      sectionScrolls: {},
      sheetStore: {},
    };

    function statusClass(status) {
      return {
        full: 'status-badge status-full',
        partial: 'status-badge status-partial',
        sparse: 'status-badge status-sparse',
        empty: 'status-badge status-empty',
      }[status] || 'status-badge status-empty';
    }

    function statusText(status) {
      return {
        full: '데이터 충분',
        partial: '데이터 부분',
        sparse: '데이터 제한',
        empty: '데이터 없음',
      }[status] || status;
    }

    function currentBucket() {
      const buckets = (state.index?.horizons?.[state.currentHorizon]) || [];
      return buckets.find(item => item.id === state.currentBucketId) || null;
    }

    function defaultBucketForHorizon(horizon) {
      const buckets = (state.index?.horizons?.[horizon]) || [];
      return buckets.length ? buckets[0].id : '';
    }

    function formatContext(view, bucket) {
      if (!view || !bucket) return '표시할 데이터가 없습니다.';
      return `${bucket.label} · 최신 일간 기준 · ${view.fromDate} ~ ${view.toDate}`;
    }

    function renderStatus(status) {
      const el = document.getElementById('statusBadge');
      el.className = statusClass(status);
      el.textContent = statusText(status);
    }

    async function loadIndex() {
      const res = await fetch(`${SITE_BASE}/horizon_index.json?t=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) throw new Error('index load failed');
      state.index = await res.json();
    }

    function resolveInitialSelection() {
      state.currentHorizon = '1일';
      state.currentBucketId = state.index?.latestDailyDate || defaultBucketForHorizon('1일');
    }

    function renderHorizonSelector() {
      const container = document.getElementById('horizonSelector');
      if (!container) return;
      const horizons = Object.keys(state.index?.horizons || {});
      container.innerHTML = horizons.map(horizon => {
        const active = horizon === state.currentHorizon ? 'active' : '';
        return `<button class="chip ${active}" onclick="changeHorizon('${horizon}')">${horizon}</button>`;
      }).join('');
    }

    function renderBucketSelector() {
      const select = document.getElementById('bucketSelect');
      if (!select) return;
      const buckets = (state.index?.horizons?.[state.currentHorizon]) || [];
      select.innerHTML = buckets.map(bucket => `
        <option value="${bucket.id}" ${bucket.id === state.currentBucketId ? 'selected' : ''}>${bucket.label}</option>
      `).join('');
    }

    function renderSummaryStrip() {}

    function renderStatChips(items) {
      if (!items || !items.length) return '';
      return `
        <div class="stat-chip-group">
          ${items.map(item => `
            <span class="stat-chip tone-${item.tone || 'default'}">
              <span class="label">${item.label || ''}</span>
              <span class="value">${item.value || ''}</span>
            </span>
          `).join('')}
        </div>
      `;
    }

    function registerSheet(id, title, html) {
      state.sheetStore[id] = { title, html };
      return id;
    }

    function openSheet(id) {
      const payload = state.sheetStore[id];
      if (!payload) return;
      document.getElementById('sheetTitle').textContent = payload.title || '안내';
      document.getElementById('sheetBody').innerHTML = payload.html || '';
      document.getElementById('sheetOverlay').classList.add('open');
    }

    function closeSheet(event) {
      if (event && event.target && event.target !== event.currentTarget) return;
      document.getElementById('sheetOverlay').classList.remove('open');
    }

    function renderSources(sources, id) {
      if (!sources || !sources.length) return '';
      const items = sources.map(item => {
        const label = item.label || item.source || '출처';
        const title = item.title ? ` — ${item.title}` : '';
        const date = item.published_at ? ` (${item.published_at})` : '';
        const meta = [item.region, item.sector].filter(Boolean).join(' · ');
        const url = item.url ? ` · <a href="${item.url}" target="_blank" rel="noreferrer">원문</a>` : '';
        return `<div class="source-item"><b>${label}</b>${title}${date}${meta ? ` · ${meta}` : ''}${url}</div>`;
      }).join('');
      const sheetId = registerSheet(id, '출처·메타데이터', items);
      return `
        <div class="meta-footer">
          <div class="meta-footnote">근거가 궁금하면 출처와 날짜를 열어 확인할 수 있습니다.</div>
          <button class="source-toggle" onclick="openSheet('${sheetId}')">출처 ${sources.length}개 보기</button>
        </div>
      `;
    }

    function snippet(text, limit = 180) {
      if (!text) return '';
      const value = String(text).trim();
      if (value.length <= limit) return value;
      return `${value.slice(0, limit).trim()}...`;
    }

    function resetPaneScrolls() {
      document.querySelectorAll('.pane').forEach(pane => {
        pane.scrollTop = 0;
      });
      state.sectionScrolls = {};
    }

    function updateHeader() {
      const bucket = currentBucket();
      document.getElementById('contextText').textContent = formatContext(state.currentView, bucket);
      renderStatus(state.currentView?.dataStatus || 'empty');
      document.title = bucket ? `${bucket.label} · 글로벌 매크로·ETF 리포트` : '글로벌 매크로·ETF 리포트';
    }

    function syncUrl() {
      const latest = state.index?.latestDailyDate || state.currentBucketId;
      if (!latest) return;
      const url = `${REPO_PREFIX}/site/${latest}/`;
      window.history.replaceState({}, '', url);
    }

    async function changeHorizon(horizon) {
      state.currentHorizon = horizon;
      state.currentBucketId = defaultBucketForHorizon(horizon);
      renderHorizonSelector();
      renderBucketSelector();
      await loadCurrentView();
    }

    async function changeBucket(bucketId) {
      state.currentBucketId = bucketId;
      renderBucketSelector();
      await loadCurrentView();
    }

    async function loadCurrentView() {
      const bucket = currentBucket();
      if (!bucket) {
        state.currentView = null;
        updateHeader();
        renderAll();
        return;
      }
      const res = await fetch(`${SITE_BASE}/${bucket.source}?t=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) throw new Error('view load failed');
      state.currentView = await res.json();
      state.currentActionIndex = 0;
      state.portfolioTargetMode = 'total';
      updateHeader();
      renderAll();
      resetPaneScrolls();
      syncUrl();
    }

    async function loadDirectionViews() {
      const loaded = {};
      for (const horizon of HORIZON_ORDER) {
        const bucket = (state.index?.horizons?.[horizon] || [])[0];
        if (!bucket) continue;
        const res = await fetch(`${SITE_BASE}/${bucket.source}?t=${Date.now()}`, { cache: 'no-store' });
        if (!res.ok) continue;
        loaded[horizon] = await res.json();
      }
      state.horizonViews = loaded;
    }

    function switchSection(section) {
      const currentPane = document.getElementById(`pane-${state.currentSection}`);
      if (currentPane) state.sectionScrolls[state.currentSection] = currentPane.scrollTop;
      state.currentSection = section;
      document.querySelectorAll('.tab').forEach(tab => tab.classList.toggle('active', tab.dataset.tab === section));
      document.querySelectorAll('.pane').forEach(pane => pane.classList.toggle('active', pane.id === `pane-${section}`));
      const nextPane = document.getElementById(`pane-${section}`);
      if (nextPane) nextPane.scrollTop = state.sectionScrolls[section] || 0;
    }

    function marketActionMeta(score, marketSignal) {
      const action = marketSignal?.action || '';
      if (action) {
        return {
          title: action,
          desc: marketSignal?.note || '현재 시장 신호를 기준으로 현금과 위험자산의 속도를 조절합니다.',
        };
      }
      if (score >= 65) return { title: '선별 매수 가능', desc: '추세가 비교적 안정적이라 코어 자산을 중심으로 비중을 늘려볼 수 있습니다.' };
      if (score >= 50) return { title: '중립 대응', desc: '공격적으로 추격하기보다 분할 진입과 현금 유지가 함께 필요합니다.' };
      return { title: '현금 우위', desc: '리스크가 높아 보여서 현금과 방어 자산 비중을 먼저 챙기는 편이 유리합니다.' };
    }

    function allocationTone(diff) {
      if (Math.abs(diff) <= 3) return { label: '적정', className: 'status-hold' };
      if (diff < 0) return { label: '보완 필요', className: 'status-up' };
      return { label: '조정 필요', className: 'status-down' };
    }

    function renderAllocationRows(score, targetAmounts) {
      if (!score) return '';
      const colors = Object.fromEntries((targetAmounts || []).map(item => [item.name, item.color]));
      return Object.keys(score.currentPct || {}).map(name => {
        const current = Number(score.currentPct?.[name] || 0);
        const target = Number(score.targetPct?.[name] || 0);
        const tone = allocationTone(current - target);
        const color = colors[name] || '#2563eb';
        const fillWidth = Math.max(4, Math.min(100, current));
        const markerLeft = Math.max(0, Math.min(100, target));
        return `
          <div class="allocation-row">
            <div class="allocation-head">
              <div class="allocation-left">
                <div class="allocation-title">${name}</div>

      pane.innerHTML = `
        <div class="priority-card">
          <div class="priority-label">단기 실행 가이드</div>
          <div class="priority-head">
            <div>
              <div class="priority-title">${marketAction}</div>
              <div class="priority-sub">${marketGuide}</div>
            </div>
          </div>
          <div class="priority-metrics">
            <div class="priority-metric">
              <div class="priority-metric-label">시장 배치 가능 비중</div>
              <div class="priority-metric-value">${signals.marketSignal?.deployablePct != null ? `${signals.marketSignal.deployablePct}%` : '-'}</div>
            </div>
            <div class="priority-metric">
              <div class="priority-metric-label">오늘 1차 진입</div>
              <div class="priority-metric-value">${current?.todayAmount || '-'}</div>
            </div>
            <div class="priority-metric">
              <div class="priority-metric-label">집행 리듬</div>
              <div class="priority-metric-value">${current?.executionStyle || '-'}</div>
            </div>
            <div class="priority-metric">
              <div class="priority-metric-label">보류 조건</div>
              <div class="priority-metric-value">${current?.pauseRule || '-'}</div>
            </div>
          </div>
        </div>
        ${selector ? `<div class="selector-strip">${selector}</div>` : '<div class="empty">실행 액션 데이터가 없습니다.</div>'}
        ${current ? `
          <div class="action-card">
            <div class="action-top">
              <div>
                <div class="card-title" style="font-size:16px; margin-bottom:6px;">${current.account || '-'} · ${current.name || '-'}</div>
                <div class="muted">${current.ticker || '-'} · 총 배치 ${current.amount || '-'} · ${current.weightHint || ''}</div>
              </div>
              <div class="action-badge">${current.action || '보류'}</div>
            </div>
            <div class="detail-grid">
              <div class="detail-box">
                <div class="detail-box-title">포지션 역할</div>
                <div class="detail-box-text">${current.assetRole || ''}</div>
              </div>
              <div class="detail-box">
                <div class="detail-box-title">비중 힌트</div>
                <div class="detail-box-text">${current.positionHint || ''}</div>
              </div>
              <div class="detail-box">
                <div class="detail-box-title">왜 지금 보는가</div>
                <div class="detail-box-text">${current.reason || ''}</div>
              </div>
              <div class="detail-box">
                <div class="detail-box-title">집행 리듬</div>
                <div class="detail-box-text">${current.executionSummary || ''}</div>
              </div>
            </div>
            ${splitPlan ? `
              <div class="impact-title">3거래일 분할매수 예시</div>
              <div class="schedule-list">${splitPlan}</div>
            ` : ''}
            <div class="detail-grid">
              <div class="detail-box">
                <div class="detail-box-title">추가 매수 조건</div>
                <div class="detail-box-text">${current.addRule || ''}</div>
              </div>
              <div class="detail-box">
                <div class="detail-box-title">보류 조건</div>
                <div class="detail-box-text">${current.pauseRule || ''}</div>
              </div>
              <div class="detail-box">
                <div class="detail-box-title">재점검 기준</div>
                <div class="detail-box-text">${current.reviewRule || ''}</div>
              </div>
              <div class="detail-box">
                <div class="detail-box-title">주의 메모</div>
                <div class="detail-box-text">${current.caution || ''}</div>
              </div>
            </div>
            ${renderSources(current.sources, `rebalance-action-src-${currentIndex}`)}
          </div>
        ` : ''}
        <div class="card">
          <div class="card-title">주석 및 실행 원칙</div>
          <ul class="detail-list">${footnotes}</ul>
          ${renderSources(data.sources, 'rebalance-main-src')}
        </div>
      `;
    }

    function renderDirection() {
      const pane = document.getElementById('pane-direction');

      // Build sub-tab state
      if (!state.currentDirectionTab) state.currentDirectionTab = state.currentHorizon || '1일';

      const tabButtons = HORIZON_ORDER.map(horizon => {
        const view = state.horizonViews?.[horizon];
        const active = horizon === state.currentDirectionTab ? 'active' : '';
        const scoreVal = view?.briefing?.sentiment?.score;
        const scoreColor = !scoreVal ? '' : (scoreVal >= 65 ? '#0f9f6e' : (scoreVal >= 50 ? '#2563eb' : '#f59e0b'));
        const scoreStyle = scoreColor ? `style="color:${scoreColor};"` : '';
        return `<button class="sub-tab-btn ${active}" onclick="switchDirectionTab('${horizon}')">${HORIZON_LABELS[horizon] || horizon}${scoreVal != null ? `<span class="sub-tab-score" ${scoreStyle}>${scoreVal}</span>` : ''}</button>`;
      }).join('');

      const horizon = state.currentDirectionTab;
      const view = state.horizonViews?.[horizon];

      let content = '';
      if (view) {
        const briefing = view.briefing || {};
        const strategy = briefing.strategy || {};
        const forecast = briefing.forecast || {};
        const signals = view.signals || {};
        const valuation = view.valuation || {};
        const llmInsights = view.llmInsights || {};
        const filteredInsights = (briefing.insights || []).filter(item => !['누적요약', '데이터'].includes(item.category || ''));
        const insights = filteredInsights.slice(0, 4).map(item => `
          <div class="insight-card">
            ${item.category ? `<div class="insight-kicker">${item.category}</div>` : ''}
            <div class="body-text">${item.text || ''}</div>
          </div>
        `).join('');
        const deployNow = view.portfolio?.capitalPlan?.deployNow || '-';
        const reserveCash = view.portfolio?.capitalPlan?.reserveCash || '-';
        const executionStyle = view.rebalancing?.actions?.[0]?.executionStyle || '';
        const watchPoint = view.rebalancing?.actions?.[0]?.pauseRule || '';
        const scoreValue = briefing.sentiment?.score;
        const scoreColor = !scoreValue ? '#2563eb' : (scoreValue >= 65 ? '#0f9f6e' : (scoreValue >= 50 ? '#2563eb' : '#f59e0b'));
        const ms = signals.marketSignal || {};
        const actionMeta = marketActionMeta(scoreValue || 50, ms);
        const sp = valuation.sp500 || {};
        const kospi = valuation.kospi || {};
        const valRows = [
          {name:'S&P500', grade:sp.grade, detail:`ERP ${sp.erp != null ? sp.erp.toFixed(1)+'%' : 'N/A'} · PE ${sp.pe || 'N/A'}x · 52W ${sp.range52w != null ? sp.range52w.toFixed(0)+'%' : 'N/A'}`},
          {name:'KOSPI', grade:kospi.grade, detail:`PBR ${kospi.pbr || 'N/A'}x · ${kospi.pbrAssessment || ''}`},
        ].map(r => {
          const gc = r.grade === '저평가' ? '#0f9f6e' : (r.grade === '고평가' || r.grade === '다소 고평가' ? '#dc2626' : '#2563eb');
          return `<div class="val-row"><span class="val-name">${r.name}</span><span class="val-grade" style="color:${gc};">${r.grade || '분석중'}</span><span class="val-detail muted">${r.detail}</span></div>`;
        }).join('');
        const topIdeas = (view.recommendations?.ideas || []).slice(0, 3).map(item => `
          <div class="selector-chip" style="min-width:220px; cursor:default;">
            <div class="selector-chip-top">
              <span class="selector-chip-label">${item.signal || item.action || '관찰'}</span>
              <span class="selector-chip-label">${item.ticker || '-'}</span>
            </div>
            <div class="selector-chip-name">${item.name || '-'}</div>
            <div class="selector-chip-sub">${item.execution || item.reason || ''}</div>
          </div>
        `).join('');
        const keySignals = (llmInsights.keySignals || []).slice(0, 4).map(s => `<li class="detail-item">${s}</li>`).join('');
        const sectorCalls = (llmInsights.sectorCalls || []).slice(0, 3).map(s => `
          <div class="insight-card">
            <div class="insight-kicker">${s.sector || '섹터'} · ${s.view || '중립'}</div>
            <div class="body-text">${s.rationale || ''}</div>
          </div>
        `).join('');
        const scenarioMatrix = (llmInsights.scenarioMatrix || []).slice(0, 3).map(item => `
          <div class="detail-box">
            <div class="detail-box-title">${item.scenario || '시나리오'} · ${item.probability || ''}</div>
            <div class="detail-box-text">${item.trigger || ''}</div>
            ${(item.portfolioResponse || item.portfolio_response) ? `<div class="body-text" style="margin-top:8px;"><b>대응:</b> ${item.portfolioResponse || item.portfolio_response}</div>` : ''}
          </div>
        `).join('');

        content = `
          <div class="card">
            <div class="dir-score-wrap">
              <div>
                <div class="dir-score-num" style="color:${scoreColor};">${scoreValue ?? '-'}<span class="muted" style="font-size:13px;"> /100</span></div>
                <div class="muted" style="font-size:11px; margin-top:2px;">${HORIZON_LABELS[horizon] || horizon} 기준 시장 방향성</div>
              </div>
              <div class="dir-regime-badge">${actionMeta.title}</div>
            </div>
            ${renderStatChips((briefing.metricChips || []).slice(0, 4))}
          </div>
          <div class="narrative-card">
            <div class="narrative-title">${HORIZON_LABELS[horizon] || horizon} 투자 방향</div>
            <div class="body-text">${strategy.summary || forecast.text || '방향성 데이터가 없습니다.'}</div>
            ${llmInsights.timingGuidance ? `<div class="body-text" style="margin-top:10px;"><b>집행 톤:</b> ${llmInsights.timingGuidance}</div>` : ''}
            <div class="detail-grid" style="margin-top:14px;">
              <div class="detail-box">
                <div class="detail-box-title">이번 기간 실행 예산</div>
                <div class="detail-box-text">${deployNow}</div>
              </div>
              <div class="detail-box">
                <div class="detail-box-title">대기 자금</div>
                <div class="detail-box-text">${reserveCash}</div>
              </div>
              <div class="detail-box">
                <div class="detail-box-title">집행 리듬</div>
                <div class="detail-box-text">${executionStyle || '-'}</div>
              </div>
              <div class="detail-box">
                <div class="detail-box-title">보류 조건</div>
                <div class="detail-box-text">${watchPoint || '-'}</div>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-title">핵심 포인트</div>
            <div class="insight-stack">${insights || '<div class="empty" style="padding:20px 0;">핵심 포인트 데이터가 없습니다.</div>'}</div>
          </div>
          ${sp.grade ? `
            <div class="card">
              <div class="card-title">밸류에이션 체크</div>
              <div class="muted" style="margin-bottom:10px;">${valuation.marketValuation || ''}</div>
              <div class="val-table">${valRows}</div>
            </div>
          ` : ''}
          ${topIdeas ? `
            <div class="card">
              <div class="card-title">기간별 ETF 힌트</div>
              <div class="selector-strip" style="margin:0; padding-top:2px;">${topIdeas}</div>
            </div>
          ` : ''}
          ${sectorCalls ? `
            <div class="card">
              <div class="card-title">섹터 시사점</div>
              <div class="insight-stack">${sectorCalls}</div>
            </div>
          ` : ''}
          ${keySignals ? `
            <div class="card">
              <div class="card-title">핵심 시그널</div>
              <ul class="detail-list">${keySignals}</ul>
              ${(llmInsights.riskFactors || []).length ? `
                <div class="impact-title" style="margin-top:12px;">리스크 요인</div>
                <ul class="detail-list">${(llmInsights.riskFactors || []).map(r => `<li class="detail-item">${r}</li>`).join('')}</ul>
              ` : ''}
            </div>
          ` : ''}
          ${scenarioMatrix ? `
            <div class="card">
              <div class="card-title">시나리오 매트릭스</div>
              <div class="detail-grid">${scenarioMatrix}</div>
            </div>
          ` : ''}
        `;
      } else {
        content = `<div class="empty">${horizon} 데이터 로딩 중...</div>`;
      }

      pane.innerHTML = `
        <div class="sub-tab-bar">${tabButtons}</div>
        ${content}
      `;
    }

    function switchDirectionTab(horizon) {
      state.currentDirectionTab = horizon;
      renderDirection();
    }

    function renderRecommendations() {
      const pane = document.getElementById('pane-recommendations');
      const data = state.currentView?.recommendations;
      if (!data) {
        pane.innerHTML = '<div class="empty">ETF 아이디어 데이터가 없습니다.</div>';
        return;
      }
      const ranking = (data.etfRanking || []).map(item => `
        <div class="rank-item">
          <div class="rank-num">${item.rank || '-'}</div>
          <div class="rank-info">
            <div class="rank-head">
              <div class="rank-name">${item.name || '-'}<span class="rank-ticker">${item.ticker || '-'}</span></div>
              <div class="rank-score">${item.score || 0}점</div>
            </div>
            <div class="rank-track"><div class="rank-fill" style="width:${item.score || 0}%;"></div></div>
            <div class="muted" style="margin-top:6px;">${item.commentary || ''}</div>
          </div>
        </div>
      `).join('');
      const ideas = (data.ideas || []).map((item, idx) => `
        <div class="idea">
          <div class="idea-top">
            <div class="idea-left">
              <div class="idea-logo">${item.logo || '📌'}</div>
              <div>
                <div class="idea-name">${item.name || '-'}</div>
                <div class="idea-ticker">${item.ticker || '-'} · ${item.scoreText || ''}</div>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
              <div class="idea-action">${item.action || '관찰'}</div>
              ${item.signal ? `<div style="font-size:11px;font-weight:800;color:${{'강력매수':'#0f9f6e','분할매수':'#2563eb','소규모탐색':'#7c3aed','관망':'#6b7280','비중축소':'#f59e0b','회피':'#dc2626'}[item.signal]||'#6b7280'};">${item.signal}${item.timingGrade ? ' '+item.timingGrade : ''}</div>` : ''}
            </div>
          </div>
          <div class="idea-body">
            <div class="issue-badge">연결 이슈: ${item.linkedIssue || '-'}</div>
            <div class="body-text">${item.reason || ''}</div>
            <div class="body-text" style="margin-top:10px;"><b>매크로 문맥:</b> ${item.macroContext || ''}</div>
            <div class="body-text" style="margin-top:10px;"><b>왜 살 수 있는가:</b> ${item.whyBuy || ''}</div>
            ${(item.evidencePoints || []).length ? `
              <div class="impact-title">근거 포인트</div>
              <ul class="detail-list">
                ${(item.evidencePoints || []).map(point => `<li class="detail-item">${point}</li>`).join('')}
              </ul>
            ` : ''}
            <div class="body-text" style="margin-top:10px;"><b>우려 지점:</b> ${item.risk || ''}</div>
            <div class="body-text" style="margin-top:10px;"><b>권장 비중:</b> ${item.positioning || ''}</div>
            <div class="body-text" style="margin-top:10px;"><b>집행 방식:</b> ${item.execution || ''}</div>
            ${item.timingDetail ? `<div class="body-text" style="margin-top:10px;"><b>기술적 타이밍:</b> ${item.timingDetail}</div>` : ''}
            ${(item.entryConditions || []).length ? `
              <div class="impact-title">진입 조건</div>
              <ul class="detail-list">${(item.entryConditions || []).map(c=>`<li class="detail-item">${c}</li>`).join('')}</ul>
            ` : ''}
            ${(item.exitConditions || []).length ? `
              <div class="impact-title">청산 조건</div>
              <ul class="detail-list">${(item.exitConditions || []).map(c=>`<li class="detail-item">${c}</li>`).join('')}</ul>
            ` : ''}
            ${item.positionSizing && item.positionSizing.maxPct ? `
              <div class="body-text" style="margin-top:10px;"><b>포지션 사이징:</b> 최대 ${item.positionSizing.maxPct}% | 1차 ${item.positionSizing.firstPct || '-'}% (${item.positionSizing.firstAmount ? item.positionSizing.firstAmount.toLocaleString()+'원' : '-'})</div>
              <div class="muted" style="font-size:11px;">${item.positionSizing.schedule || ''}</div>
            ` : ''}
            <div class="body-text" style="margin-top:10px;"><b>체크 포인트:</b> ${item.watchPoint || ''}</div>
            ${renderSources(item.sources, `idea-src-${idx}`)}
          </div>
        </div>
      `).join('');

      pane.innerHTML = `
        <div class="card">
          <div class="card-title">${state.currentView.bucketLabel || ''} ETF·테마 아이디어</div>
          <div class="muted">기간별 누적 흐름과 현재 레짐을 함께 반영한 아이디어입니다.</div>
        </div>
        <div class="card">
          <div class="card-title">ETF 우선순위 랭킹</div>
          <div class="muted" style="margin-bottom:12px;">현재 기간의 모멘텀, 리스크, 레짐 적합도를 함께 반영했습니다.</div>
          ${ranking || '<div class="empty">랭킹 데이터가 없습니다.</div>'}
        </div>
        ${ideas}
      `;
    }

    function renderAll() {
      state.sheetStore = {};
      renderPortfolio();
      renderRebalancing();
      renderDirection();
      renderBriefing();
      renderNews();
      renderRecommendations();
      closeSheet();
      switchSection(state.currentSection);
    }

    async function init() {
      try {
        await loadIndex();
        resolveInitialSelection();
        await loadCurrentView();
        await loadDirectionViews();
        renderAll();
      } catch (error) {
        document.querySelector('.content').innerHTML = '<div class="empty">기간별 리포트를 불러오지 못했습니다.</div>';
        renderStatus('empty');
      }
    }

    window.onload = init;
  </script>
</body>
</html>
