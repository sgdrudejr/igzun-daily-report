<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>글로벌 매크로·ETF 리포트</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design Tokens ──────────────────────────── */
    :root {
      --bg:      #f0f2f5;
      --card:    #ffffff;
      --red:     #f04452;   /* 상승·매수·긍정 (한국 관례) */
      --blue:    #3182f6;   /* 하락·매도·부정 */
      --green:   #0b8c46;
      --orange:  #ff7a00;
      --purple:  #7c3aed;
      --t1: #191f28;
      --t2: #4e5968;
      --t3: #8b95a1;
      --t4: #b0b8c1;
      --border: #eaecf0;
      --sh: 0 2px 14px rgba(0,0,0,.05);
      --sh-md: 0 4px 22px rgba(0,0,0,.09);
      --r: 18px;
      --rsm: 12px;
    }

    body {
      margin: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--t1);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .app {
      max-width: 560px;
      margin: 0 auto;
      height: 100dvh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    /* ── Top Bar ────────────────────────────────── */
    .top {
      flex-shrink: 0;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      z-index: 20;
    }
    .top-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px 8px;
      gap: 10px;
    }
    #contextText {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 700;
      color: var(--t1);
      letter-spacing: -0.02em;
    }
    .status-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      white-space: nowrap;
    }
    .status-full    { background: #e8f7ed; color: #137333; }
    .status-partial { background: #fff4e5; color: #b06000; }
    .status-sparse  { background: #e8f3ff; color: #1b64da; }
    .status-empty   { background: #f3f4f6; color: #6b7280; }

    /* ── Tab Row ────────────────────────────────── */
    .tab-row {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 16px;
    }
    .tab-row::-webkit-scrollbar { display: none; }
    .tab {
      border: none;
      background: none;
      color: var(--t3);
      font-size: 14px;
      font-weight: 700;
      padding: 10px 14px 9px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
      letter-spacing: -0.02em;
    }
    .tab.active {
      color: var(--t1);
      border-bottom-color: var(--t1);
      font-weight: 800;
    }

    /* ── Content ────────────────────────────────── */
    .content { flex: 1; min-height: 0; overflow: hidden; }
    .pane {
      display: none;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 0 40px;
    }
    .pane.active { display: block; }

    /* ── Card Base ──────────────────────────────── */
    .card, .action-card, .hero, .narrative-card {
      margin: 0 14px 12px;
    }
    .card, .action-card {
      background: var(--card);
      border-radius: var(--r);
      box-shadow: var(--sh);
      padding: 18px;
    }
    .hero {
      background: linear-gradient(135deg, #f6f9ff 0%, #eef4ff 100%);
      border-radius: var(--r);
      padding: 18px;
      border: 1px solid #dde8fb;
    }
    .idea {
      background: var(--card);
      border-radius: var(--r);
      box-shadow: var(--sh);
      overflow: hidden;
      margin: 0 14px 12px;
    }
    .narrative-card {
      background: var(--card);
      border-radius: var(--r);
      box-shadow: var(--sh);
      padding: 18px;
    }

    /* ── Typography ─────────────────────────────── */
    .card-title, .hero-title, .narrative-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--t1);
      margin: 0 0 14px;
      line-height: 1.35;
      letter-spacing: -0.025em;
      word-break: keep-all;
    }
    .hero-title { margin-bottom: 8px; }
    .body-text, .forecast-text, .hero-text {
      font-size: 14px;
      line-height: 1.72;
      color: var(--t2);
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    .muted {
      font-size: 13px;
      color: var(--t3);
      line-height: 1.55;
      word-break: keep-all;
    }
    .detail-item {
      font-size: 13px;
      color: var(--t2);
      padding: 10px 0;
      border-top: 1px solid var(--border);
      line-height: 1.68;
      word-break: keep-all;
    }
    .text-up   { color: var(--red);  font-size: 12px; font-weight: 800; }
    .text-down { color: var(--blue); font-size: 12px; font-weight: 800; }

    /* ── AI Hero Card (왜 올랐을까? pattern) ─────── */
    .ai-hero-card {
      background: var(--card);
      border-radius: var(--r);
      box-shadow: var(--sh-md);
      padding: 20px 18px 18px;
      margin: 0 14px 12px;
    }
    .ai-hero-eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .ai-eyebrow-label { font-size: 12px; color: var(--t3); font-weight: 600; }
    .ai-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 8px;
      background: #eef2ff;
      color: var(--blue);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
    }
    .ai-hero-headline {
      font-size: 22px;
      font-weight: 900;
      color: var(--t1);
      letter-spacing: -0.04em;
      line-height: 1.2;
      margin-bottom: 12px;
      word-break: keep-all;
    }
    .ai-hero-body {
      font-size: 14px;
      line-height: 1.7;
      color: var(--t2);
      margin-bottom: 14px;
    }
    .ai-hero-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .ai-tag {
      padding: 5px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: var(--t2);
      font-size: 11px;
      font-weight: 700;
    }

    /* ── Issue List (지금 많이 언급되는 이슈) ─────── */
    .issue-list-card {
      background: var(--card);
      border-radius: var(--r);
      box-shadow: var(--sh);
      padding: 18px;
      margin: 0 14px 12px;
    }
    .issue-list-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--t1);
      letter-spacing: -0.025em;
      margin-bottom: 14px;
    }
    .issue-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .issue-row:last-child { border-bottom: none; padding-bottom: 0; }
    .issue-rank-num {
      width: 28px; height: 28px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 900;
      flex-shrink: 0;
      background: #f3f4f6; color: var(--t3);
    }
    .issue-rank-num.n1 { background: #fff1e6; color: #c84b11; }
    .issue-rank-num.n2 { background: #e8f1ff; color: var(--blue); }
    .issue-rank-num.n3 { background: #f0f9f4; color: var(--green); }
    .issue-row-content { flex: 1; min-width: 0; }
    .issue-row-title { font-size: 14px; font-weight: 700; color: var(--t1); line-height: 1.4; margin-bottom: 3px; word-break: keep-all; }
    .issue-row-desc  { font-size: 12px; color: var(--t3); line-height: 1.45; }

    /* ── Key Stat Grid ──────────────────────────── */
    .key-stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 0 14px 12px;
    }
    .key-stat { background: var(--card); border-radius: var(--r); padding: 16px 14px; box-shadow: var(--sh); }
    .key-stat-label { font-size: 11px; font-weight: 700; color: var(--t3); margin-bottom: 8px; }
    .key-stat-value { font-size: 18px; font-weight: 900; color: var(--t1); line-height: 1.25; letter-spacing: -0.04em; word-break: keep-all; }
    .key-stat-sub { margin-top: 6px; font-size: 11px; line-height: 1.5; color: var(--t3); }

    /* ── Priority Card (Dark) ───────────────────── */
    .priority-card {
      background: linear-gradient(145deg, #191f28 0%, #2d3748 100%);
      color: #fff;
      border-radius: var(--r);
      padding: 20px 18px;
      margin: 0 14px 12px;
      box-shadow: 0 8px 28px rgba(25,31,40,.22);
    }
    .priority-label { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 999px; background: rgba(255,255,255,.12); font-size: 11px; font-weight: 800; margin-bottom: 14px; }
    .priority-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 16px; }
    .priority-title { font-size: 22px; font-weight: 900; line-height: 1.25; letter-spacing: -0.04em; }
    .priority-sub { font-size: 13px; line-height: 1.65; color: rgba(255,255,255,.82); margin-top: 6px; }
    .priority-metrics { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .priority-metric { background: rgba(255,255,255,.09); border-radius: var(--rsm); padding: 12px; }
    .priority-metric-label { font-size: 11px; color: rgba(255,255,255,.65); margin-bottom: 5px; font-weight: 600; }
    .priority-metric-value { font-size: 16px; font-weight: 900; color: #fff; letter-spacing: -0.03em; }

    /* ── Score ──────────────────────────────────── */
    .score-wrap { margin-bottom: 16px; }
    .score-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 10px; margin-bottom: 10px; }
    .score-num { font-size: 32px; font-weight: 900; color: var(--t1); letter-spacing: -0.05em; }
    .score-status { font-size: 13px; font-weight: 800; }
    .score-track { height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 999px; }

    /* ── Chips ──────────────────────────────────── */
    .stat-chip-group, .chip-group { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
    .stat-chip { display: inline-flex; align-items: center; gap: 5px; padding: 6px 10px; border-radius: 999px; font-size: 11px; font-weight: 800; white-space: nowrap; }
    .stat-chip .label { opacity: .72; }
    .tone-score   { background: #eef2ff; color: #3730a3; }
    .tone-market  { background: #eff6ff; color: #1e40af; }
    .tone-risk    { background: #fff7ed; color: #c2410c; }
    .tone-signal  { background: #f0fdf4; color: #15803d; }
    .tone-macro   { background: #f5f3ff; color: #6d28d9; }
    .tone-default { background: #f3f4f6; color: #374151; }
    .badge { display: inline-flex; align-items: center; align-self: flex-start; padding: 4px 9px; border-radius: 999px; background: #eef2ff; color: #1d4ed8; font-size: 11px; font-weight: 800; }
    .action-badge { display: inline-flex; align-items: center; padding: 5px 10px; border-radius: 999px; background: var(--t1); color: #fff; font-size: 11px; font-weight: 800; flex-shrink: 0; }
    .insight-badge { padding: 4px 10px; border-radius: 999px; background: #dbeafe; color: var(--blue); font-size: 12px; font-weight: 800; }
    .issue-badge { display: inline-flex; padding: 5px 9px; border-radius: 999px; background: #f3f4f6; color: var(--t2); font-size: 11px; font-weight: 800; margin-bottom: 10px; }

    /* ── Forecast ───────────────────────────────── */
    .forecast-box { background: #f8fafc; border: 1px solid var(--border); border-radius: var(--rsm); padding: 14px; }
    .forecast-label { display: inline-flex; align-items: center; gap: 6px; background: var(--t1); color: #fff; padding: 4px 9px; border-radius: 999px; font-size: 11px; font-weight: 800; margin-bottom: 10px; }

    /* ── Lists ──────────────────────────────────── */
    .list, .detail-list { list-style: none; margin: 0; padding: 0; }
    .list-item { display: flex; flex-direction: column; gap: 8px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .list-item:last-child { border-bottom: none; padding-bottom: 0; }

    /* ── Rank Items ─────────────────────────────── */
    .rank-item { display: flex; gap: 12px; align-items: flex-start; padding: 13px 0; border-bottom: 1px solid var(--border); }
    .rank-item:last-child { border-bottom: none; }
    .rank-num { width: 28px; height: 28px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; flex-shrink: 0; background: #f3f4f6; color: var(--t3); }
    .rank-num.r1 { background: #fff1e6; color: #c84b11; }
    .rank-num.r2 { background: #e8f1ff; color: var(--blue); }
    .rank-num.r3 { background: #f0f9f4; color: var(--green); }
    .rank-info { flex: 1; min-width: 0; }
    .rank-head { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; margin-bottom: 5px; }
    .rank-name { font-size: 14px; font-weight: 800; color: var(--t1); line-height: 1.4; letter-spacing: -0.01em; word-break: keep-all; }
    .rank-ticker { display: inline-flex; font-size: 10px; color: var(--t3); background: #f3f4f6; border-radius: 999px; padding: 2px 8px; margin-left: 5px; }
    .rank-score { font-size: 12px; font-weight: 800; color: var(--blue); white-space: nowrap; flex-shrink: 0; }
    .rank-track { height: 5px; background: var(--border); border-radius: 999px; overflow: hidden; margin-top: 6px; }
    .rank-fill  { height: 100%; background: var(--blue); border-radius: 999px; }

    /* ── Section Head ───────────────────────────── */
    .section-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 14px; }
    .info-button { width: 26px; height: 26px; border: none; border-radius: 50%; background: #eef2ff; color: #1d4ed8; font-size: 13px; font-weight: 900; cursor: pointer; flex-shrink: 0; }
    .coach-button { display: inline-flex; align-items: center; gap: 5px; border: none; background: #f3f4f6; color: var(--t2); border-radius: 999px; padding: 7px 11px; font-size: 12px; font-weight: 700; cursor: pointer; }

    /* ── Metric Grid ────────────────────────────── */
    .metric-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .metric-card { border: 1px solid var(--border); border-radius: var(--rsm); background: var(--card); padding: 12px; }
    .metric-name { font-size: 11px; font-weight: 700; color: var(--t3); margin-bottom: 6px; }
    .metric-price { font-size: 15px; font-weight: 800; color: var(--t1); margin-bottom: 4px; }

    /* ── Impact ─────────────────────────────────── */
    .impact-title { font-size: 12px; font-weight: 700; color: var(--t3); letter-spacing: .01em; margin: 14px 0 8px; }
    .impact-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .impact-item:last-child { border-bottom: none; }
    .impact-head { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .impact-dot { width: 10px; height: 10px; border-radius: 50%; }
    .impact-dot.pos { background: var(--red); }
    .impact-dot.neg { background: var(--blue); }
    .impact-name { font-size: 13px; font-weight: 800; color: var(--t1); }
    .impact-desc { font-size: 13px; line-height: 1.6; color: var(--t3); word-break: keep-all; }

    /* ── Allocation ─────────────────────────────── */
    .alloc-bar { display: flex; height: 10px; border-radius: 999px; overflow: hidden; margin: 14px 0 16px; }
    .alloc-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
    .alloc-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; }
    .alloc-name { font-size: 13px; font-weight: 800; color: var(--t1); margin-bottom: 4px; }
    .alloc-desc { font-size: 12px; line-height: 1.55; color: var(--t3); }
    .allocation-list { display: flex; flex-direction: column; gap: 14px; }
    .allocation-row { padding: 2px 0; }
    .allocation-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
    .allocation-left { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .allocation-title { font-size: 14px; font-weight: 800; color: var(--t1); }
    .allocation-caption { font-size: 12px; color: var(--t3); line-height: 1.4; }
    .allocation-track { position: relative; height: 8px; border-radius: 999px; background: var(--border); overflow: hidden; margin-bottom: 6px; }
    .allocation-fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 999px; }
    .allocation-target { position: absolute; top: -2px; bottom: -2px; width: 3px; background: var(--t1); border-radius: 999px; box-shadow: 0 0 0 2px rgba(255,255,255,.9); }
    .allocation-values { display: flex; justify-content: space-between; font-size: 12px; color: var(--t3); }

    /* ── ETF Idea ───────────────────────────────── */
    .idea-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; padding: 16px; background: #f8fafc; border-bottom: 1px solid var(--border); }
    .idea-left { display: flex; gap: 10px; align-items: center; min-width: 0; }
    .idea-logo { font-size: 22px; }
    .idea-name { font-size: 15px; font-weight: 800; color: var(--t1); line-height: 1.35; letter-spacing: -.02em; word-break: keep-all; }
    .idea-ticker { font-size: 11px; color: var(--t3); line-height: 1.4; }
    .idea-action { background: #eff6ff; color: var(--blue); padding: 6px 10px; border-radius: 999px; font-size: 11px; font-weight: 800; flex-shrink: 0; }
    .idea-body { padding: 16px; }

    /* ── Account ────────────────────────────────── */
    .account-list { display: flex; flex-direction: column; gap: 10px; }
    .account-card { background: #f8fafc; border: 1px solid var(--border); border-radius: var(--r); padding: 16px; }
    .account-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .account-name { font-size: 15px; font-weight: 900; color: var(--t1); }
    .account-cash { font-size: 18px; font-weight: 900; color: var(--t1); white-space: nowrap; letter-spacing: -.04em; }
    .account-split { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .mini-metric { background: var(--card); border-radius: var(--rsm); padding: 11px 12px; border: 1px solid var(--border); }
    .mini-metric-label { font-size: 11px; color: var(--t3); margin-bottom: 5px; }
    .mini-metric-value { font-size: 14px; font-weight: 800; color: var(--t1); }
    .account-comment { font-size: 13px; line-height: 1.65; color: var(--t2); }

    /* ── Target / Status ────────────────────────── */
    .target-list { display: flex; flex-direction: column; gap: 10px; }
    .target-row { border: 1px solid var(--border); border-radius: var(--rsm); padding: 14px; background: var(--card); }
    .target-row-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .target-name { font-size: 14px; font-weight: 900; color: var(--t1); }
    .target-meta { font-size: 11px; line-height: 1.45; color: var(--t3); margin-top: 3px; }
    .target-amount { font-size: 15px; font-weight: 900; color: var(--t1); text-align: right; white-space: nowrap; }
    .target-intro { font-size: 13px; line-height: 1.65; color: var(--t2); margin-bottom: 14px; }
    .target-status { display: inline-flex; align-items: center; padding: 4px 9px; border-radius: 999px; font-size: 11px; font-weight: 800; white-space: nowrap; }
    .status-up   { background: #eff6ff; color: var(--blue); }
    .status-down { background: #fff1f2; color: var(--red); }
    .status-hold { background: #f3f4f6; color: var(--t2); }

    /* ── Selector Strip ─────────────────────────── */
    .selector-strip { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; scroll-snap-type: x proximity; margin: 0 14px 12px; }
    .selector-strip::-webkit-scrollbar { display: none; }
    .selector-chip { flex-shrink: 0; min-width: 190px; max-width: 230px; border: 1px solid var(--border); border-radius: var(--r); background: var(--card); padding: 13px 14px; text-align: left; scroll-snap-align: start; cursor: pointer; box-shadow: var(--sh); }
    .selector-chip.active { border-color: #c7d2fe; background: #eef4ff; }
    .selector-chip-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .selector-chip-label { font-size: 11px; font-weight: 800; color: var(--t3); }
    .selector-chip-name { font-size: 14px; font-weight: 900; color: var(--t1); line-height: 1.35; letter-spacing: -.02em; word-break: keep-all; }
    .selector-chip-sub { font-size: 11px; line-height: 1.45; color: var(--t3); margin-top: 6px; }
    .pill-buy  { background: #e8f7ed; color: #137333; }
    .pill-wait { background: #f3f4f6; color: var(--t2); }
    .pill-sell { background: #fff1f2; color: var(--red); }

    /* ── Detail Grid ────────────────────────────── */
    .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 14px; }
    .detail-box { background: #f8fafc; border: 1px solid var(--border); border-radius: var(--rsm); padding: 12px; }
    .detail-box-title { font-size: 11px; font-weight: 800; color: var(--t3); margin-bottom: 5px; }
    .detail-box-text { font-size: 13px; line-height: 1.58; color: var(--t1); word-break: keep-all; overflow-wrap: anywhere; }

    /* ── Schedule ───────────────────────────────── */
    .schedule-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    .schedule-step { border-radius: var(--rsm); background: #f8fafc; border: 1px solid var(--border); padding: 12px 14px; }
    .schedule-step strong { display: block; font-size: 15px; color: var(--t1); margin-bottom: 5px; font-weight: 800; }

    /* ── Toggle ─────────────────────────────────── */
    .toggle-bar { display: inline-flex; gap: 4px; padding: 4px; background: #f3f4f6; border-radius: 999px; margin-bottom: 14px; }
    .toggle-btn { border: none; background: transparent; color: var(--t3); font-size: 12px; font-weight: 800; padding: 8px 13px; border-radius: 999px; cursor: pointer; }
    .toggle-btn.active { background: var(--card); color: var(--t1); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .target-panel { display: none; }
    .target-panel.active { display: block; }

    /* ── Direction Sub-tabs ─────────────────────── */
    .sub-tab-bar { display: flex; overflow-x: auto; scrollbar-width: none; padding: 12px 14px 0; background: var(--bg); flex-shrink: 0; }
    .sub-tab-bar::-webkit-scrollbar { display: none; }
    .sub-tab-btn { border: none; background: none; color: var(--t3); font-size: 13px; font-weight: 700; padding: 9px 14px; cursor: pointer; flex-shrink: 0; border-bottom: 2px solid transparent; display: flex; align-items: center; gap: 5px; transition: all .15s; }
    .sub-tab-btn.active { color: var(--t1); border-bottom-color: var(--t1); font-weight: 800; }
    .sub-tab-score { font-size: 10px; font-weight: 700; padding: 1px 5px; background: rgba(0,0,0,.05); border-radius: 4px; }

    /* ── Direction Score ────────────────────────── */
    .dir-score-wrap { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .dir-score-num { font-size: 42px; font-weight: 900; letter-spacing: -.05em; }
    .dir-regime-badge { padding: 7px 13px; border-radius: var(--rsm); background: #f3f4f6; font-size: 12px; font-weight: 800; color: var(--t2); }

    /* ── Signals ────────────────────────────────── */
    .signal-row { padding: 11px 0; border-bottom: 1px solid #f3f4f6; }
    .signal-row:last-child { border-bottom: none; }
    .signal-row-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .signal-name { font-size: 14px; font-weight: 700; color: var(--t1); }
    .signal-ticker { font-size: 11px; color: var(--t3); margin-left: 4px; font-weight: 400; }
    .signal-grade { font-size: 12px; font-weight: 800; }
    .signal-label { font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 999px; color: #fff; }
    .signal-meta { font-size: 11px; color: var(--t3); margin-bottom: 4px; }
    .signal-reason { font-size: 12px; color: var(--t2); margin-bottom: 3px; }
    .signal-cond { font-size: 11px; color: var(--t3); }

    /* ── Valuation ──────────────────────────────── */
    .val-table { display: flex; flex-direction: column; gap: 8px; }
    .val-row { display: flex; gap: 8px; align-items: center; font-size: 12px; flex-wrap: wrap; padding: 4px 0; }
    .val-name { font-weight: 800; min-width: 64px; }
    .val-grade { font-weight: 700; min-width: 72px; }
    .val-detail { flex: 1; font-size: 11px; color: var(--t3); }

    /* ── Sector Calls ───────────────────────────── */
    .sector-call { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .sector-call:last-child { border-bottom: none; }
    .sector-view { font-weight: 800; margin-right: 4px; }

    /* ── Insight Stack ──────────────────────────── */
    .insight-stack { display: flex; flex-direction: column; gap: 10px; }
    .insight-card { padding: 14px; border-radius: var(--rsm); background: #f8fafc; border: 1px solid var(--border); }
    .insight-kicker { font-size: 12px; font-weight: 800; color: var(--t3); margin-bottom: 6px; }

    /* ── Metric Strip ───────────────────────────── */
    .metric-strip { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; margin-bottom: 12px; }
    .metric-strip::-webkit-scrollbar { display: none; }
    .metric-pill { flex-shrink: 0; border-radius: var(--rsm); background: var(--card); border: 1px solid var(--border); padding: 10px 13px; min-width: 110px; }
    .metric-pill-label { font-size: 11px; color: var(--t3); margin-bottom: 5px; }
    .metric-pill-value { font-size: 15px; font-weight: 900; color: var(--t1); letter-spacing: -.03em; }

    /* ── Meta Footer ────────────────────────────── */
    .meta-footer { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 14px; padding-top: 10px; border-top: 1px dashed var(--border); }
    .meta-footnote { font-size: 11px; color: #94a3b8; line-height: 1.45; }

    /* ── Source ─────────────────────────────────── */
    .source-slot { margin-top: 12px; }
    .source-toggle { border: none; background: transparent; color: var(--t3); padding: 0; font-size: 12px; font-weight: 800; cursor: pointer; }
    .source-box { display: none; margin-top: 10px; background: #f8fafc; border: 1px solid var(--border); border-radius: var(--rsm); padding: 12px; }
    .source-item { font-size: 12px; color: var(--t3); line-height: 1.6; margin-bottom: 8px; word-break: keep-all; }
    .source-item:last-child { margin-bottom: 0; }

    /* ── Action Top ─────────────────────────────── */
    .action-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }

    /* ── Control Line ───────────────────────────── */
    .control-line { display: grid; grid-template-columns: 1fr 138px; gap: 8px; align-items: center; margin-bottom: 10px; }
    .selector-row { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .selector-row::-webkit-scrollbar { display: none; }
    .chip { border: none; background: #f3f4f6; color: var(--t2); border-radius: 999px; padding: 8px 12px; font-size: 12px; font-weight: 800; white-space: nowrap; cursor: pointer; flex-shrink: 0; }
    .chip.active { background: var(--t1); color: #fff; }
    .bucket-select { width: 100%; border: none; border-radius: var(--rsm); background: #f3f4f6; color: var(--t1); padding: 10px 12px; font-size: 12px; font-weight: 700; outline: none; }

    /* ── Summary Strip ──────────────────────────── */
    .summary-strip { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; margin-bottom: 10px; }
    .summary-strip::-webkit-scrollbar { display: none; }
    .summary-pill { display: inline-flex; align-items: center; padding: 6px 11px; border-radius: 999px; background: #f3f4f6; color: var(--t2); font-size: 11px; font-weight: 800; white-space: nowrap; }

    /* ── Sheet ──────────────────────────────────── */
    .sheet-overlay { position: fixed; inset: 0; display: none; align-items: flex-end; justify-content: center; background: rgba(0,0,0,.4); z-index: 40; padding: 14px; }
    .sheet-overlay.open { display: flex; }
    .sheet { width: min(560px, 100%); max-height: 78dvh; background: var(--card); border-radius: 24px 24px 16px 16px; padding: 16px 16px 24px; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
    .sheet-handle { width: 44px; height: 4px; border-radius: 999px; background: #d1d5db; margin: 0 auto 14px; }
    .sheet-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .sheet-title { font-size: 17px; font-weight: 900; color: var(--t1); line-height: 1.35; }
    .sheet-close { width: 32px; height: 32px; border: none; border-radius: 50%; background: #f3f4f6; color: var(--t2); font-size: 18px; cursor: pointer; flex-shrink: 0; }
    .sheet-body { font-size: 14px; line-height: 1.72; color: var(--t2); }
    .sheet-body .list-item { padding: 12px 0; }

    /* ── Empty ──────────────────────────────────── */
    .empty { text-align: center; padding: 52px 20px; color: var(--t3); font-size: 15px; }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 430px) {
      .priority-metrics, .detail-grid, .account-split { grid-template-columns: 1fr; }
      .selector-chip { min-width: 84%; }
      .card, .action-card, .hero, .narrative-card, .idea, .ai-hero-card, .issue-list-card { margin-left: 10px; margin-right: 10px; }
      .key-stat-grid, .selector-strip, .priority-card { margin-left: 10px; margin-right: 10px; }
      .sub-tab-bar { padding-left: 10px; }
      .top-header { padding-left: 12px; padding-right: 12px; }
      .tab-row { padding: 0 12px; }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- ── Top Bar ─────────────────────────── -->
    <div class="top">
      <div class="top-header">
        <span id="contextText">데이터 로딩 중...</span>
        <span id="statusBadge"></span>
      </div>
      <div class="tab-row">
        <button class="tab active" data-tab="portfolio"       onclick="switchSection('portfolio')">포트</button>
        <button class="tab"        data-tab="rebalancing"     onclick="switchSection('rebalancing')">실행</button>
        <button class="tab"        data-tab="direction"       onclick="switchSection('direction')">방향</button>
        <button class="tab"        data-tab="briefing"        onclick="switchSection('briefing')">브리핑</button>
        <button class="tab"        data-tab="news"            onclick="switchSection('news')">이슈</button>
        <button class="tab"        data-tab="recommendations" onclick="switchSection('recommendations')">ETF</button>
      </div>
    </div>

    <!-- ── Panes ───────────────────────────── -->
    <div class="content">
      <div id="pane-portfolio"       class="pane active"></div>
      <div id="pane-rebalancing"     class="pane"></div>
      <div id="pane-direction"       class="pane"></div>
      <div id="pane-briefing"        class="pane"></div>
      <div id="pane-news"            class="pane"></div>
      <div id="pane-recommendations" class="pane"></div>
    </div>

  </div>

  <!-- ── Bottom Sheet ──────────────────────── -->
  <div id="sheetOverlay" class="sheet-overlay" onclick="closeSheet(event)">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <div id="sheetTitle" class="sheet-title">안내</div>
        <button class="sheet-close" onclick="closeSheet()" aria-label="닫기">×</button>
      </div>
      <div id="sheetBody" class="sheet-body"></div>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════════════════
       CONSTANTS & PALETTE
    ═══════════════════════════════════════════ */
    const REPO_PREFIX = window.location.pathname.includes('/igzun-daily-report/') ? '/igzun-daily-report' : '';
    const SITE_BASE   = `${REPO_PREFIX}/site`;
    const HORIZON_ORDER  = ['1일', '1주', '1개월', '3개월', '6개월'];
    const HORIZON_LABELS = { '1일':'일간', '1주':'주간', '1개월':'월간', '3개월':'분기', '6개월':'반기' };

    const CLR_POS  = '#0b8c46';
    const CLR_MID  = '#3182f6';
    const CLR_WARN = '#ff7a00';
    const CLR_NEG  = '#f04452';

    function scoreColor(v) {
      if (v == null) return CLR_MID;
      return v >= 65 ? CLR_POS : v >= 50 ? CLR_MID : CLR_WARN;
    }

    /* ═══════════════════════════════════════════
       STATE
    ═══════════════════════════════════════════ */
    const state = {
      index: null,
      currentHorizon: '1일',
      currentBucketId: '',
      currentView: null,
      horizonViews: {},
      currentSection: 'portfolio',
      currentActionIndex: 0,
      portfolioTargetMode: 'total',
      sectionScrolls: {},
      sheetStore: {},
      currentDirectionTab: null,
    };

    /* ═══════════════════════════════════════════
       HELPERS
    ═══════════════════════════════════════════ */
    function statusClass(s) {
      return ({ full:'status-badge status-full', partial:'status-badge status-partial', sparse:'status-badge status-sparse', empty:'status-badge status-empty' })[s] || 'status-badge status-empty';
    }
    function statusText(s) {
      return ({ full:'데이터 충분', partial:'데이터 부분', sparse:'데이터 제한', empty:'데이터 없음' })[s] || s;
    }
    function currentBucket() {
      const b = (state.index?.horizons?.[state.currentHorizon]) || [];
      return b.find(i => i.id === state.currentBucketId) || null;
    }
    function defaultBucketForHorizon(h) {
      const b = (state.index?.horizons?.[h]) || [];
      return b.length ? b[0].id : '';
    }
    function formatContext(view, bucket) {
      if (!view || !bucket) return '표시할 데이터가 없습니다.';
      return `${bucket.label} · 최신 일간 기준 · ${view.fromDate} ~ ${view.toDate}`;
    }
    function renderStatus(status) {
      const el = document.getElementById('statusBadge');
      el.className = statusClass(status);
      el.textContent = statusText(status);
    }
    function snippet(text, limit = 180) {
      if (!text) return '';
      const v = String(text).trim();
      return v.length <= limit ? v : `${v.slice(0, limit).trim()}...`;
    }

    /* ═══════════════════════════════════════════
       DATA LOAD
    ═══════════════════════════════════════════ */
    async function loadIndex() {
      const res = await fetch(`${SITE_BASE}/horizon_index.json?t=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) throw new Error('index load failed');
      state.index = await res.json();
    }
    function resolveInitialSelection() {
      state.currentHorizon  = '1일';
      state.currentBucketId = state.index?.latestDailyDate || defaultBucketForHorizon('1일');
    }
    async function loadCurrentView() {
      const bucket = currentBucket();
      if (!bucket) { state.currentView = null; updateHeader(); renderAll(); return; }
      const res = await fetch(`${SITE_BASE}/${bucket.source}?t=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) throw new Error('view load failed');
      state.currentView = await res.json();
      state.currentActionIndex = 0;
      state.portfolioTargetMode = 'total';
      updateHeader(); renderAll(); resetPaneScrolls(); syncUrl();
    }
    async function loadDirectionViews() {
      const loaded = {};
      for (const horizon of HORIZON_ORDER) {
        const bucket = (state.index?.horizons?.[horizon] || [])[0];
        if (!bucket) continue;
        const res = await fetch(`${SITE_BASE}/${bucket.source}?t=${Date.now()}`, { cache: 'no-store' });
        if (!res.ok) continue;
        loaded[horizon] = await res.json();
      }
      state.horizonViews = loaded;
    }

    /* ═══════════════════════════════════════════
       HEADER & URL
    ═══════════════════════════════════════════ */
    function updateHeader() {
      const bucket = currentBucket();
      document.getElementById('contextText').textContent = formatContext(state.currentView, bucket);
      renderStatus(state.currentView?.dataStatus || 'empty');
      document.title = bucket ? `${bucket.label} · 글로벌 매크로·ETF 리포트` : '글로벌 매크로·ETF 리포트';
    }
    function syncUrl() {
      const latest = state.index?.latestDailyDate || state.currentBucketId;
      if (!latest) return;
      window.history.replaceState({}, '', `${REPO_PREFIX}/site/${latest}/`);
    }
    async function changeHorizon(horizon) {
      state.currentHorizon  = horizon;
      state.currentBucketId = defaultBucketForHorizon(horizon);
      renderHorizonSelector(); renderBucketSelector();
      await loadCurrentView();
    }
    async function changeBucket(bucketId) {
      state.currentBucketId = bucketId;
      renderBucketSelector();
      await loadCurrentView();
    }
    function renderHorizonSelector() {
      const c = document.getElementById('horizonSelector');
      if (!c) return;
      c.innerHTML = Object.keys(state.index?.horizons || {}).map(h =>
        `<button class="chip ${h === state.currentHorizon ? 'active' : ''}" onclick="changeHorizon('${h}')">${h}</button>`
      ).join('');
    }
    function renderBucketSelector() {
      const s = document.getElementById('bucketSelect');
      if (!s) return;
      s.innerHTML = ((state.index?.horizons?.[state.currentHorizon]) || []).map(b =>
        `<option value="${b.id}" ${b.id === state.currentBucketId ? 'selected' : ''}>${b.label}</option>`
      ).join('');
    }
    function renderSummaryStrip() {}

    /* ═══════════════════════════════════════════
       SHEET
    ═══════════════════════════════════════════ */
    function registerSheet(id, title, html) { state.sheetStore[id] = { title, html }; return id; }
    function openSheet(id) {
      const p = state.sheetStore[id];
      if (!p) return;
      document.getElementById('sheetTitle').textContent = p.title || '안내';
      document.getElementById('sheetBody').innerHTML = p.html || '';
      document.getElementById('sheetOverlay').classList.add('open');
    }
    function closeSheet(event) {
      if (event && event.target !== event.currentTarget) return;
      document.getElementById('sheetOverlay').classList.remove('open');
    }

    /* ═══════════════════════════════════════════
       SHARED RENDER HELPERS
    ═══════════════════════════════════════════ */
    function renderSources(sources, id) {
      if (!sources || !sources.length) return '';
      const items = sources.map(item => {
        const label = item.label || item.source || '출처';
        const title = item.title ? ` — ${item.title}` : '';
        const date  = item.published_at ? ` (${item.published_at})` : '';
        const meta  = [item.region, item.sector].filter(Boolean).join(' · ');
        const url   = item.url ? ` · <a href="${item.url}" target="_blank" rel="noreferrer">원문</a>` : '';
        return `<div class="source-item"><b>${label}</b>${title}${date}${meta ? ` · ${meta}` : ''}${url}</div>`;
      }).join('');
      const sid = registerSheet(id, '출처·메타데이터', items);
      return `<div class="meta-footer"><div class="meta-footnote">근거가 궁금하면 출처와 날짜를 열어 확인할 수 있습니다.</div><button class="source-toggle" onclick="openSheet('${sid}')">출처 ${sources.length}개 보기</button></div>`;
    }

    function renderStatChips(items) {
      if (!items || !items.length) return '';
      return `<div class="stat-chip-group">${items.map(item =>
        `<span class="stat-chip tone-${item.tone || 'default'}"><span class="label">${item.label || ''}</span><span class="value">${item.value || ''}</span></span>`
      ).join('')}</div>`;
    }

    function marketActionMeta(score, marketSignal) {
      const action = marketSignal?.action || '';
      if (action) return { title: action, desc: marketSignal?.note || '현재 시장 신호를 기준으로 현금과 위험자산의 속도를 조절합니다.' };
      if (score >= 65) return { title: '선별 매수 가능', desc: '추세가 비교적 안정적이라 코어 자산을 중심으로 비중을 늘려볼 수 있습니다.' };
      if (score >= 50) return { title: '중립 대응',    desc: '공격적으로 추격하기보다 분할 진입과 현금 유지가 함께 필요합니다.' };
      return { title: '현금 우위', desc: '리스크가 높아 보여서 현금과 방어 자산 비중을 먼저 챙기는 편이 유리합니다.' };
    }

    function allocationTone(diff) {
      if (Math.abs(diff) <= 3) return { label: '적정',    className: 'status-hold' };
      if (diff < 0)            return { label: '보완 필요', className: 'status-up'   };
      return                          { label: '조정 필요', className: 'status-down'  };
    }

    function renderAllocationRows(score, targetAmounts) {
      if (!score) return '';
      const colors = Object.fromEntries((targetAmounts || []).map(item => [item.name, item.color]));
      return Object.keys(score.currentPct || {}).map(name => {
        const current    = Number(score.currentPct?.[name] || 0);
        const target     = Number(score.targetPct?.[name]  || 0);
        const tone       = allocationTone(current - target);
        const color      = colors[name] || CLR_MID;
        const fillWidth  = Math.max(4, Math.min(100, current));
        const markerLeft = Math.max(0, Math.min(100, target));
        return `
          <div class="allocation-row">
            <div class="allocation-head">
              <div class="allocation-left">
                <div class="allocation-title">${name}</div>
                <div class="allocation-caption">현재 ${current.toFixed(1)}% · 목표 ${target.toFixed(1)}%</div>
              </div>
              <span class="target-status ${tone.className}">${tone.label}</span>
            </div>
            <div class="allocation-track">
              <div class="allocation-fill" style="width:${fillWidth}%;background:${color};"></div>
              <div class="allocation-target" style="left:calc(${markerLeft}% - 1px);"></div>
            </div>
            <div class="allocation-values"><span>현재 ${current.toFixed(1)}%</span><span>목표 ${target.toFixed(1)}%</span></div>
          </div>`;
      }).join('');
    }

    function renderTargetRows(items) {
      return (items || []).map(item => {
        const sc = item.direction === '늘리기' ? 'status-up' : (item.direction === '줄이기' ? 'status-down' : 'status-hold');
        const st = item.direction === '늘리기' ? '매수 보완'  : (item.direction === '줄이기' ? '비중 축소'   : '유지');
        return `
          <div class="target-row">
            <div class="target-row-head">
              <div>
                <div class="target-name">${item.name}</div>
                <div class="target-meta">현재 ${item.currentAmount || '-'} · 목표 비중 ${item.percent || '-'}%</div>
              </div>
              <div style="text-align:right;">
                <div class="target-amount">${item.targetAmount || '-'}</div>
                <span class="target-status ${sc}">${st}</span>
              </div>
            </div>
            <div class="target-meta">${item.note ? `${item.note} · ` : ''}${item.direction} ${item.gapAmount || '-'}</div>
          </div>`;
      }).join('');
    }

       REBALANCING

    function switchActionCard(index) { state.currentActionIndex = index; renderRebalancing(); }

    function renderRebalancing() {
      const pane    = document.getElementById('pane-rebalancing');
      const data    = state.currentView?.rebalancing;
      const llm     = state.currentView?.llmInsights || {};
      const signals = state.currentView?.signals || {};
      if (!data) { pane.innerHTML = '<div class="empty">실행 가이드 데이터가 없습니다.</div>'; return; }

      const actions = data.actions || [];
      const currentIndex = Math.max(0, Math.min(state.currentActionIndex || 0, Math.max(actions.length - 1, 0)));
      const current = actions[currentIndex];

      const selector = actions.map((item, idx) => {
        const active    = idx === currentIndex ? 'active' : '';
        const pillClass = item.action?.includes('매도') || item.action?.includes('축소') ? 'pill-sell'
          : (item.action?.includes('보류') || item.action?.includes('관망') ? 'pill-wait' : 'pill-buy');
        return `
          <button class="selector-chip ${active}" onclick="switchActionCard(${idx})">
            <div class="selector-chip-top">
              <span class="selector-chip-label">${item.account || '계좌'}</span>
              <span class="target-status ${pillClass}">${item.action || '보류'}</span>
            </div>
            <div class="selector-chip-name">${item.name || '-'}</div>
            <div class="selector-chip-sub">${item.ticker || '-'} · ${item.todayAmount || '-'} · ${item.executionStyle || ''}</div>
          </button>`;
      }).join('');

      const splitPlan = (current?.splitPlan || []).map(step => {
        const [head, ...tail] = String(step).split('—');
        return `<div class="schedule-step"><strong>${(head || '').trim()}</strong><div class="body-text">${(tail.join('—') || '').trim()}</div></div>`;
      }).join('');

      const footnotes    = (data.footnotes || []).map(i => `<li class="detail-item">${i}</li>`).join('');
      const marketAction = signals.marketSignal?.action || current?.action || '중립 대응';
      const marketGuide  = llm.timingGuidance || signals.marketSignal?.note || data.summary || '';

      pane.innerHTML = `
        <div class="priority-card">
          <div class="priority-label">단기 실행 가이드</div>
          <div class="priority-head"><div><div class="priority-title">${marketAction}</div><div class="priority-sub">${marketGuide}</div></div></div>
          <div class="priority-metrics">
            <div class="priority-metric"><div class="priority-metric-label">시장 배치 가능 비중</div><div class="priority-metric-value">${signals.marketSignal?.deployablePct != null ? `${signals.marketSignal.deployablePct}%` : '-'}</div></div>
            <div class="priority-metric"><div class="priority-metric-label">오늘 1차 진입</div><div class="priority-metric-value">${current?.todayAmount || '-'}</div></div>
            <div class="priority-metric"><div class="priority-metric-label">집행 리듬</div><div class="priority-metric-value">${current?.executionStyle || '-'}</div></div>
            <div class="priority-metric"><div class="priority-metric-label">보류 조건</div><div class="priority-metric-value">${current?.pauseRule || '-'}</div></div>
          </div>
        </div>
        ${selector ? `<div class="selector-strip">${selector}</div>` : '<div class="empty">실행 액션 데이터가 없습니다.</div>'}
        ${current ? `
          <div class="action-card">
            <div class="action-top">
              <div>
                <div class="card-title" style="font-size:16px;margin-bottom:6px;">${current.account || '-'} · ${current.name || '-'}</div>
                <div class="muted">${current.ticker || '-'} · 총 배치 ${current.amount || '-'} · ${current.weightHint || ''}</div>
              </div>
              <div class="action-badge">${current.action || '보류'}</div>
            </div>
            <div class="detail-grid">
              <div class="detail-box"><div class="detail-box-title">포지션 역할</div><div class="detail-box-text">${current.assetRole || ''}</div></div>
              <div class="detail-box"><div class="detail-box-title">비중 힌트</div><div class="detail-box-text">${current.positionHint || ''}</div></div>
              <div class="detail-box"><div class="detail-box-title">왜 지금 보는가</div><div class="detail-box-text">${current.reason || ''}</div></div>
              <div class="detail-box"><div class="detail-box-title">집행 리듬</div><div class="detail-box-text">${current.executionSummary || ''}</div></div>
            </div>
            ${splitPlan ? `<div class="impact-title">3거래일 분할매수 예시</div><div class="schedule-list">${splitPlan}</div>` : ''}

      if (!data) { pane.innerHTML = '<div class="empty">시장 브리핑 데이터가 없습니다.</div>'; return; }

      const score     = data.sentiment?.score ?? 50;
      const scoreClr  = scoreColor(score);

      /* ── AI 히어로 카드 (왜 올랐을까? 패턴) ── */

      const regimeHint = llm.regimeAssessment || (bucket?.label ? `${bucket.label} 기준` : '');

      const heroCard = `
        <div class="ai-hero-card">

          <div class="body-text">${item.rationale || ''}</div>

            <div class="score-head">
              <div class="score-num">${score}<span class="muted"> / 100</span></div>

          <div class="card-title">주요 지표와 시황 포인트</div>
          <div class="metric-strip">${indices || ''}</div>
          ${renderStatChips((data.metricChips || []).slice(0, 6))}
        </div>
        ${data.strategy ? `
          <div class="card">
            <div class="card-title">${data.strategy.title || '현재 고려할 변수와 투자 방향'}</div>
            <div class="body-text">${data.strategy.summary || ''}</div>
            <div class="detail-grid">${strategyList}</div>
            ${renderSources(data.strategy.sources, 'briefing-strategy-src')}
          </div>` : ''}
        <div class="card">
          <div class="card-title">핵심 인사이트</div>
          <div class="insight-stack">${insights || '<div class="empty" style="padding:24px 0;">핵심 인사이트가 없습니다.</div>'}</div>
        </div>
        ${sectorCalls ? `<div class="card"><div class="card-title">어떤 섹터에 영향을 줄까?</div><div class="insight-stack">${sectorCalls}</div></div>` : ''}
        ${(evidenceCards || checkpointList) ? `
          <div class="card">
            <div class="card-title">근거와 다음 체크포인트</div>
            ${evidenceCards ? `<div class="insight-stack">${evidenceCards}</div>` : ''}
            ${checkpointList ? `<div class="impact-title" style="margin-top:12px;">다음 확인 포인트</div><ul class="detail-list">${checkpointList}</ul>` : ''}
          </div>` : ''}
      `;
    }

    /* ═══════════════════════════════════════════
       NEWS
    ═══════════════════════════════════════════ */
    function renderNews() {
      const pane = document.getElementById('pane-news');
      const list = state.currentView?.newsList || [];
      if (!list.length) { pane.innerHTML = '<div class="empty">핵심 이슈 데이터가 없습니다.</div>'; return; }

      pane.innerHTML = list.map((item, idx) => `
        <div class="card">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;">
            <div class="card-title" style="margin:0;flex:1;">${item.title || '이슈'}</div>
            ${(item.tags || []).length ? `<span class="badge" style="flex-shrink:0;">${item.tags[0]}</span>` : ''}
          </div>
          ${(item.tags || []).length > 1 ? `<div class="muted" style="margin-bottom:10px;">${(item.tags || []).slice(1, 4).join(' · ')}</div>` : ''}
          <div class="body-text">${item.summary || ''}</div>
          ${(item.detailPoints || []).length ? `
            <div class="impact-title">핵심 내용 정리</div>
            <ul class="detail-list">${(item.detailPoints || []).map(p => `<li class="detail-item">${p}</li>`).join('')}</ul>` : ''}
          ${item.portfolioImplication ? `<div class="impact-title">투자 시사점</div><div class="body-text">${item.portfolioImplication}</div>` : ''}
          ${item.executionGuide ? `<div class="impact-title">실행 메모</div><div class="body-text">${item.executionGuide}</div>` : ''}
          <div class="impact-title">섹터·자산 영향</div>
          ${(item.impacts || []).map(impact => `
            <div class="impact-item">
              <div class="impact-head">
                <span class="impact-dot ${impact.isPositive ? 'pos' : 'neg'}"></span>
                <span class="impact-name">${impact.sector || '-'}</span>
              </div>
              <div class="impact-desc">${impact.desc || ''}</div>
            </div>`).join('')}
          ${renderSources(item.sources, `news-src-${idx}`)}
        </div>`).join('');
    }

    /* ═══════════════════════════════════════════
       DIRECTION
    ═══════════════════════════════════════════ */
    function switchDirectionTab(horizon) { state.currentDirectionTab = horizon; renderDirection(); }

    function renderDirection() {
      const pane = document.getElementById('pane-direction');
      if (!state.currentDirectionTab) state.currentDirectionTab = state.currentHorizon || '1일';

      const tabButtons = HORIZON_ORDER.map(horizon => {
        const view     = state.horizonViews?.[horizon];
        const active   = horizon === state.currentDirectionTab ? 'active' : '';
        const scoreVal = view?.briefing?.sentiment?.score;
        const clr      = scoreColor(scoreVal);
        return `<button class="sub-tab-btn ${active}" onclick="switchDirectionTab('${horizon}')">${HORIZON_LABELS[horizon] || horizon}${scoreVal != null ? `<span class="sub-tab-score" style="color:${clr};">${scoreVal}</span>` : ''}</button>`;
      }).join('');

      const horizon = state.currentDirectionTab;
      const view    = state.horizonViews?.[horizon];
      let content   = '';

      if (view) {
        const briefing    = view.briefing || {};
        const strategy    = briefing.strategy || {};
        const forecast    = briefing.forecast || {};
        const signals     = view.signals || {};
        const valuation   = view.valuation || {};
        const llmInsights = view.llmInsights || {};
        const verificationStatus = llmInsights.verificationStatus || '';
        const verificationLabel  = verificationStatus === 'high_conviction' ? '강한 검증'
          : (verificationStatus === 'needs_follow_up' ? '추가 탐색 필요' : '검증 완료(주의 포함)');

        const filteredInsights = (briefing.insights || []).filter(item => !['누적요약', '데이터'].includes(item.category || ''));
        const insights = filteredInsights.slice(0, 4).map(item => `
          <div class="insight-card">
            ${item.category ? `<div class="insight-kicker">${item.category}</div>` : ''}
            <div class="body-text">${item.text || ''}</div>
          </div>`).join('');

        const deployNow      = view.portfolio?.capitalPlan?.deployNow || '-';
        const reserveCash    = view.portfolio?.capitalPlan?.reserveCash || '-';
        const executionStyle = view.rebalancing?.actions?.[0]?.executionStyle || '';
        const watchPoint     = view.rebalancing?.actions?.[0]?.pauseRule || '';
        const scoreValue     = briefing.sentiment?.score;
        const scoreClr       = scoreColor(scoreValue);
        const ms             = signals.marketSignal || {};
        const actionMeta     = marketActionMeta(scoreValue || 50, ms);

        const sp    = valuation.sp500  || {};
        const kospi = valuation.kospi  || {};
        const valRows = [
          { name: 'S&P500', grade: sp.grade,    detail: `ERP ${sp.erp != null ? sp.erp.toFixed(1)+'%' : 'N/A'} · PE ${sp.pe || 'N/A'}x · 52W ${sp.range52w != null ? sp.range52w.toFixed(0)+'%' : 'N/A'}` },
          { name: 'KOSPI',  grade: kospi.grade, detail: `PBR ${kospi.pbr || 'N/A'}x · ${kospi.pbrAssessment || ''}` },
        ].map(r => {
          const gc = r.grade === '저평가' ? CLR_POS : (r.grade === '고평가' || r.grade === '다소 고평가' ? CLR_NEG : CLR_MID);
          return `<div class="val-row"><span class="val-name">${r.name}</span><span class="val-grade" style="color:${gc};">${r.grade || '분석중'}</span><span class="val-detail">${r.detail}</span></div>`;
        }).join('');

        const topIdeas = (view.recommendations?.ideas || []).slice(0, 3).map(item => `
          <button class="selector-chip" style="min-width:220px;cursor:default;">
            <div class="selector-chip-top">
              <span class="selector-chip-label">${item.signal || item.action || '관찰'}</span>
              <span class="selector-chip-label">${item.ticker || '-'}</span>
            </div>
            <div class="selector-chip-name">${item.name || '-'}</div>
            <div class="selector-chip-sub">${item.execution || item.reason || ''}</div>
          </button>`).join('');

        const keySignals = (llmInsights.keySignals || []).slice(0, 4).map(s => `<li class="detail-item">${s}</li>`).join('');
        const sectorCalls = (llmInsights.sectorCalls || []).slice(0, 3).map(s => `
          <div class="insight-card">
            <div class="insight-kicker">${s.sector || '섹터'} · ${s.view || '중립'}</div>
            <div class="body-text">${s.rationale || ''}</div>
          </div>`).join('');

        const scenarioMatrix = (llmInsights.scenarioMatrix || []).slice(0, 3).map(item => `
          <div class="detail-box">
            <div class="detail-box-title">${item.scenario || '시나리오'} · ${item.probability || ''}</div>
            <div class="detail-box-text">${item.trigger || ''}</div>
            ${(item.portfolioResponse || item.portfolio_response) ? `<div class="body-text" style="margin-top:8px;"><b>대응:</b> ${item.portfolioResponse || item.portfolio_response}</div>` : ''}
          </div>`).join('');

        content = `
          <div class="card">
            <div class="dir-score-wrap">
              <div>
                <div class="dir-score-num" style="color:${scoreClr};">${scoreValue ?? '-'}<span class="muted" style="font-size:13px;"> /100</span></div>
                <div class="muted" style="font-size:11px;margin-top:2px;">${HORIZON_LABELS[horizon] || horizon} 기준 시장 방향성</div>
              </div>
              <div class="dir-regime-badge">${actionMeta.title}</div>
            </div>
            ${renderStatChips((briefing.metricChips || []).slice(0, 4))}
          </div>
          <div class="narrative-card">
            <div class="narrative-title">${HORIZON_LABELS[horizon] || horizon} 투자 방향</div>
            <div class="body-text">${strategy.summary || forecast.text || '방향성 데이터가 없습니다.'}</div>
            ${llmInsights.timingGuidance ? `<div class="body-text" style="margin-top:10px;"><b>집행 톤:</b> ${llmInsights.timingGuidance}</div>` : ''}
            ${llmInsights.researchLoopSummary ? `<div class="body-text" style="margin-top:10px;"><b>검증 루프:</b> ${llmInsights.researchLoopSummary}</div>` : ''}
            ${verificationStatus ? `<div class="muted" style="margin-top:8px;">검증 상태: ${verificationLabel}</div>` : ''}
            <div class="detail-grid" style="margin-top:14px;">
              <div class="detail-box"><div class="detail-box-title">이번 기간 실행 예산</div><div class="detail-box-text">${deployNow}</div></div>
              <div class="detail-box"><div class="detail-box-title">대기 자금</div><div class="detail-box-text">${reserveCash}</div></div>
              <div class="detail-box"><div class="detail-box-title">집행 리듬</div><div class="detail-box-text">${executionStyle || '-'}</div></div>
              <div class="detail-box"><div class="detail-box-title">보류 조건</div><div class="detail-box-text">${watchPoint || '-'}</div></div>
            </div>
          </div>
          <div class="card">
            <div class="card-title">핵심 포인트</div>
            <div class="insight-stack">${insights || '<div class="empty" style="padding:20px 0;">핵심 포인트 데이터가 없습니다.</div>'}</div>
          </div>
          ${sp.grade ? `
            <div class="card">
              <div class="card-title">밸류에이션 체크</div>
              <div class="muted" style="margin-bottom:10px;">${valuation.marketValuation || ''}</div>
              <div class="val-table">${valRows}</div>
            </div>` : ''}
          ${topIdeas ? `<div class="card"><div class="card-title">기간별 ETF 힌트</div><div class="selector-strip" style="margin:0;padding-top:2px;">${topIdeas}</div></div>` : ''}
          ${sectorCalls ? `<div class="card"><div class="card-title">섹터 시사점</div><div class="insight-stack">${sectorCalls}</div></div>` : ''}
          ${keySignals ? `
            <div class="card">
              <div class="card-title">핵심 시그널</div>
              <ul class="detail-list">${keySignals}</ul>
              ${(llmInsights.riskFactors || []).length ? `<div class="impact-title" style="margin-top:12px;">리스크 요인</div><ul class="detail-list">${(llmInsights.riskFactors || []).map(r => `<li class="detail-item">${r}</li>`).join('')}</ul>` : ''}
            </div>` : ''}
          ${scenarioMatrix ? `<div class="card"><div class="card-title">시나리오 매트릭스</div><div class="detail-grid">${scenarioMatrix}</div></div>` : ''}
        `;
      } else {
        content = `<div class="empty">${horizon} 데이터 로딩 중...</div>`;
      }

      pane.innerHTML = `<div class="sub-tab-bar">${tabButtons}</div>${content}`;
    }

    /* ═══════════════════════════════════════════
       RECOMMENDATIONS
    ═══════════════════════════════════════════ */
    function renderRecommendations() {
      const pane = document.getElementById('pane-recommendations');
      const data = state.currentView?.recommendations;
      if (!data) { pane.innerHTML = '<div class="empty">ETF 아이디어 데이터가 없습니다.</div>'; return; }

      const signalColors = { '강력매수': CLR_POS, '분할매수': CLR_MID, '소규모탐색': '#7c3aed', '관망': '#8b95a1', '비중축소': CLR_WARN, '회피': CLR_NEG };

      const ranking = (data.etfRanking || []).map((item, i) => {
        const rankCls = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
        return `
          <div class="rank-item">
            <div class="rank-num ${rankCls}">${item.rank || '-'}</div>
            <div class="rank-info">
              <div class="rank-head">
                <div class="rank-name">${item.name || '-'}<span class="rank-ticker">${item.ticker || '-'}</span></div>
                <div class="rank-score">${item.score || 0}점</div>
              </div>
              <div class="rank-track"><div class="rank-fill" style="width:${item.score || 0}%;"></div></div>
              <div class="muted" style="margin-top:6px;">${item.commentary || ''}</div>
            </div>
          </div>`;
      }).join('');

      const ideas = (data.ideas || []).map((item, idx) => `
        <div class="idea">
          <div class="idea-top">
            <div class="idea-left">
              <div class="idea-logo">${item.logo || '📌'}</div>
              <div>
                <div class="idea-name">${item.name || '-'}</div>
                <div class="idea-ticker">${item.ticker || '-'} · ${item.scoreText || ''}</div>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;">
              <div class="idea-action">${item.action || '관찰'}</div>
              ${item.signal ? `<div style="font-size:11px;font-weight:800;color:${signalColors[item.signal] || '#8b95a1'};">${item.signal}${item.timingGrade ? ' ' + item.timingGrade : ''}</div>` : ''}
            </div>
          </div>
          <div class="idea-body">
            <div class="issue-badge">연결 이슈: ${item.linkedIssue || '-'}</div>
            <div class="body-text">${item.reason || ''}</div>
            <div class="body-text" style="margin-top:10px;"><b>매크로 문맥:</b> ${item.macroContext || ''}</div>
            <div class="body-text" style="margin-top:10px;"><b>왜 살 수 있는가:</b> ${item.whyBuy || ''}</div>
            ${(item.evidencePoints || []).length ? `<div class="impact-title">근거 포인트</div><ul class="detail-list">${(item.evidencePoints || []).map(p => `<li class="detail-item">${p}</li>`).join('')}</ul>` : ''}
            <div class="body-text" style="margin-top:10px;"><b>우려 지점:</b> ${item.risk || ''}</div>
            <div class="body-text" style="margin-top:10px;"><b>권장 비중:</b> ${item.positioning || ''}</div>
            <div class="body-text" style="margin-top:10px;"><b>집행 방식:</b> ${item.execution || ''}</div>
            ${item.timingDetail ? `<div class="body-text" style="margin-top:10px;"><b>기술적 타이밍:</b> ${item.timingDetail}</div>` : ''}
            ${(item.entryConditions || []).length ? `<div class="impact-title">진입 조건</div><ul class="detail-list">${(item.entryConditions || []).map(c => `<li class="detail-item">${c}</li>`).join('')}</ul>` : ''}
            ${(item.exitConditions || []).length ? `<div class="impact-title">청산 조건</div><ul class="detail-list">${(item.exitConditions || []).map(c => `<li class="detail-item">${c}</li>`).join('')}</ul>` : ''}
            ${item.positionSizing && item.positionSizing.maxPct ? `
              <div class="body-text" style="margin-top:10px;"><b>포지션 사이징:</b> 최대 ${item.positionSizing.maxPct}% | 1차 ${item.positionSizing.firstPct || '-'}% (${item.positionSizing.firstAmount ? item.positionSizing.firstAmount.toLocaleString() + '원' : '-'})</div>
              <div class="muted" style="font-size:11px;">${item.positionSizing.schedule || ''}</div>` : ''}
            <div class="body-text" style="margin-top:10px;"><b>체크 포인트:</b> ${item.watchPoint || ''}</div>
            ${renderSources(item.sources, `idea-src-${idx}`)}
          </div>
        </div>`).join('');

      pane.innerHTML = `
        <div class="card">
          <div class="card-title">${state.currentView.bucketLabel || ''} ETF·테마 아이디어</div>
          <div class="muted">기간별 누적 흐름과 현재 레짐을 함께 반영한 아이디어입니다.</div>
        </div>
        <div class="card">
          <div class="card-title">ETF 우선순위 랭킹</div>
          <div class="muted" style="margin-bottom:12px;">현재 기간의 모멘텀, 리스크, 레짐 적합도를 함께 반영했습니다.</div>
          ${ranking || '<div class="empty">랭킹 데이터가 없습니다.</div>'}
        </div>
        ${ideas}`;
    }

    /* ═══════════════════════════════════════════
       NAVIGATION
    ═══════════════════════════════════════════ */
    function switchSection(section) {
      const currentPane = document.getElementById(`pane-${state.currentSection}`);
      if (currentPane) state.sectionScrolls[state.currentSection] = currentPane.scrollTop;
      state.currentSection = section;
      document.querySelectorAll('.tab').forEach(tab   => tab.classList.toggle('active',  tab.dataset.tab   === section));
      document.querySelectorAll('.pane').forEach(pane => pane.classList.toggle('active', pane.id           === `pane-${section}`));
      const nextPane = document.getElementById(`pane-${section}`);
      if (nextPane) nextPane.scrollTop = state.sectionScrolls[section] || 0;
    }

    function resetPaneScrolls() {
      document.querySelectorAll('.pane').forEach(p => { p.scrollTop = 0; });
      state.sectionScrolls = {};
    }

    /* ═══════════════════════════════════════════
       RENDER ALL
    ═══════════════════════════════════════════ */
    function renderAll() {
      state.sheetStore = {};
      renderPortfolio();
      renderRebalancing();
      renderDirection();
      renderBriefing();
      renderNews();
      renderRecommendations();
      closeSheet();
      switchSection(state.currentSection);
    }

    /* ═══════════════════════════════════════════
       INIT
    ═══════════════════════════════════════════ */
    async function init() {
      try {
        await loadIndex();
        resolveInitialSelection();
        await loadCurrentView();
        await loadDirectionViews();
        renderAll();
      } catch (error) {
        document.querySelector('.content').innerHTML = '<div class="empty">기간별 리포트를 불러오지 못했습니다.</div>';
        renderStatus('empty');
      }
    }

    window.onload = init;
  </script>
</body>
</html>
