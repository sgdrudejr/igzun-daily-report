<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>글로벌 매크로·ETF 리포트</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f2f4f6;
      --card: #ffffff;
      --blue: #3182f6;
      --red: #f04452;
      --green: #0b8c46;
      --orange: #ff6b00;
      --text-primary: #191f28;
      --text-secondary: #8b95a1;
      --text-tertiary: #b0b8c1;
      --border: #e8ecef;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .app {
      max-width: 480px;
      margin: 0 auto;
      height: 100dvh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── TOP BAR ── */
    .top-bar {
      flex-shrink: 0;
      background: var(--card);
      padding: 16px 20px 0;
      border-bottom: 1px solid var(--border);
    }
    .top-bar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .app-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.03em;
    }
    .date-badge {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .regime-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .regime-pill.neutral  { background: #f1f3f5; color: #495057; }
    .regime-pill.growth   { background: #e8f5e9; color: #2e7d32; }
    .regime-pill.risk-off { background: #fff3e0; color: #e65100; }
    .regime-pill.stagflation { background: #fce4ec; color: #c62828; }
    .regime-pill.inflationary { background: #fff8e1; color: #f57f17; }
    .regime-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

    /* ── MAIN TABS ── */
    .main-tabs {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .main-tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      letter-spacing: -0.02em;
    }
    .tab-btn.active {
      color: var(--text-primary);
      border-bottom-color: var(--text-primary);
    }

    /* ── SCROLL AREA ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 16px 100px;
      scrollbar-width: none;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* ── TAB PANELS ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── CARD BASE ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }
    .card-sm { padding: 16px; }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* ── AI HERO CARD (왜 올랐을까? style) ── */
    .ai-hero {
      background: var(--card);
      border-radius: var(--radius);
      padding: 22px 20px 18px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }
    .ai-context-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .ai-context-label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .ai-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      background: #f0f4ff;
      color: var(--blue);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .ai-action-text {
      font-size: 26px;
      font-weight: 900;
      color: var(--text-primary);
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 14px;
    }
    .ai-action-text .hl-blue { color: var(--blue); }
    .ai-action-text .hl-red { color: var(--red); }
    .ai-action-text .hl-green { color: var(--green); }
    .ai-bullets {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 14px;
    }
    .ai-bullets li {
      display: flex;
      gap: 8px;
      font-size: 14px;
      line-height: 1.45;
      color: #374151;
    }
    .ai-bullets li::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-secondary);
      flex-shrink: 0;
      margin-top: 7px;
    }
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      padding: 4px 10px;
      background: #f1f3f5;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: #495057;
    }
    .tag.blue { background: #e8f1ff; color: var(--blue); }
    .tag.red  { background: #ffebec; color: var(--red); }
    .tag.green { background: #e6f9f0; color: var(--green); }

    /* ── ISSUE LIST (지금 많이 언급되는 이슈) ── */
    .issue-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }
    .issue-header {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 14px;
      letter-spacing: -0.02em;
    }
    .issue-list { list-style: none; display: flex; flex-direction: column; gap: 0; }
    .issue-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .issue-item:last-child { border-bottom: none; }
    .issue-rank {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .issue-rank.r1 { background: #fff0e6; color: #e05c00; }
    .issue-rank.r2 { background: #e8f1ff; color: var(--blue); }
    .issue-rank.r3 { background: #f0f9f4; color: var(--green); }
    .issue-rank.rn { background: #f1f3f5; color: #868e96; }
    .issue-text {
      flex: 1;
      min-width: 0;
    }
    .issue-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      margin-bottom: 2px;
    }
    .issue-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    /* ── SIGNAL CARDS ── */
    .sig-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 10px;
    }
    .sig-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .sig-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .sig-label-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .signal-badge {
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 800;
    }
    .signal-badge.buy    { background: #e8f5e9; color: var(--green); }
    .signal-badge.strong { background: #fff8e1; color: var(--orange); }
    .signal-badge.hold   { background: #f1f3f5; color: #495057; }
    .signal-badge.sell   { background: #ffebec; color: var(--red); }
    .grade-chip {
      width: 26px; height: 26px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 900;
    }
    .grade-chip.A { background: #e8f5e9; color: var(--green); }
    .grade-chip.B { background: #e3f2fd; color: #1565c0; }
    .grade-chip.C { background: #fff8e1; color: #f57f17; }
    .grade-chip.D { background: #fce4ec; color: #c62828; }
    .grade-chip.F { background: #f5f5f5; color: #757575; }
    .rsi-chip {
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
    }
    .rsi-chip.oversold  { background: #e8f5e9; color: var(--green); }
    .rsi-chip.overbought { background: #ffebec; color: var(--red); }
    .rsi-chip.neutral   { background: #f1f3f5; color: #495057; }
    .micro-plan-box {
      background: #f8faff;
      border: 1px solid #dbeafe;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      margin-top: 10px;
    }
    .micro-plan-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 4px;
      letter-spacing: 0.02em;
    }
    .micro-plan-text {
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.5;
      font-weight: 500;
    }
    .sig-reasons {
      list-style: none;
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sig-reasons li {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      gap: 6px;
      align-items: flex-start;
    }
    .sig-reasons li::before {
      content: '•';
      color: var(--text-tertiary);
      font-size: 10px;
      margin-top: 2px;
    }

    /* ── VALUATION TABLE ── */
    .val-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }
    .val-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 14px;
    }
    .val-row {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .val-row:last-child { border-bottom: none; }
    .val-asset {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      width: 80px;
      flex-shrink: 0;
    }
    .val-bar-wrap {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .val-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--blue);
      transition: width 0.5s ease;
    }
    .val-grade {
      font-size: 12px;
      font-weight: 700;
      width: 56px;
      text-align: right;
      flex-shrink: 0;
    }
    .val-grade.under { color: var(--green); }
    .val-grade.fair  { color: #495057; }
    .val-grade.over  { color: var(--red); }

    /* ── SECTOR IMPACT (어떤 영향을 줄까?) ── */
    .sector-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }
    .sector-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 14px;
    }
    .sector-item {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .sector-item:last-child { border-bottom: none; }
    .sector-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .sector-icon.pos  { background: #e8f5e9; }
    .sector-icon.neg  { background: #ffebec; }
    .sector-icon.neut { background: #f1f3f5; }
    .sector-info { flex: 1; min-width: 0; }
    .sector-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .sector-desc { font-size: 12px; color: var(--text-secondary); }
    .sector-impact-tag {
      padding: 3px 9px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .sector-impact-tag.pos  { background: #e8f5e9; color: var(--green); }
    .sector-impact-tag.neg  { background: #ffebec; color: var(--red); }
    .sector-impact-tag.neut { background: #f1f3f5; color: #868e96; }

    /* ── DIRECTION TAB (방향) ── */
    .sub-tabs {
      display: flex;
      background: var(--card);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      gap: 2px;
    }
    .sub-tab-btn {
      flex: 1;
      padding: 8px 4px;
      border: none;
      background: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .sub-tab-btn.active {
      background: var(--text-primary);
      color: #fff;
    }
    .score-hero {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px 20px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
      text-align: center;
    }
    .score-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }
    .score-circle.low  { background: #ffebec; color: var(--red); }
    .score-circle.mid  { background: #fff8e1; color: var(--orange); }
    .score-circle.high { background: #e8f5e9; color: var(--green); }
    .score-circle.vhigh{ background: #e3f2fd; color: var(--blue); }
    .score-label { font-size: 18px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.02em; }
    .score-sub   { font-size: 13px; color: var(--text-secondary); }
    .buy-row {
      display: flex;
      align-items: center;
      padding: 12px 0;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .buy-row:last-child { border-bottom: none; }
    .buy-rank {
      width: 22px; height: 22px;
      border-radius: 6px;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: var(--text-secondary);
      flex-shrink: 0;
    }
    .buy-name { font-size: 14px; font-weight: 700; flex: 1; }
    .buy-signal { font-size: 12px; font-weight: 700; }
    .buy-signal.pos { color: var(--green); }
    .buy-signal.neg { color: var(--red); }
    .buy-signal.neu { color: var(--text-secondary); }

    /* ── ETF TAB ── */
    .etf-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
      cursor: pointer;
    }
    .etf-card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .etf-num {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: var(--text-secondary);
      flex-shrink: 0;
    }
    .etf-info { flex: 1; min-width: 0; }
    .etf-name { font-size: 15px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 2px; }
    .etf-meta { font-size: 12px; color: var(--text-secondary); }
    .etf-score-badge {
      flex-shrink: 0;
      text-align: right;
    }
    .etf-score-num {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .etf-score-sub { font-size: 10px; color: var(--text-secondary); font-weight: 600; }
    .etf-impact { margin-top: 4px; }
    .etf-impact-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .etf-impact-items { display: flex; flex-direction: column; gap: 6px; }
    .etf-impact-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .etf-impact-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .etf-impact-dot.pos { background: var(--green); }
    .etf-impact-dot.neg { background: var(--red); }
    .etf-impact-dot.neu { background: var(--text-tertiary); }
    .etf-impact-txt { font-size: 13px; color: var(--text-primary); font-weight: 500; }
    .etf-expand { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .etf-expand.open { display: block; }
    .etf-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .etf-detail-item {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
    }
    .etf-detail-key { font-size: 11px; color: var(--text-secondary); font-weight: 600; margin-bottom: 3px; }
    .etf-detail-val { font-size: 14px; font-weight: 800; letter-spacing: -0.02em; }

    /* ── NEWS TAB ── */
    .news-item {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 10px;
      cursor: pointer;
    }
    .news-source-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .news-source-badge {
      padding: 2px 7px;
      background: #f1f3f5;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      color: #495057;
    }
    .news-time { font-size: 11px; color: var(--text-tertiary); }
    .news-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }
    .news-summary { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
    .news-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .news-detail.open { display: block; }
    .news-detail-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .news-detail-list li {
      font-size: 13px;
      color: var(--text-primary);
      display: flex;
      gap: 8px;
      line-height: 1.45;
    }
    .news-detail-list li::before { content: '→'; color: var(--text-tertiary); flex-shrink: 0; }

    /* ── PORTFOLIO TAB ── */
    .port-balance-card {
      background: linear-gradient(135deg, #1a1f2e 0%, #2d3a55 100%);
      border-radius: var(--radius);
      padding: 24px 20px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
      color: #fff;
    }
    .port-balance-label { font-size: 13px; opacity: 0.7; margin-bottom: 6px; }
    .port-balance-amount { font-size: 32px; font-weight: 900; letter-spacing: -0.04em; }
    .port-balance-sub { font-size: 13px; opacity: 0.6; margin-top: 4px; }
    .port-action-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }
    .port-action-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .port-action-main {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .port-action-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .port-picks { margin-top: 16px; }
    .port-pick-row {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .port-pick-row:last-child { border-bottom: none; }
    .port-pick-name { flex: 1; font-size: 14px; font-weight: 700; }
    .port-pick-action { font-size: 13px; font-weight: 700; }
    .port-pick-action.buy   { color: var(--green); }
    .port-pick-action.watch { color: var(--blue); }
    .port-pick-action.sell  { color: var(--red); }
    .port-pick-size { font-size: 12px; color: var(--text-secondary); }

    /* ── BOTTOM TABS ── */
    .bottom-tabs {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 8px);
    }
    .bottom-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 4px;
      border: none;
      background: none;
      cursor: pointer;
      gap: 3px;
    }
    .bottom-tab-icon {
      font-size: 20px;
      line-height: 1;
      filter: grayscale(1) opacity(0.4);
      transition: filter 0.15s;
    }
    .bottom-tab-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-tertiary);
      transition: color 0.15s;
    }
    .bottom-tab.active .bottom-tab-icon { filter: none; }
    .bottom-tab.active .bottom-tab-label { color: var(--blue); font-weight: 800; }

    /* ── MISC ── */
    .divider { height: 1px; background: var(--border); margin: 14px 0; }
    .row-between { display: flex; justify-content: space-between; align-items: center; }
    .text-sm { font-size: 13px; }
    .text-xs { font-size: 11px; }
    .text-muted { color: var(--text-secondary); }
    .fw-bold { font-weight: 700; }
    .fw-black { font-weight: 900; }
    .mt-4 { margin-top: 4px; }
    .mt-8 { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* ── SKELETON ── */
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skel {
      background: linear-gradient(90deg, #f0f2f4 25%, #e8ebee 50%, #f0f2f4 75%);
      background-size: 200%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    .skel-line { height: 14px; margin-bottom: 8px; }
    .skel-line.w80 { width: 80%; }
    .skel-line.w60 { width: 60%; }
    .skel-line.w40 { width: 40%; }
  </style>
</head>
<body>
<div class="app" id="app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-row">
      <span class="app-title">이준 리포트</span>
      <span class="date-badge" id="topDate">···</span>

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
      <div id="regimePill" class="regime-pill neutral">

        <span id="regimeText">로딩중</span>
      </div>
      <span id="totalScoreTop" class="text-sm fw-bold text-muted">—</span>

    <nav class="main-tabs" id="mainTabs">

      <button class="tab-btn" data-tab="dir">방향</button>

  <!-- SCROLL AREA -->
  <div class="scroll-area" id="scrollArea">

    <!-- ══════════ 신호 탭 ══════════ -->
    <div class="tab-panel active" id="panel-sig">
      <!-- AI Hero -->
      <div class="ai-hero" id="aiHero">
        <div class="skel skel-line w60"></div>
        <div class="skel skel-line" style="height:32px;margin:8px 0 14px;"></div>
        <div class="skel skel-line w80"></div>
        <div class="skel skel-line w60" style="margin-top:6px;"></div>
      </div>

      <!-- 이슈 리스트 -->
      <div class="issue-card" id="issueCard">
        <div class="skel skel-line w40" style="height:18px;margin-bottom:12px;"></div>
        <div class="skel skel-line w80"></div>
        <div class="skel skel-line w60" style="margin-top:8px;"></div>

      <!-- 매수 신호 카드들 -->

      </div>

      <!-- 섹터 영향 -->
      <div class="sector-card" id="sectorCard">
        <div class="skel skel-line w60" style="height:18px;margin-bottom:12px;"></div>
        <div class="skel skel-line"></div>
        <div class="skel skel-line w80" style="margin-top:8px;"></div>
      </div>
    </div>

    <!-- ══════════ 방향 탭 ══════════ -->
    <div class="tab-panel" id="panel-dir">
      <div class="sub-tabs" id="subTabs">
        <button class="sub-tab-btn active" data-period="short">단기</button>
        <button class="sub-tab-btn" data-period="mid">중기</button>

    <!-- ══════════ ETF 탭 ══════════ -->

      <div id="etfCards">

    <!-- ══════════ 뉴스 탭 ══════════ -->

    <!-- ══════════ 포트 탭 ══════════ -->

  <!-- BOTTOM TABS -->
  <nav class="bottom-tabs" id="bottomTabs">
    <button class="bottom-tab active" data-tab="sig">
      <span class="bottom-tab-icon">📡</span>
      <span class="bottom-tab-label">신호</span>
    </button>
    <button class="bottom-tab" data-tab="dir">
      <span class="bottom-tab-icon">🧭</span>
      <span class="bottom-tab-label">방향</span>
    </button>
    <button class="bottom-tab" data-tab="etf">
      <span class="bottom-tab-icon">📊</span>
      <span class="bottom-tab-label">ETF</span>
    </button>
    <button class="bottom-tab" data-tab="news">
      <span class="bottom-tab-icon">📰</span>
      <span class="bottom-tab-label">뉴스</span>
    </button>
    <button class="bottom-tab" data-tab="port">
      <span class="bottom-tab-icon">💼</span>
      <span class="bottom-tab-label">포트</span>

</div><!-- /app -->

<script>
/* ══════════════════════════════════════════════
   DATA LAYER
══════════════════════════════════════════════ */
const S = { result: null, hvViews: {}, currentPeriod: 'short' };
const DATE_STR = (()=>{
  const p = location.pathname.split('/').filter(Boolean);
  const d = p.find(s => /^\d{4}-\d{2}-\d{2}$/.test(s));
  return d || new Date().toISOString().slice(0,10);
})();

async function loadData() {
  try {
    const [resRaw, shortRaw, midRaw, longRaw] = await Promise.allSettled([
      fetch(`result.json?v=${Date.now()}`).then(r=>r.ok?r.json():null),
      fetch(`../../horizons/short/latest.json`).then(r=>r.ok?r.json():null),
      fetch(`../../horizons/mid/latest.json`).then(r=>r.ok?r.json():null),
      fetch(`../../horizons/long/latest.json`).then(r=>r.ok?r.json():null),
    ]);
    S.result = resRaw.status==='fulfilled' ? resRaw.value : null;
    S.hvViews.short = shortRaw.status==='fulfilled' ? shortRaw.value : null;
    S.hvViews.mid   = midRaw.status==='fulfilled'   ? midRaw.value   : null;
    S.hvViews.long  = longRaw.status==='fulfilled'  ? longRaw.value  : null;
  } catch(e) {
    console.warn('loadData error', e);
  }
  renderAll();
}

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
const R = S.result;
function d(v, fallback='—') { return (v!==null && v!==undefined) ? v : fallback; }
function pct(v) { return v!=null ? (v>0?`+${v.toFixed(1)}%`:`${v.toFixed(1)}%`) : '—'; }
function fmtNum(v) { if(v==null)return'—'; return Number(v).toLocaleString('ko-KR'); }

function signalText(sig) {
  const m = {
    '강력매수':'강력 매수','분할매수':'분할 매수','소규모탐색':'소규모 탐색',
    '관망':'관망','비중축소':'비중 축소','회피':'회피',
    'BUY':'매수','SELL':'매도','HOLD':'관망'
  };
  return m[sig] || sig || '—';
}
function signalClass(sig) {
  if(!sig) return 'hold';
  if(/(강력|STRONG|strong)/.test(sig)) return 'strong';
  if(/(매수|BUY|buy|탐색)/.test(sig)) return 'buy';
  if(/(매도|SELL|sell|축소|회피)/.test(sig)) return 'sell';
  return 'hold';
}
function valGradeClass(g) {
  if(!g) return 'fair';
  if(/(저평가)/.test(g)) return 'under';
  if(/(고평가)/.test(g)) return 'over';
  return 'fair';
}
function regimeClass(r) {
  if(!r) return 'neutral';
  if(/Growth/.test(r)) return 'growth';
  if(/Stagflation|Recession/.test(r)) return 'stagflation';
  if(/Inflationary/.test(r)) return 'inflationary';
  if(/Risk|Dollar/.test(r)) return 'risk-off';
  return 'neutral';
}
function regimeEmoji(r) {
  if(!r) return '⚪';
  if(/Growth/.test(r)) return '🟢';
  if(/Stagflation|Recession/.test(r)) return '🔴';
  if(/Inflationary/.test(r)) return '🟡';
  if(/Risk|Dollar/.test(r)) return '🟠';
  return '⚪';
}

function scoreColorClass(s) {
  if(s==null) return 'mid';
  if(s>=70) return 'vhigh';
  if(s>=55) return 'high';
  if(s>=40) return 'mid';
  return 'low';
}

/* ══════════════════════════════════════════════
   RENDER TOP BAR
══════════════════════════════════════════════ */
function renderTopBar() {
  const r = S.result;
  document.getElementById('topDate').textContent = DATE_STR;

  if(!r) return;
  const regime = r.regime || 'Neutral';
  const pill = document.getElementById('regimePill');
  pill.className = `regime-pill ${regimeClass(regime)}`;
  document.getElementById('regimeText').textContent = r.regimeKr || regime;

  const ts = r.totalScore;
  document.getElementById('totalScoreTop').textContent = ts!=null ? `종합 ${Math.round(ts)}점` : '—';
}

/* ══════════════════════════════════════════════
   RENDER 신호 탭
══════════════════════════════════════════════ */
function renderSigTab() {
  const r = S.result;
  renderAiHero(r);
  renderIssueList(r);
  renderSigCards(r);
  renderValuation(r);
  renderSectorCalls(r);
}

function renderAiHero(r) {
  const el = document.getElementById('aiHero');
  if(!r) { return; }
  const llm = r.llmInsights || {};
  const sig = r.signals || {};
  const summary = sig.summary || {};
  const narrative = llm.marketNarrative || summary.overall_summary || '시장 데이터를 분석 중입니다.';
  const regimeAssess = llm.regimeAssessment || r.regimeKr || '중립';
  const action = llm.timingGuidance || summary.market_signal || '관망';
  const apiUsed = llm.apiUsed ? `<span class="ai-badge">✦ AI 분석</span>` : `<span class="ai-badge">📊 알고리즘</span>`;
  const bullets = (llm.riskFactors || []).slice(0,3);
  const tags = buildTags(r);

  el.innerHTML = `
    <div class="ai-context-row">
      <span class="ai-context-label">${regimeAssess} 국면</span>
      ${apiUsed}
    </div>
    <div class="ai-action-text">${narrative}</div>
    <ul class="ai-bullets">
      ${bullets.map(b=>`<li>${b}</li>`).join('')}
      ${!bullets.length ? `<li>${narrative}</li>` : ''}
    </ul>
    <div class="tag-row">
      ${tags.map(t=>`<span class="tag ${t.cls}">${t.text}</span>`).join('')}
    </div>
  `;
}

function buildTags(r) {
  const tags = [];
  if(!r) return tags;
  const sig = (r.signals||{}).summary||{};
  const val = (r.valuation||{}).summary||{};
  const ms = sig.market_signal || '';
  if(/(매수|BUY)/.test(ms)) tags.push({text:'📈 매수 우위', cls:'green'});
  else if(/(매도|SELL)/.test(ms)) tags.push({text:'📉 매도 신호', cls:'red'});
  else tags.push({text:'⚖️ 관망 구간', cls:''});
  if(val.market_valuation) {
    if(/저평가/.test(val.market_valuation)) tags.push({text:'💎 저평가', cls:'blue'});
    else if(/고평가/.test(val.market_valuation)) tags.push({text:'⚠️ 고평가', cls:'red'});
  }
  const regime = r.regime||'';
  if(/Growth/.test(regime)) tags.push({text:'🚀 성장 국면', cls:'green'});
  else if(/Stagflation/.test(regime)) tags.push({text:'🌡️ 스태그플레이션', cls:'red'});
  else if(/Risk/.test(regime)) tags.push({text:'🛡️ 위험 회피', cls:''});
  return tags.slice(0,4);
}

function renderIssueList(r) {
  const el = document.getElementById('issueCard');
  if(!r) return;
  const llm = r.llmInsights || {};
  const signals = llm.keySignals || [];
  if(!signals.length) { el.style.display='none'; return; }

  const rankCls = ['r1','r2','r3','rn','rn'];
  el.innerHTML = `
    <div class="issue-header">지금 많이 언급되는 이슈</div>
    <ul class="issue-list">
      ${signals.slice(0,5).map((s,i)=>{
        const parts = s.split(':');
        const title = parts[0] || s;
        const desc = parts[1] || '';
        return `
          <li class="issue-item">
            <div class="issue-rank ${rankCls[i]||'rn'}">${i+1}</div>
            <div class="issue-text">
              <div class="issue-title">${title.trim()}</div>
              ${desc ? `<div class="issue-desc">${desc.trim()}</div>` : ''}
            </div>
          </li>`;
      }).join('')}
    </ul>
  `;
}

function renderSigCards(r) {
  const el = document.getElementById('sigCards');
  if(!r) { el.innerHTML=''; return; }
  const topBuys = ((r.signals||{}).topBuys || []).slice(0,5);
  if(!topBuys.length) { el.innerHTML=''; return; }

  el.innerHTML = topBuys.map(etf=>{
    const sig = etf.signal || etf.action || '관망';
    const grade = etf.timing_grade || etf.grade || 'C';
    const rsi = etf.timing_details?.rsi?.value ?? etf.rsi_value;
    const microPlan = etf.position_sizing?.micro_plan || '';
    const reasons = (etf.reasons||[]).slice(0,3);
    const rsiClass = rsi!=null ? (rsi<35?'oversold':rsi>65?'overbought':'neutral') : 'neutral';
    const rsiLabel = rsi!=null ? `RSI ${rsi.toFixed(0)}` : '';

    return `
      <div class="sig-card">
        <div class="sig-card-header">
          <span class="sig-name">${etf.name || etf.ticker || '—'}</span>
          <div class="sig-label-row">
            ${rsiLabel ? `<span class="rsi-chip ${rsiClass}">${rsiLabel}</span>` : ''}
            <div class="grade-chip ${grade}">${grade}</div>
            <span class="signal-badge ${signalClass(sig)}">${signalText(sig)}</span>
          </div>
        </div>
        ${reasons.length ? `<ul class="sig-reasons">${reasons.map(rr=>`<li>${rr}</li>`).join('')}</ul>` : ''}
        ${microPlan ? `
          <div class="micro-plan-box">
            <div class="micro-plan-label">진입 가이드</div>
            <div class="micro-plan-text">${microPlan}</div>
          </div>` : ''}
      </div>
    `;
  }).join('');
}

function renderValuation(r) {
  const el = document.getElementById('valCard');
  if(!r || !r.valuation) { el.style.display='none'; return; }
  const val = r.valuation;
  const assets = [
    { key:'sp500',  label:'S&P500', v:val.sp500 },
    { key:'kospi',  label:'KOSPI',  v:val.kospi },
    { key:'nasdaq', label:'나스닥', v:val.nasdaq },
    { key:'gold',   label:'금',     v:val.gold },
  ].filter(a=>a.v && !a.v.error);

  if(!assets.length) { el.style.display='none'; return; }

  el.innerHTML = `
    <div class="val-title">밸류에이션</div>
    ${assets.map(a=>{
      const score = a.v.valuation_score ?? 50;
      const grade = a.v.valuation_grade || a.v.assessment || '—';
      const gc = valGradeClass(grade);
      return `
        <div class="val-row">
          <div class="val-asset">${a.label}</div>
          <div class="val-bar-wrap">
            <div class="val-bar-fill" style="width:${Math.min(100,score)}%"></div>
          </div>
          <div class="val-grade ${gc}">${grade}</div>
        </div>`;
    }).join('')}
    <div style="margin-top:12px; font-size:12px; color:var(--text-secondary);">
      ${val.summary?.market_valuation || ''}
    </div>
  `;
}

function renderSectorCalls(r) {
  const el = document.getElementById('sectorCard');
  if(!r) return;
  const llm = r.llmInsights || {};
  const calls = llm.sectorCalls || [];
  if(!calls.length) { el.style.display='none'; return; }

  const sectorIcons = {
    'Tech':'💻','기술':'💻','반도체':'🔬','AI':'🤖',
    '에너지':'⚡','Energy':'⚡','소재':'🪨','Materials':'🪨',
    '채권':'📜','Bond':'📜','금':'🥇','Gold':'🥇',
    '헬스케어':'🏥','Healthcare':'🏥','소비재':'🛒','Consumer':'🛒',
    '금융':'🏦','Finance':'🏦','부동산':'🏠','Real Estate':'🏠',
  };

  el.innerHTML = `
    <div class="sector-title">어떤 영향을 줄까?</div>
    ${calls.slice(0,6).map(c=>{
      let sName='', sView='', sImpact='neutral';
      if(typeof c==='string') {
        const parts = c.split(':');
        sName = parts[0].trim();
        sView = parts[1]?.trim() || '';
        sImpact = /(긍정|유리|상승|매수|positive|pos)/i.test(sView)?'pos':/(부정|불리|하락|매도|neg)/i.test(sView)?'neg':'neut';
      } else {
        sName = c.sector||c.name||'';
        sView = c.view||c.outlook||'';
        sImpact = c.impact||'neut';
        if(/(pos|긍정|유리)/.test(sImpact)) sImpact='pos';
        else if(/(neg|부정|불리)/.test(sImpact)) sImpact='neg';
        else sImpact='neut';
      }
      const icon = Object.entries(sectorIcons).find(([k])=>sName.includes(k))?.[1] || '📈';
      const impactLabel = sImpact==='pos'?'↑ 긍정':sImpact==='neg'?'↓ 부정':'→ 중립';
      return `
        <div class="sector-item">
          <div class="sector-icon ${sImpact}">${icon}</div>
          <div class="sector-info">
            <div class="sector-name">${sName}</div>
            <div class="sector-desc">${sView}</div>
          </div>
          <span class="sector-impact-tag ${sImpact}">${impactLabel}</span>
        </div>`;
    }).join('')}
  `;
}

/* ══════════════════════════════════════════════
   RENDER 방향 탭
══════════════════════════════════════════════ */
function renderDirTab(period) {
  const el = document.getElementById('dirContent');
  const view = S.hvViews[period];
  const r = S.result;
  if(!view && !r) {
    el.innerHTML = `<div class="empty-state">데이터가 없습니다</div>`;
    return;
  }
  const score = view?.score ?? r?.totalScore;
  const scoreCC = scoreColorClass(score);
  const label = view?.score_label || r?.regimeKr || '분석 중';
  const strategy = view?.strategy || r?.llmInsights?.portfolioComment || '—';
  const buys = view?.top_buy_ideas || r?.signals?.topBuys || [];
  const sells = view?.avoid_list || r?.signals?.avoidList || [];
  const secCalls = view?.sector_calls || r?.llmInsights?.sectorCalls || [];

  el.innerHTML = `
    <div class="score-hero">
      <div class="score-circle ${scoreCC}">${score!=null?Math.round(score):'—'}</div>
      <div class="score-label">${label}</div>
      <div class="score-sub">${period==='short'?'단기 (1-4주)':period==='mid'?'중기 (1-3개월)':'장기 (3-12개월)'}</div>
    </div>

    ${strategy ? `
    <div class="card">
      <div class="section-label">전략</div>
      <div class="text-sm" style="line-height:1.6;">${strategy}</div>
    </div>` : ''}

    ${buys.length ? `
    <div class="card">
      <div class="section-label">매수 후보</div>
      ${buys.slice(0,6).map((e,i)=>{
        const nm = e.name||e.ticker||e;
        const sg = signalText(e.signal||e.action||'');
        return `<div class="buy-row">
          <div class="buy-rank">${i+1}</div>
          <div class="buy-name">${nm}</div>
          <div class="buy-signal pos">${sg}</div>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${sells.length ? `
    <div class="card">
      <div class="section-label">관망·회피</div>
      ${sells.slice(0,4).map((e,i)=>{
        const nm = e.name||e.ticker||e;
        return `<div class="buy-row">
          <div class="buy-rank">${i+1}</div>
          <div class="buy-name">${nm}</div>
          <div class="buy-signal neg">회피</div>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${secCalls.length ? `
    <div class="card">
      <div class="section-label">섹터 방향</div>
      ${secCalls.slice(0,5).map(c=>{
        let n='',v='',im='neut';
        if(typeof c==='string'){
          const p=c.split(':');n=p[0].trim();v=p[1]?.trim()||'';
          im=/(긍정|유리|상승)/i.test(v)?'pos':/(부정|불리|하락)/i.test(v)?'neg':'neut';
        } else { n=c.sector||c.name||''; v=c.view||''; im=c.impact||'neut'; }
        return `<div class="buy-row">
          <div class="buy-name">${n}</div>
          <div class="buy-signal ${im==='pos'?'pos':im==='neg'?'neg':'neu'}">${v||'중립'}</div>
        </div>`;
      }).join('')}
    </div>` : ''}
  `;
}

/* ══════════════════════════════════════════════
   RENDER ETF 탭
══════════════════════════════════════════════ */
function renderEtfTab() {
  const el = document.getElementById('etfCards');
  const r = S.result;
  if(!r) { el.innerHTML=`<div class="empty-state">데이터 로딩 중...</div>`; return; }

  // Collect from all periods + signals
  let ideas = [];
  if(r.signals?.topBuys?.length) ideas = r.signals.topBuys;
  else {
    ['short','mid','long'].forEach(p=>{
      const pv = (r.dataByPeriod||{})[p];
      if(pv?.recommendations) ideas.push(...(pv.recommendations||[]));
    });
    // dedupe
    const seen = new Set();
    ideas = ideas.filter(e=>{ const k=e.ticker||e.name; if(seen.has(k))return false; seen.add(k);return true; });
  }

  if(!ideas.length) { el.innerHTML=`<div class="empty-state">ETF 데이터가 없습니다</div>`; return; }

  el.innerHTML = ideas.slice(0,12).map((etf,i)=>{
    const score = etf.score ?? etf.total_score;
    const scoreCC = scoreColorClass(score);
    const sig = etf.signal||etf.action||'관망';
    const reasons = etf.reasons||etf.key_takeaways||[];
    const llmInsights = r.llmInsights || {};

    // impact items from signal reasons or default
    const impacts = reasons.slice(0,3).map(rr=>{
      const isPos = /(상승|긍정|유리|매수|강세|저평가|oversold|bullish)/i.test(rr);
      const isNeg = /(하락|부정|불리|매도|약세|고평가|overbought|bearish)/i.test(rr);
      return { txt: rr, cls: isPos?'pos':isNeg?'neg':'neu' };
    });

    const details = {
      timing: etf.timing_grade||'—',
      rsi: etf.timing_details?.rsi?.value != null ? etf.timing_details.rsi.value.toFixed(0) : '—',
      ma: etf.timing_details?.ma?.alignment || '—',
      elliott: etf.timing_details?.elliott?.wave_phase || '—',
    };

    return `
      <div class="etf-card" id="etfCard_${i}" onclick="toggleEtf(${i})">
        <div class="etf-card-header">
          <div class="etf-num">${i+1}</div>
          <div class="etf-info">
            <div class="etf-name">${etf.name||etf.ticker||'—'}</div>
            <div class="etf-meta">${etf.ticker||''} · <span class="signal-badge ${signalClass(sig)}" style="padding:2px 6px;font-size:11px;">${signalText(sig)}</span></div>
          </div>
          <div class="etf-score-badge">
            <div class="etf-score-num" style="color:${scoreCC==='high'||scoreCC==='vhigh'?'var(--green)':scoreCC==='low'?'var(--red)':'var(--orange)'}">${score!=null?Math.round(score):'—'}</div>
            <div class="etf-score-sub">점수</div>
          </div>
        </div>
        ${impacts.length ? `
        <div class="etf-impact">
          <div class="etf-impact-label">어떤 영향을 줄까?</div>
          <div class="etf-impact-items">
            ${impacts.map(im=>`
              <div class="etf-impact-row">
                <div class="etf-impact-dot ${im.cls}"></div>
                <div class="etf-impact-txt">${im.txt}</div>
              </div>`).join('')}
          </div>
        </div>` : ''}
        <div class="etf-expand" id="etfExpand_${i}">
          <div class="etf-detail-grid">
            <div class="etf-detail-item"><div class="etf-detail-key">타이밍 등급</div><div class="etf-detail-val">${details.timing}</div></div>
            <div class="etf-detail-item"><div class="etf-detail-key">RSI</div><div class="etf-detail-val">${details.rsi}</div></div>
            <div class="etf-detail-item"><div class="etf-detail-key">MA 배열</div><div class="etf-detail-val" style="font-size:12px;">${details.ma}</div></div>
            <div class="etf-detail-item"><div class="etf-detail-key">엘리어트</div><div class="etf-detail-val" style="font-size:12px;">${details.elliott}</div></div>
          </div>
          ${etf.position_sizing?.micro_plan ? `
          <div class="micro-plan-box">
            <div class="micro-plan-label">진입 가이드</div>
            <div class="micro-plan-text">${etf.position_sizing.micro_plan}</div>
          </div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function toggleEtf(i) {
  const ex = document.getElementById(`etfExpand_${i}`);
  if(ex) ex.classList.toggle('open');
}

/* ══════════════════════════════════════════════
   RENDER 뉴스 탭
══════════════════════════════════════════════ */
function renderNewsTab() {
  const el = document.getElementById('newsItems');
  const r = S.result;
  if(!r) { el.innerHTML=`<div class="empty-state">데이터 로딩 중...</div>`; return; }

  const llm = r.llmInsights || {};
  const highlights = llm.newsHighlights || [];
  const narrative = llm.marketNarrative || '';

  // Build news items from highlights + regime signals
  let items = [];

  if(narrative) {
    items.push({
      source:'AI 분석', time:'오늘',
      title: '시장 종합 분석',
      summary: narrative,
      detail: [llm.timingGuidance, llm.portfolioComment].filter(Boolean),
    });
  }

  highlights.forEach((h,i)=>{
    if(typeof h==='string') {
      const parts = h.split(':');
      items.push({
        source:'AI 요약', time:`${i+1}번 이슈`,
        title: parts[0].trim(),
        summary: parts[1]?.trim() || h,
        detail: [],
      });
    } else {
      items.push({
        source: h.source||'뉴스', time: h.date||'',
        title: h.title||h.headline||'',
        summary: h.summary||h.desc||'',
        detail: h.key_points || [],
      });
    }
  });

  // fallback from regime/signals
  if(items.length < 3 && r.regime) {
    const sig = r.signals?.summary||{};
    items.push({
      source:'매크로', time:'',
      title:`${r.regimeKr||r.regime} 국면 지속`,
      summary: sig.overall_summary || sig.market_signal || '시장 방향성 분석 결과입니다.',
      detail: [],
    });
  }

  if(!items.length) { el.innerHTML=`<div class="empty-state">뉴스 데이터가 없습니다</div>`; return; }

  el.innerHTML = items.map((item,i)=>`
    <div class="news-item" onclick="toggleNews(${i})" id="newsItem_${i}">
      <div class="news-source-row">
        <span class="news-source-badge">${item.source}</span>
        ${item.time ? `<span class="news-time">${item.time}</span>` : ''}
      </div>
      <div class="news-title">${item.title}</div>
      <div class="news-summary">${item.summary}</div>
      ${item.detail?.length ? `
      <div class="news-detail" id="newsDetail_${i}">
        <ul class="news-detail-list">
          ${item.detail.map(d=>`<li>${d}</li>`).join('')}
        </ul>
      </div>` : ''}
    </div>
  `).join('');
}

function toggleNews(i) {
  const d = document.getElementById(`newsDetail_${i}`);
  if(d) d.classList.toggle('open');
}

/* ══════════════════════════════════════════════
   RENDER 포트 탭
══════════════════════════════════════════════ */
function renderPortTab() {
  const el = document.getElementById('portContent');
  const r = S.result;
  if(!r) { el.innerHTML=`<div class="empty-state">데이터 로딩 중...</div>`; return; }

  const sig = r.signals || {};
  const plans = sig.accountPlans || [];
  const topBuys = sig.topBuys || [];
  const llm = r.llmInsights || {};

  const accountsHTML = plans.length ? plans.slice(0,3).map(plan=>{
    const cash = plan.cash ?? plan.available_cash ?? 0;
    const maxDeploy = plan.max_deploy ?? plan.budget ?? 0;
    return `
      <div class="port-balance-card">
        <div class="port-balance-label">${plan.account_type||plan.label||'투자 계좌'}</div>
        <div class="port-balance-amount">${fmtNum(cash)}원</div>
        <div class="port-balance-sub">최대 투자 가능 ${fmtNum(maxDeploy)}원</div>
      </div>`;
  }).join('') : `
    <div class="port-balance-card">
      <div class="port-balance-label">투자 포트폴리오</div>
      <div class="port-balance-amount">—</div>
      <div class="port-balance-sub">계좌 데이터를 불러오는 중</div>
    </div>`;

  const actionText = llm.timingGuidance || sig.summary?.market_signal || '선별적 접근';
  const portComment = llm.portfolioComment || '현재 시장 상황에 맞게 리스크 관리에 집중하세요.';

  const picks = topBuys.slice(0,5).map(e=>({
    name: e.name||e.ticker,
    action: signalText(e.signal||e.action||'관망'),
    actionCls: signalClass(e.signal||e.action||'관망'),
    size: e.position_sizing?.micro_plan?.split('씩')[0]?.split('(')[0] || '',
  }));

  el.innerHTML = `
    ${accountsHTML}
    <div class="port-action-card">
      <div class="port-action-label">지금 뭘 해야 할까?</div>
      <div class="port-action-main">${actionText}</div>
      <div class="port-action-desc">${portComment}</div>
      ${picks.length ? `
      <div class="port-picks">
        <div class="section-label" style="margin-top:16px;">Top Pick</div>
        ${picks.map(p=>`
          <div class="port-pick-row">
            <div class="port-pick-name">${p.name}</div>
            <div class="port-pick-action ${p.actionCls}">${p.action}</div>
          </div>`).join('')}
      </div>` : ''}
    </div>
  `;
}

/* ══════════════════════════════════════════════
   MASTER RENDER
══════════════════════════════════════════════ */
function renderAll() {
  renderTopBar();
  renderSigTab();
  renderDirTab(S.currentPeriod);
  renderEtfTab();
  renderNewsTab();
  renderPortTab();
}

/* ══════════════════════════════════════════════
   TAB NAVIGATION
══════════════════════════════════════════════ */
function activateTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tabId));
  document.querySelectorAll('.bottom-tab').forEach(b=>b.classList.toggle('active', b.dataset.tab===tabId));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active', p.id===`panel-${tabId}`));
  document.getElementById('scrollArea').scrollTop = 0;
}

document.getElementById('mainTabs').addEventListener('click', e=>{
  const btn = e.target.closest('.tab-btn');
  if(btn) activateTab(btn.dataset.tab);
});
document.getElementById('bottomTabs').addEventListener('click', e=>{
  const btn = e.target.closest('.bottom-tab');
  if(btn) activateTab(btn.dataset.tab);
});

/* Sub-tabs in 방향 */
document.getElementById('subTabs').addEventListener('click', e=>{
  const btn = e.target.closest('.sub-tab-btn');
  if(!btn) return;
  document.querySelectorAll('.sub-tab-btn').forEach(b=>b.classList.toggle('active', b===btn));
  S.currentPeriod = btn.dataset.period;
  renderDirTab(S.currentPeriod);
});

/* ══════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════ */
loadData();
</script>
