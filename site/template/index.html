<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>글로벌 매크로·ETF 리포트</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #eef2f7;
      color: #1f2937;
      overflow: hidden;
    }
    .app {
      max-width: 560px;
      margin: 0 auto;
      height: 100dvh;
      background: #f6f8fb;
      display: flex;
      flex-direction: column;
    }
    .top {
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 14px 10px;
    }
    .title {
      font-size: 21px;
      font-weight: 800;
      color: #111827;
      margin: 0 0 6px;
      letter-spacing: -0.02em;
    }
    .sub {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 10px;
    }
    #contextText {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .status-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .status-full { background: #e8f7ed; color: #137333; }
    .status-partial { background: #fff4e5; color: #b06000; }
    .status-sparse { background: #e8f3ff; color: #1b64da; }
    .status-empty { background: #f3f4f6; color: #6b7280; }
    .summary-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      margin-bottom: 10px;
    }
    .summary-strip::-webkit-scrollbar { display: none; }
    .summary-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .control-line {
      display: grid;
      grid-template-columns: 1fr 138px;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .selector-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .selector-row::-webkit-scrollbar { display: none; }
    .chip {
      border: none;
      background: #e5e7eb;
      color: #4b5563;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      cursor: pointer;
      flex-shrink: 0;
    }
    .chip.active { background: #111827; color: #ffffff; }
    .bucket-select {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: #f3f4f6;
      color: #111827;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 800;
      outline: none;
    }
    .tab-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tab-row::-webkit-scrollbar { display: none; }
    .tab {
      border: none;
      background: transparent;
      color: #9ca3af;
      font-size: 14px;
      font-weight: 800;
      padding: 0 0 8px;
      cursor: pointer;
      position: relative;
      white-space: nowrap;
    }
    .tab.active { color: #111827; }
    .tab.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      background: #111827;
      border-radius: 999px;
    }
    .content {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .pane {
      display: none;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 0 28px;
    }
    .pane.active { display: block; }
    .card, .idea, .action-card, .hero {
      margin: 0 12px 12px;
    }
    .card, .action-card, .idea {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(15, 23, 42, 0.04);
    }
    .card, .action-card { padding: 16px; }
    .hero {
      background: linear-gradient(135deg, #111827 0%, #334155 100%);
      color: #ffffff;
      border-radius: 20px;
      padding: 18px;
    }
    .card-title, .hero-title {
      font-size: 17px;
      font-weight: 800;
      color: #111827;
      margin: 0 0 12px;
      line-height: 1.4;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    .hero-title { color: #ffffff; margin-bottom: 8px; }
    .muted, .body-text, .forecast-text, .hero-text, .detail-item, .impact-desc, .source-item, .alloc-desc {
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    .muted {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.55;
    }
    .body-text, .forecast-text, .hero-text {
      font-size: 14px;
      line-height: 1.7;
    }
    .body-text, .forecast-text { color: #4b5563; }
    .hero-text { color: rgba(255,255,255,0.92); }
    .score-wrap { margin-bottom: 16px; }
    .score-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 10px;
      margin-bottom: 8px;
    }
    .score-num {
      font-size: 26px;
      font-weight: 800;
      color: #111827;
      white-space: nowrap;
    }
    .score-status { font-size: 13px; font-weight: 800; }
    .score-track {
      height: 8px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }
    .score-fill { height: 100%; border-radius: 999px; }
    .forecast-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px;
    }
    .forecast-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #111827;
      color: #ffffff;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .stat-chip-group, .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .stat-chip .label { opacity: 0.75; }
    .tone-score { background: #eef2ff; color: #1d4ed8; }
    .tone-market { background: #eff6ff; color: #2563eb; }
    .tone-risk { background: #fff7ed; color: #c2410c; }
    .tone-signal { background: #f0fdf4; color: #15803d; }
    .tone-macro { background: #f5f3ff; color: #6d28d9; }
    .tone-default { background: #f3f4f6; color: #374151; }
    .list, .detail-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .list-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px 0;
      border-bottom: 1px dashed #e5e7eb;
    }
    .list-item:last-child { border-bottom: none; padding-bottom: 0; }
    .detail-item {
      font-size: 13px;
      color: #4b5563;
      padding: 10px 0;
      border-top: 1px dashed #e5e7eb;
      line-height: 1.68;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      align-self: flex-start;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #1d4ed8;
      font-size: 11px;
      font-weight: 800;
    }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .metric-card {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #ffffff;
      padding: 12px;
    }
    .metric-name {
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .metric-price {
      font-size: 15px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 4px;
    }
    .text-up { color: #e11d48; font-size: 12px; font-weight: 800; }
    .text-down { color: #2563eb; font-size: 12px; font-weight: 800; }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #4b5563;
      font-size: 11px;
      font-weight: 800;
    }
    .impact-title {
      font-size: 12px;
      font-weight: 800;
      color: #6b7280;
      margin: 14px 0 8px;
    }
    .impact-item {
      padding: 10px 0;
      border-bottom: 1px dashed #e5e7eb;
    }
    .impact-item:last-child { border-bottom: none; }
    .impact-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .impact-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .impact-dot.pos { background: #e11d48; }
    .impact-dot.neg { background: #2563eb; }
    .impact-name {
      font-size: 13px;
      font-weight: 800;
      color: #111827;
    }
    .impact-desc {
      font-size: 13px;
      line-height: 1.6;
      color: #6b7280;
    }
    .alloc-bar {
      display: flex;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      margin: 14px 0 16px;
    }
    .alloc-item {
      display: flex;
      align-items: start;
      gap: 10px;
      margin-bottom: 12px;
    }
    .alloc-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-top: 4px;
    }
    .alloc-name {
      font-size: 13px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 4px;
    }
    .alloc-desc {
      font-size: 12px;
      line-height: 1.55;
      color: #6b7280;
    }
    .idea {
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }
    .idea-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
      padding: 14px;
      background: #f8fafc;
    }
    .idea-left {
      display: flex;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }
    .idea-logo { font-size: 22px; }
    .idea-name {
      font-size: 14px;
      font-weight: 800;
      color: #111827;
      line-height: 1.4;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    .idea-ticker {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.4;
      word-break: break-all;
    }
    .idea-action {
      background: #eff6ff;
      color: #1d4ed8;
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .idea-body { padding: 14px; }
    .issue-badge {
      display: inline-flex;
      padding: 5px 8px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #4b5563;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .rank-item {
      display: flex;
      gap: 10px;
      align-items: start;
      padding: 12px 0;
      border-bottom: 1px dashed #e5e7eb;
    }
    .rank-item:last-child { border-bottom: none; }
    .rank-num {
      width: 24px;
      font-size: 15px;
      font-weight: 800;
      color: #9ca3af;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .rank-info { flex: 1; min-width: 0; }
    .rank-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: start;
      margin-bottom: 6px;
    }
    .rank-name {
      font-size: 13px;
      font-weight: 800;
      color: #111827;
      line-height: 1.5;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    .rank-ticker {
      display: inline-flex;
      font-size: 10px;
      color: #6b7280;
      background: #f3f4f6;
      border-radius: 999px;
      padding: 2px 8px;
      margin-left: 6px;
      word-break: break-all;
    }
    .rank-score {
      font-size: 12px;
      font-weight: 800;
      color: #2563eb;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .rank-track {
      height: 6px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }
    .rank-fill {
      height: 100%;
      background: #2563eb;
      border-radius: 999px;
    }
    .source-slot { margin-top: 12px; }
    .source-toggle {
      border: none;
      background: #f3f4f6;
      color: #4b5563;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
    }
    .source-box {
      display: none;
      margin-top: 10px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px;
    }
    .source-item {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .source-item:last-child { margin-bottom: 0; }
    .action-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .action-badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      background: #111827;
      color: #ffffff;
      font-size: 11px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: #9ca3af;
      font-size: 15px;
    }
    @media (max-width: 430px) {
      .title { font-size: 19px; }
      .control-line { grid-template-columns: 1fr 126px; }
      .tab { font-size: 13px; }
      .card, .idea, .action-card, .hero { margin: 0 10px 10px; }
      .card, .action-card, .hero { padding: 15px; }
      .body-text, .forecast-text, .hero-text { font-size: 13.5px; line-height: 1.74; }
      .metric-grid { grid-template-columns: 1fr 1fr; }
    }
    /* Sub-tabs */
    .sub-tab-bar {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 12px 12px 0;
      background: #f6f8fb;
      flex-shrink: 0;
    }
    .sub-tab-bar::-webkit-scrollbar { display: none; }
    .sub-tab-btn {
      border: none;
      background: #e5e7eb;
      color: #4b5563;
      border-radius: 8px 8px 0 0;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .sub-tab-btn.active { background: #fff; color: #111827; box-shadow: 0 -2px 8px rgba(0,0,0,0.06); }
    .sub-tab-score { font-size: 10px; font-weight: 700; padding: 1px 4px; background: rgba(0,0,0,0.06); border-radius: 4px; }
    /* Direction score */
    .dir-score-wrap { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .dir-score-num { font-size: 36px; font-weight: 900; letter-spacing: -0.03em; }
    .dir-regime-badge { padding: 6px 12px; border-radius: 8px; background: #f3f4f6; font-size: 12px; font-weight: 700; color: #374151; }
    /* Signal rows */
    .signal-row { padding: 10px 0; border-bottom: 1px solid #f3f4f6; }
    .signal-row:last-child { border-bottom: none; }
    .signal-row-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .signal-name { font-size: 14px; font-weight: 700; color: #111827; }
    .signal-ticker { font-size: 11px; color: #9ca3af; margin-left: 5px; font-weight: 400; }
    .signal-grade { font-size: 12px; font-weight: 800; }
    .signal-label { font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 999px; color: #fff; }
    .signal-meta { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
    .signal-reason { font-size: 12px; color: #374151; margin-bottom: 3px; }
    .signal-cond { font-size: 11px; color: #6b7280; }
    /* Valuation */
    .val-table { display: flex; flex-direction: column; gap: 6px; }
    .val-row { display: flex; gap: 8px; align-items: center; font-size: 12px; flex-wrap: wrap; }
    .val-name { font-weight: 800; min-width: 60px; }
    .val-grade { font-weight: 700; min-width: 70px; }
    .val-detail { flex: 1; font-size: 11px; }
    /* Sector calls */
    .sector-call { padding: 6px 0; border-bottom: 1px solid #f3f4f6; font-size: 12px; }
    .sector-call:last-child { border-bottom: none; }
    .sector-view { font-weight: 800; margin-right: 4px; }
    /* Insight badge */
    .insight-badge { padding: 4px 10px; border-radius: 999px; background: #dbeafe; color: #1d4ed8; font-size: 12px; font-weight: 800; }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1 class="title">글로벌 매크로·ETF 리포트</h1>
      <div class="sub">
        <span id="contextText">데이터 로딩 중...</span>
        <span id="statusBadge"></span>
      </div>
      <div id="summaryStrip" class="summary-strip"></div>
      <div class="tab-row">
        <button class="tab active" data-tab="portfolio" onclick="switchSection('portfolio')">포트폴리오</button>
        <button class="tab" data-tab="rebalancing" onclick="switchSection('rebalancing')">실행 가이드</button>
        <button class="tab" data-tab="direction" onclick="switchSection('direction')">기간별 투자 방향성</button>
        <button class="tab" data-tab="briefing" onclick="switchSection('briefing')">시장 브리핑</button>
        <button class="tab" data-tab="news" onclick="switchSection('news')">핵심 이슈</button>
        <button class="tab" data-tab="recommendations" onclick="switchSection('recommendations')">ETF 아이디어</button>
      </div>
    </div>

    <div class="content">
      <div id="pane-portfolio" class="pane active"></div>
      <div id="pane-rebalancing" class="pane"></div>
      <div id="pane-direction" class="pane"></div>
      <div id="pane-briefing" class="pane"></div>
      <div id="pane-news" class="pane"></div>
      <div id="pane-recommendations" class="pane"></div>
    </div>
  </div>

  <script>
    const REPO_PREFIX = window.location.pathname.includes('/igzun-daily-report/') ? '/igzun-daily-report' : '';
    const SITE_BASE = `${REPO_PREFIX}/site`;
    const HORIZON_ORDER = ['1일', '1주', '1개월', '3개월', '6개월'];
    const HORIZON_LABELS = {
      '1일': '일간',
      '1주': '주간',
      '1개월': '월간',
      '3개월': '분기',
      '6개월': '반기',
    };
    const state = {
      index: null,
      currentHorizon: '1일',
      currentBucketId: '',
      currentView: null,
      horizonViews: {},
      currentSection: 'portfolio',
    };

    function statusClass(status) {
      return {
        full: 'status-badge status-full',
        partial: 'status-badge status-partial',
        sparse: 'status-badge status-sparse',
        empty: 'status-badge status-empty',
      }[status] || 'status-badge status-empty';
    }

    function statusText(status) {
      return {
        full: '데이터 충분',
        partial: '데이터 부분',
        sparse: '데이터 제한',
        empty: '데이터 없음',
      }[status] || status;
    }

    function currentBucket() {
      const buckets = (state.index?.horizons?.[state.currentHorizon]) || [];
      return buckets.find(item => item.id === state.currentBucketId) || null;
    }

    function defaultBucketForHorizon(horizon) {
      const buckets = (state.index?.horizons?.[horizon]) || [];
      return buckets.length ? buckets[0].id : '';
    }

    function formatContext(view, bucket) {
      if (!view || !bucket) return '표시할 데이터가 없습니다.';
      return `${bucket.label} · 최신 일간 기준 · ${view.fromDate} ~ ${view.toDate}`;
    }

    function renderStatus(status) {
      const el = document.getElementById('statusBadge');
      el.className = statusClass(status);
      el.textContent = statusText(status);
    }

    async function loadIndex() {
      const res = await fetch(`${SITE_BASE}/horizon_index.json?t=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) throw new Error('index load failed');
      state.index = await res.json();
    }

    function resolveInitialSelection() {
      state.currentHorizon = '1일';
      state.currentBucketId = state.index?.latestDailyDate || defaultBucketForHorizon('1일');
    }

    function renderHorizonSelector() {
      const container = document.getElementById('horizonSelector');
      if (!container) return;
      const horizons = Object.keys(state.index?.horizons || {});
      container.innerHTML = horizons.map(horizon => {
        const active = horizon === state.currentHorizon ? 'active' : '';
        return `<button class="chip ${active}" onclick="changeHorizon('${horizon}')">${horizon}</button>`;
      }).join('');
    }

    function renderBucketSelector() {
      const select = document.getElementById('bucketSelect');
      if (!select) return;
      const buckets = (state.index?.horizons?.[state.currentHorizon]) || [];
      select.innerHTML = buckets.map(bucket => `
        <option value="${bucket.id}" ${bucket.id === state.currentBucketId ? 'selected' : ''}>${bucket.label}</option>

    function renderSummaryStrip() {
      const strip = document.getElementById('summaryStrip');
      const view = state.currentView;
      if (!view) {
        strip.innerHTML = '';
        return;
      }
      const pills = [];
      if (view.updateCount) pills.push(`누적 업데이트 ${view.updateCount}회`);
      if (view.meta?.docsTotal) pills.push(`누적 문서 ${view.meta.docsTotal}건`);
      if (Number.isFinite(Number(view.avgScore))) pills.push(`평균 점수 ${view.avgScore}`);
      (view.meta?.sourceLabels || []).slice(0, 2).forEach(label => pills.push(label));
      strip.innerHTML = pills.map(text => `<span class="summary-pill">${text}</span>`).join('');
    }

    function renderStatChips(items) {
      if (!items || !items.length) return '';
      return `
        <div class="stat-chip-group">
          ${items.map(item => `
            <span class="stat-chip tone-${item.tone || 'default'}">
              <span class="label">${item.label || ''}</span>
              <span class="value">${item.value || ''}</span>
            </span>
          `).join('')}
        </div>
      `;
    }

    function renderSources(sources, id) {
      if (!sources || !sources.length) return '';
      const items = sources.map(item => {
        const label = item.label || item.source || '출처';
        const title = item.title ? ` — ${item.title}` : '';
        const date = item.published_at ? ` (${item.published_at})` : '';
        const meta = [item.region, item.sector].filter(Boolean).join(' · ');
        const url = item.url ? ` · <a href="${item.url}" target="_blank" rel="noreferrer">원문</a>` : '';
        return `<div class="source-item"><b>${label}</b>${title}${date}${meta ? ` · ${meta}` : ''}${url}</div>`;
      }).join('');
      return `<div class="source-slot"><button class="source-toggle" onclick="toggleSource('${id}')">출처·메타데이터</button><div class="source-box" id="${id}">${items}</div></div>`;
    }

    function toggleSource(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function snippet(text, limit = 180) {
      if (!text) return '';
      const value = String(text).trim();
      if (value.length <= limit) return value;
      return `${value.slice(0, limit).trim()}...`;
    }

    function resetPaneScrolls() {
      document.querySelectorAll('.pane').forEach(pane => {
        pane.scrollTop = 0;
      });
    }

    function updateHeader() {
      const bucket = currentBucket();
      document.getElementById('contextText').textContent = formatContext(state.currentView, bucket);
      renderStatus(state.currentView?.dataStatus || 'empty');
      renderSummaryStrip();
      document.title = bucket ? `${bucket.label} · 글로벌 매크로·ETF 리포트` : '글로벌 매크로·ETF 리포트';
    }

    function syncUrl() {
      const latest = state.index?.latestDailyDate || state.currentBucketId;
      if (!latest) return;
      const url = `${REPO_PREFIX}/site/${latest}/`;
      window.history.replaceState({}, '', url);
    }

    async function changeHorizon(horizon) {
      state.currentHorizon = horizon;
      state.currentBucketId = defaultBucketForHorizon(horizon);
      renderHorizonSelector();
      renderBucketSelector();
      await loadCurrentView();
    }

    async function changeBucket(bucketId) {
      state.currentBucketId = bucketId;
      renderBucketSelector();
      await loadCurrentView();
    }

    async function loadCurrentView() {
      const bucket = currentBucket();
      if (!bucket) {
        state.currentView = null;
        updateHeader();
        renderAll();
        return;
      }
      const res = await fetch(`${SITE_BASE}/${bucket.source}?t=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) throw new Error('view load failed');
      state.currentView = await res.json();
      updateHeader();
      renderAll();
      resetPaneScrolls();
      syncUrl();
    }

    async function loadDirectionViews() {
      const loaded = {};
      for (const horizon of HORIZON_ORDER) {
        const bucket = (state.index?.horizons?.[horizon] || [])[0];
        if (!bucket) continue;
        const res = await fetch(`${SITE_BASE}/${bucket.source}?t=${Date.now()}`, { cache: 'no-store' });
        if (!res.ok) continue;
        loaded[horizon] = await res.json();
      }
      state.horizonViews = loaded;
    }

        const topBuys = signals.topBuys || [];
        const signalRows = topBuys.slice(0,5).map(s => {
          const gradeColor = s.timingGrade === 'A' ? '#0f9f6e' : (s.timingGrade === 'B' ? '#2563eb' : (s.timingGrade === 'F' || s.timingGrade === 'D' ? '#dc2626' : '#f59e0b'));
          const signalColors = {'강력매수':'#0f9f6e','분할매수':'#2563eb','소규모탐색':'#7c3aed','관망':'#6b7280','비중축소':'#f59e0b','회피':'#dc2626'};
          const sigColor = signalColors[s.signal] || '#6b7280';
          const reasons = (s.reasons || []).slice(0,2).join(' | ');
          return `
            <div class="signal-row">
              <div class="signal-row-top">
                <div class="signal-name">${s.name || s.id}<span class="signal-ticker">${s.ticker || ''}</span></div>
                <div style="display:flex;gap:6px;align-items:center;">
                  <span class="signal-grade" style="color:${gradeColor};">타이밍 ${s.timingGrade || '?'}</span>
                  <span class="signal-label" style="background:${sigColor};">${s.signal}</span>
                </div>
              </div>
              ${s.rsi ? `<div class="signal-meta">RSI ${s.rsi} · 진입예산 ${s.firstAmount ? (s.firstAmount).toLocaleString()+'원' : '-'}</div>` : ''}
              ${reasons ? `<div class="signal-reason">${reasons}</div>` : ''}
              ${s.microPlan ? `<div class="signal-meta">${s.microPlan}</div>` : ''}
              ${s.entryConditions && s.entryConditions.length ? `
                <div class="signal-cond">
                  <b>진입:</b> ${s.entryConditions[0]}
                </div>` : ''}
            </div>
          `;
        }).join('');

        // Valuation block
        const sp = valuation.sp500 || {};
        const kospi = valuation.kospi || {};
        const valRows = [
          {name:'S&P500', grade:sp.grade, detail:`ERP ${sp.erp != null ? sp.erp.toFixed(1)+'%' : 'N/A'} · PE ${sp.pe || 'N/A'}x · 52W ${sp.range52w != null ? sp.range52w.toFixed(0)+'%' : 'N/A'}`},
          {name:'KOSPI', grade:kospi.grade, detail:`PBR ${kospi.pbr || 'N/A'}x · ${kospi.pbrAssessment || ''}`},
        ].map(r => {
          const gc = r.grade === '저평가' ? '#0f9f6e' : (r.grade === '고평가' || r.grade === '다소 고평가' ? '#dc2626' : '#2563eb');
          return `<div class="val-row"><span class="val-name">${r.name}</span><span class="val-grade" style="color:${gc};">${r.grade || '분석중'}</span><span class="val-detail muted">${r.detail}</span></div>`;
        }).join('');

        // LLM insights
        const keySignals = (llmInsights.keySignals || []).map(s => `<li class="detail-item">${s}</li>`).join('');
        const sectorCalls = (llmInsights.sectorCalls || []).map(s => {
          const vc = {'매수가능':'#0f9f6e','관망':'#6b7280','비중축소':'#dc2626','소규모탐색':'#7c3aed'}[s.view] || '#6b7280';
          return `<div class="sector-call"><span class="sector-view" style="color:${vc};">${s.view}</span> <b>${s.sector}</b> — ${s.rationale}</div>`;
        }).join('');

        content = `
          <!-- Score + market overview -->
          <div class="card">
            <div class="dir-score-wrap">
              <div>
                <div class="dir-score-num" style="color:${scoreColor};">${scoreValue ?? '-'}<span class="muted" style="font-size:13px;"> /100</span></div>
                <div class="muted" style="font-size:11px; margin-top:2px;">종합 시장 점수 (50=중립, 높을수록 위험선호)</div>
              </div>
              <div class="dir-regime-badge">${view.regime || view.regimeKr || ''}</div>
            </div>
            ${renderStatChips((briefing.metricChips || []).slice(0, 4))}
          </div>

          <!-- LLM Insights: timing guidance -->
          ${llmInsights.timingGuidance || llmInsights.marketNarrative ? `
            <div class="card">
              <div class="card-title">📊 지금 투자해야 하는가?</div>
              ${ms.action ? `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><span class="insight-badge">${ms.action}</span><span class="muted">투자가능비중 ${ms.deployablePct || 0}% · ${llmModeText}</span></div>` : ''}
              <div class="body-text">${llmInsights.timingGuidance || llmInsights.marketNarrative || ''}</div>
            </div>
          ` : ''}

          <!-- Buy/Sell signals -->
          ${topBuys.length ? `
            <div class="card">
              <div class="card-title">🎯 매수 타이밍 신호</div>
              <div class="muted" style="margin-bottom:10px;">RSI·MACD·볼린저밴드·이평선·엘리엇파동 종합 타이밍</div>
              ${signalRows}
            </div>
          ` : ''}

          <!-- Valuation -->
          ${sp.grade ? `
            <div class="card">
              <div class="card-title">💰 밸류에이션</div>
              <div class="muted" style="margin-bottom:10px;">${valuation.marketValuation || ''}</div>
              <div class="val-table">${valRows}</div>
            </div>
          ` : ''}

          <!-- LLM sector calls -->
          ${sectorCalls ? `
            <div class="card">
              <div class="card-title">🗺️ 섹터별 투자 의견</div>
              ${sectorCalls}
            </div>
          ` : ''}

          <!-- Key signals list -->
          ${keySignals ? `
            <div class="card">
              <div class="card-title">📌 핵심 투자 시그널</div>
              <ul class="detail-list">${keySignals}</ul>
              ${(llmInsights.riskFactors || []).length ? `
                <div class="impact-title" style="margin-top:12px;">⚠️ 리스크 요인</div>
                <ul class="detail-list">${(llmInsights.riskFactors || []).map(r => `<li class="detail-item">${r}</li>`).join('')}</ul>
              ` : ''}
            </div>
          ` : ''}

          <!-- Strategy direction -->
          <div class="card">
            <div class="card-title">${HORIZON_LABELS[horizon] || horizon} 투자 방향</div>
            <div class="body-text">${strategy.summary || forecast.text || '방향성 데이터가 없습니다.'}</div>
            <div class="impact-title" style="margin-top:10px;">핵심 포인트</div>
            <ul class="detail-list">${insights || '<li class="detail-item">핵심 포인트 데이터가 없습니다.</li>'}</ul>
            <div class="impact-title" style="margin-top:10px;">집행 톤</div>
            <div class="body-text">이번 기간 실행 예산 ${deployNow}, 대기 자금 ${reserveCash}. ${executionStyle}</div>
            ${watchPoint ? `<div class="body-text" style="margin-top:8px;"><b>⚠️ 보류 조건:</b> ${watchPoint}</div>` : ''}
          </div>
        `;
      } else {
        content = `<div class="empty">${horizon} 데이터 로딩 중...</div>`;
      }

      pane.innerHTML = `
        <div class="sub-tab-bar">${tabButtons}</div>
        ${content}
      `;
    }

    function switchDirectionTab(horizon) {
      state.currentDirectionTab = horizon;
      renderDirection();
    }

    function renderRecommendations() {
      const pane = document.getElementById('pane-recommendations');
      const data = state.currentView?.recommendations;
      if (!data) {
        pane.innerHTML = '<div class="empty">ETF 아이디어 데이터가 없습니다.</div>';
        return;
      }
      const ranking = (data.etfRanking || []).map(item => `
        <div class="rank-item">
          <div class="rank-num">${item.rank || '-'}</div>
          <div class="rank-info">
            <div class="rank-head">
              <div class="rank-name">${item.name || '-'}<span class="rank-ticker">${item.ticker || '-'}</span></div>
              <div class="rank-score">${item.score || 0}점</div>
            </div>
            <div class="rank-track"><div class="rank-fill" style="width:${item.score || 0}%;"></div></div>
            <div class="muted" style="margin-top:6px;">${item.commentary || ''}</div>
          </div>
        </div>
      `).join('');
      const ideas = (data.ideas || []).map((item, idx) => `
        <div class="idea">
          <div class="idea-top">
            <div class="idea-left">
              <div class="idea-logo">${item.logo || '📌'}</div>
              <div>
                <div class="idea-name">${item.name || '-'}</div>
                <div class="idea-ticker">${item.ticker || '-'} · ${item.scoreText || ''}</div>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
              <div class="idea-action">${item.action || '관찰'}</div>
              ${item.signal ? `<div style="font-size:11px;font-weight:800;color:${{'강력매수':'#0f9f6e','분할매수':'#2563eb','소규모탐색':'#7c3aed','관망':'#6b7280','비중축소':'#f59e0b','회피':'#dc2626'}[item.signal]||'#6b7280'};">${item.signal}${item.timingGrade ? ' '+item.timingGrade : ''}</div>` : ''}
            </div>
          </div>
          <div class="idea-body">
            <div class="issue-badge">연결 이슈: ${item.linkedIssue || '-'}</div>
            <div class="body-text">${item.reason || ''}</div>
            <div class="body-text" style="margin-top:10px;"><b>매크로 문맥:</b> ${item.macroContext || ''}</div>
            <div class="body-text" style="margin-top:10px;"><b>왜 살 수 있는가:</b> ${item.whyBuy || ''}</div>
            ${(item.evidencePoints || []).length ? `
              <div class="impact-title">근거 포인트</div>
              <ul class="detail-list">
                ${(item.evidencePoints || []).map(point => `<li class="detail-item">${point}</li>`).join('')}
              </ul>
            ` : ''}
            <div class="body-text" style="margin-top:10px;"><b>우려 지점:</b> ${item.risk || ''}</div>
            <div class="body-text" style="margin-top:10px;"><b>권장 비중:</b> ${item.positioning || ''}</div>
            <div class="body-text" style="margin-top:10px;"><b>집행 방식:</b> ${item.execution || ''}</div>
            ${item.timingDetail ? `<div class="body-text" style="margin-top:10px;"><b>기술적 타이밍:</b> ${item.timingDetail}</div>` : ''}
            ${(item.entryConditions || []).length ? `
              <div class="impact-title">진입 조건</div>
              <ul class="detail-list">${(item.entryConditions || []).map(c=>`<li class="detail-item">${c}</li>`).join('')}</ul>
            ` : ''}
            ${(item.exitConditions || []).length ? `
              <div class="impact-title">청산 조건</div>
              <ul class="detail-list">${(item.exitConditions || []).map(c=>`<li class="detail-item">${c}</li>`).join('')}</ul>
            ` : ''}
            ${item.positionSizing && item.positionSizing.maxPct ? `
              <div class="body-text" style="margin-top:10px;"><b>포지션 사이징:</b> 최대 ${item.positionSizing.maxPct}% | 1차 ${item.positionSizing.firstPct || '-'}% (${item.positionSizing.firstAmount ? item.positionSizing.firstAmount.toLocaleString()+'원' : '-'})</div>
              <div class="muted" style="font-size:11px;">${item.positionSizing.schedule || ''}</div>
            ` : ''}
            <div class="body-text" style="margin-top:10px;"><b>체크 포인트:</b> ${item.watchPoint || ''}</div>
            ${renderSources(item.sources, `idea-src-${idx}`)}
          </div>
        </div>
      `).join('');

      pane.innerHTML = `
        <div class="card">
          <div class="card-title">${state.currentView.bucketLabel || ''} ETF·테마 아이디어</div>
          <div class="muted">기간별 누적 흐름과 현재 레짐을 함께 반영한 아이디어입니다.</div>
        </div>
        <div class="card">
          <div class="card-title">ETF 우선순위 랭킹</div>
          <div class="muted" style="margin-bottom:12px;">현재 기간의 모멘텀, 리스크, 레짐 적합도를 함께 반영했습니다.</div>
          ${ranking || '<div class="empty">랭킹 데이터가 없습니다.</div>'}
        </div>
        ${ideas}
      `;
    }

    function renderAll() {
      renderPortfolio();
      renderRebalancing();
      renderDirection();
      renderBriefing();
      renderNews();
      renderRecommendations();
      switchSection(state.currentSection);
    }

    async function init() {
      try {
        await loadIndex();
        resolveInitialSelection();
        await loadCurrentView();
        await loadDirectionViews();
        renderAll();
      } catch (error) {
        document.querySelector('.content').innerHTML = '<div class="empty">기간별 리포트를 불러오지 못했습니다.</div>';
        renderStatus('empty');
      }
    }

    window.onload = init;
  </script>
</body>
</html>
