<!DOCTYPE html>
<html lang="ko">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>오픈 클로 AI 리포트</title>
 <style>
 @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
 * { box-sizing: border-box; }
 body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #F2F4F6; color: #333D4B; margin: 0; padding: 0; line-height: 1.5; -webkit-font-smoothing: antialiased; }
 /* styles omitted for brevity in this write-up */
 </style>
</head>
<body>
<!-- content omitted for brevity; using same structure as provided -->
<div class="app-container">
 <div class="top-nav">
 <h1>✨ 오픈 클로 모닝 리포트</h1>
 <div class="sub-text" id="report-date">날짜 로딩중...</div>
 </div>
 <div class="tab-content">
 <div class="tab-pane active" id="tab-briefing"></div>
 <div class="tab-pane" id="tab-news"></div>
 <div class="tab-pane" id="tab-portfolio"></div>
 <div class="tab-pane" id="tab-recommend"></div>
 </div>
</div>

<script>
// Minimal JS: load ./result.json if present and use it, otherwise use embedded reportData
async function tryLoad(datePath){
  try{
    const r = await fetch(datePath, {cache:'no-store'});
    if(!r.ok) throw new Error('not found');
    return await r.json();
  }catch(e){return null}
}

async function loadAndRender(){
  // try local result.json (when hosted under site/YYYY-MM-DD/)
  const local = await tryLoad('./result.json');
  if(local){ Object.assign(reportData, local); renderApp(); return; }
  // else try root site with repo path
  const today = new Date().toISOString().slice(0,10);
  const alt = await tryLoad('/igzun-daily-report/site/'+today+'/result.json');
  if(alt){ Object.assign(reportData, alt); renderApp(); return; }
  // fallback: render embedded
  renderApp();
}

function loadReportForDate(year, month, day, event){
  // update UI highlight (same as before)
  document.querySelectorAll('.calendar-date').forEach(el=>el.classList.remove('active'));
  if(event) { event.target.classList.add('active'); event.target.style.color='#fff'; }
  const y = year, m = String(month+1).padStart(2,'0'); const d = String(day).padStart(2,'0');
  const dateStr = `${y}-${m}-${d}`;
  document.getElementById('report-date').innerText = `${y}년 ${month+1}월 ${day}일 • 시장 요약 및 맞춤 전략`;
  // try fetch that date's result.json and render
  const path = '/igzun-daily-report/site/'+dateStr+'/result.json';
  tryLoad(path).then(data=>{
    if(data){ Object.assign(reportData, data); renderApp(); showModal('완료',''+dateStr+' 데이터를 로드했습니다.'); }
    else { showModal('데이터 없음','선택한 날짜('+dateStr+')에 데이터가 없습니다.'); }
  });
}

function showModal(title,desc){ alert(title+'\n'+desc); }

window.onload = loadAndRender;
</script>
</body>
</html>
